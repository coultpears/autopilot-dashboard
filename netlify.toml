[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = []

[functions."grid-data"]
  timeout = 30

[functions."property-detail"]
  timeout = 30

[functions."grid-history"]
  timeout = 30

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
