<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autopilot Dashboard — Landing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --navy: #15192D;
  --navy-mid: #1C2038;
  --navy-light: #232842;
  --tonal: #2D3654;
  --blue: #1A61D9;
  --blue-glow: #2B7AFF;
  --baby-blue: #E7EFfb;
  --green: #08786C;
  --green-light: #0A9B8B;
  --orange: #EE533D;
  --orange-light: #FF7A68;
  --yellow: #FFD426;
  --white: #F0F0F0;
  --silver: #8B90A0;
  --ghost: rgba(255,255,255,0.06);
  --ghost-hover: rgba(255,255,255,0.10);
  --card-bg: #1A1E34;
  --card-border: rgba(255,255,255,0.06);
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 2px 20px rgba(0,0,0,0.3);
}

html { font-size: 15px; }

body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--navy);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── AMBIENT BACKGROUND ─── */
body::before {
  content: '';
  position: fixed;
  top: -40%; left: -20%;
  width: 80vw; height: 80vw;
  background: radial-gradient(ellipse, rgba(26,97,217,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -30%; right: -10%;
  width: 60vw; height: 60vw;
  background: radial-gradient(ellipse, rgba(8,120,108,0.04) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ─── TOP NAV ─── */
.topnav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(21,25,45,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--card-border);
  padding: 0 2rem;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.topnav-left {
  display: flex;
  align-items: center;
  gap: 1rem;
}
.logo-mark {
  width: 36px; height: 36px;
  background: var(--blue);
  border-radius: 10px;
  display: grid; place-items: center;
  font-family: 'Outfit', sans-serif;
  font-weight: 800;
  font-size: 1.2rem;
  color: #fff;
  letter-spacing: -0.5px;
}
.topnav h1 {
  font-family: 'Outfit', sans-serif;
  font-size: 1.25rem;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: #fff;
}
.topnav h1 span {
  font-weight: 400;
  color: var(--silver);
  margin-left: 0.5rem;
}
.topnav-right {
  display: flex;
  align-items: center;
  gap: 1.5rem;
  font-size: 0.82rem;
  color: var(--silver);
}
.status-dot {
  width: 7px; height: 7px;
  background: var(--green-light);
  border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
  animation: pulse-dot 2s ease infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ─── MAIN LAYOUT ─── */
.main {
  position: relative; z-index: 1;
  max-width: 1440px;
  margin: 0 auto;
  padding: 1.5rem 2rem 3rem;
}

/* ─── KPI STRIP ─── */
.kpi-strip {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.kpi-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 1.25rem 1.5rem;
  position: relative;
  overflow: hidden;
  opacity: 0;
  transform: translateY(12px);
  animation: card-in 0.5s ease forwards;
}
.kpi-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--blue);
  opacity: 0.6;
}
.kpi-card:nth-child(1) { animation-delay: 0.05s; }
.kpi-card:nth-child(2) { animation-delay: 0.1s; }
.kpi-card:nth-child(3) { animation-delay: 0.15s; }
.kpi-card:nth-child(4) { animation-delay: 0.2s; }
.kpi-card:nth-child(5) { animation-delay: 0.25s; }
.kpi-card:nth-child(6) { animation-delay: 0.3s; }

@keyframes card-in {
  to { opacity: 1; transform: translateY(0); }
}

.kpi-label {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--silver);
  font-weight: 600;
  margin-bottom: 0.5rem;
}
.kpi-value {
  font-family: 'Outfit', sans-serif;
  font-size: 2.2rem;
  font-weight: 700;
  letter-spacing: -1px;
  line-height: 1;
  margin-bottom: 0.5rem;
}
.kpi-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 0.75rem;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
}
.kpi-badge.ahead {
  background: rgba(8,120,108,0.15);
  color: var(--green-light);
}
.kpi-badge.behind {
  background: rgba(238,83,61,0.15);
  color: var(--orange-light);
}
.kpi-badge.neutral {
  background: rgba(255,212,38,0.12);
  color: var(--yellow);
}
.kpi-badge svg { width: 12px; height: 12px; }

/* ─── SECTION PANELS ─── */
.section {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  opacity: 0;
  transform: translateY(12px);
  animation: card-in 0.6s ease forwards;
  animation-delay: 0.35s;
}
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
  gap: 0.75rem;
}
.section-title {
  font-family: 'Outfit', sans-serif;
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.section-title small {
  font-weight: 400;
  color: var(--silver);
  font-size: 0.8rem;
  margin-left: 0.5rem;
}

/* ─── TABS ─── */
.tabs {
  display: flex;
  gap: 4px;
  background: var(--ghost);
  border-radius: var(--radius-sm);
  padding: 3px;
}
.tab-btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  padding: 6px 16px;
  border: none;
  background: transparent;
  color: var(--silver);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
}
.tab-btn:hover { color: var(--white); }
.tab-btn.active {
  background: var(--blue);
  color: #fff;
}

/* ─── METRIC TOGGLE ─── */
.metric-toggle {
  display: flex;
  gap: 4px;
  background: var(--ghost);
  border-radius: var(--radius-sm);
  padding: 3px;
}
.metric-btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.72rem;
  font-weight: 600;
  padding: 4px 12px;
  border: none;
  background: transparent;
  color: var(--silver);
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.2s;
}
.metric-btn:hover { color: var(--white); }
.metric-btn.active {
  background: var(--tonal);
  color: var(--white);
}

/* ─── BAR CHART ─── */
.chart-container {
  margin-top: 1rem;
}
.chart-row {
  display: grid;
  grid-template-columns: 100px 1fr 60px;
  align-items: center;
  gap: 12px;
  padding: 6px 0;
  border-bottom: 1px solid var(--ghost);
}
.chart-row:last-child { border-bottom: none; }
.chart-label {
  font-size: 0.78rem;
  color: var(--silver);
  font-weight: 500;
  white-space: nowrap;
}
.chart-bars {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.bar-track {
  height: 16px;
  background: var(--ghost);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}
.bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  display: flex;
  align-items: center;
  padding-left: 8px;
  font-size: 0.65rem;
  font-weight: 600;
  color: rgba(255,255,255,0.9);
  min-width: 0;
}
.bar-fill.current { background: var(--blue); }
.bar-fill.previous { background: var(--tonal); opacity: 0.7; }

.chart-delta {
  font-size: 0.78rem;
  font-weight: 600;
  text-align: right;
}
.chart-delta.ahead { color: var(--green-light); }
.chart-delta.behind { color: var(--orange-light); }
.chart-delta.neutral { color: var(--silver); }

.chart-legend {
  display: flex;
  gap: 1.5rem;
  margin-top: 1rem;
  padding-top: 0.75rem;
  border-top: 1px solid var(--ghost);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.75rem;
  color: var(--silver);
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 3px;
}
.legend-dot.current { background: var(--blue); }
.legend-dot.previous { background: var(--tonal); opacity: 0.7; }

/* ─── RENEWAL CARDS ─── */
.renewal-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 0.75rem;
  margin-bottom: 1.25rem;
}
.renewal-stat {
  background: var(--ghost);
  border-radius: var(--radius-sm);
  padding: 1rem;
  text-align: center;
}
.renewal-stat-value {
  font-family: 'Outfit', sans-serif;
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.renewal-stat-label {
  font-size: 0.7rem;
  color: var(--silver);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-top: 2px;
}
.renewal-stat.urgent .renewal-stat-value { color: var(--orange-light); }
.renewal-stat.soon .renewal-stat-value { color: var(--yellow); }
.renewal-stat.upcoming .renewal-stat-value { color: var(--blue-glow); }

/* ─── RENEWAL MONTHLY BAR ─── */
.renewal-months {
  display: flex;
  gap: 6px;
  align-items: flex-end;
  height: 120px;
  padding: 0 4px;
  margin-bottom: 1.5rem;
}
.renewal-month-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  height: 100%;
  justify-content: flex-end;
}
.renewal-month-bar {
  width: 100%;
  background: var(--blue);
  border-radius: 4px 4px 2px 2px;
  min-height: 2px;
  transition: height 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  position: relative;
  opacity: 0.7;
}
.renewal-month-bar.has-urgent { background: var(--orange); opacity: 0.9; }
.renewal-month-bar.has-soon { background: var(--yellow); opacity: 0.8; }
.renewal-month-count {
  font-family: 'Outfit', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--white);
}
.renewal-month-label {
  font-size: 0.62rem;
  color: var(--silver);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  writing-mode: horizontal-tb;
}

/* ─── TABLE ─── */
.table-wrap {
  overflow-x: auto;
  border-radius: var(--radius-sm);
  border: 1px solid var(--card-border);
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.82rem;
}
thead th {
  background: var(--ghost);
  padding: 10px 14px;
  text-align: left;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--silver);
  font-weight: 600;
  white-space: nowrap;
  border-bottom: 1px solid var(--card-border);
}
tbody tr {
  border-bottom: 1px solid var(--ghost);
  transition: background 0.15s;
}
tbody tr:hover { background: var(--ghost-hover); }
tbody tr:last-child { border-bottom: none; }
tbody td {
  padding: 10px 14px;
  white-space: nowrap;
}
.urgency-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 8px;
}
.urgency-dot.urgent { background: var(--orange); box-shadow: 0 0 8px rgba(238,83,61,0.4); }
.urgency-dot.soon { background: var(--yellow); }
.urgency-dot.normal { background: var(--tonal); }

.units-badge {
  background: var(--ghost);
  padding: 2px 10px;
  border-radius: 12px;
  font-weight: 600;
  font-size: 0.78rem;
}

/* ─── TWO COL LAYOUT ─── */
.two-col {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 1.5rem;
}

/* ─── REP LEADERBOARD ─── */
.rep-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--ghost);
}
.rep-row:last-child { border-bottom: none; }
.rep-rank {
  font-family: 'Outfit', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--silver);
  width: 24px;
  text-align: center;
}
.rep-rank.gold { color: var(--yellow); }
.rep-rank.silver { color: #C0C0C0; }
.rep-rank.bronze { color: #CD7F32; }
.rep-avatar {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--tonal);
  display: grid; place-items: center;
  font-weight: 700;
  font-size: 0.72rem;
  color: var(--baby-blue);
}
.rep-info { flex: 1; }
.rep-name {
  font-weight: 600;
  font-size: 0.85rem;
}
.rep-deals {
  font-size: 0.72rem;
  color: var(--silver);
}
.rep-units {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--blue-glow);
}
.rep-units small {
  font-size: 0.65rem;
  color: var(--silver);
  font-weight: 500;
  margin-left: 2px;
}

/* ─── LOADING ─── */
.loading-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 1.5rem;
}
.loader {
  width: 48px; height: 48px;
  border: 3px solid var(--ghost);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-size: 0.9rem;
  color: var(--silver);
}

/* ─── ERROR STATE ─── */
.error-card {
  background: var(--card-bg);
  border: 1px solid rgba(238,83,61,0.3);
  border-radius: var(--radius);
  padding: 2.5rem;
  text-align: center;
  max-width: 560px;
  margin: 4rem auto;
}
.error-card h2 {
  font-family: 'Outfit', sans-serif;
  font-size: 1.3rem;
  margin-bottom: 0.75rem;
  color: var(--orange-light);
}
.error-card p {
  color: var(--silver);
  font-size: 0.88rem;
  line-height: 1.6;
  margin-bottom: 1rem;
}
.error-card code {
  background: var(--ghost);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.82rem;
}
.error-card ol {
  text-align: left;
  color: var(--silver);
  font-size: 0.85rem;
  line-height: 1.8;
  padding-left: 1.5rem;
}

/* ─── RESPONSIVE ─── */
@media (max-width: 1100px) {
  .two-col { grid-template-columns: 1fr; }
}
@media (max-width: 768px) {
  .topnav { padding: 0 1rem; }
  .main { padding: 1rem; }
  .kpi-strip { grid-template-columns: repeat(2, 1fr); }
  .kpi-value { font-size: 1.6rem; }
  .chart-row { grid-template-columns: 70px 1fr 50px; }
}
@media (max-width: 480px) {
  .kpi-strip { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="topnav">
  <div class="topnav-left">
    <div class="logo-mark">L</div>
    <h1>Autopilot Dashboard<span>Multifamily Partnerships</span></h1>
  </div>
  <div class="topnav-right">
    <span><span class="status-dot"></span>Live Data</span>
    <span id="last-updated"></span>
  </div>
</nav>

<!-- MAIN -->
<div class="main" id="app">
  <div class="loading-screen" id="loading">
    <div class="loader"></div>
    <div class="loading-text">Pulling latest deal data...</div>
  </div>
</div>

<script>
// ─── CONFIG ───
const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTGbdrb1E8-Ctt4eSJ4A_fsth1CgTCw3zdD_cqVcGLAoQiMh2r_5mN5opRvlW0tYTO7aLvkz-IZm3XH/pub?output=csv';
const NOW = new Date();
const CUR_YEAR = NOW.getFullYear();
const PREV_YEAR = CUR_YEAR - 1;
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const QUARTER_NAMES = ['Q1','Q2','Q3','Q4'];

// ─── CSV PARSER ───
function parseCSV(text) {
  const lines = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (inQuotes && text[i+1] === '"') { current += '"'; i++; }
      else { inQuotes = !inQuotes; }
    } else if (ch === ',' && !inQuotes) {
      lines.push(current); current = '';
    } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
      if (ch === '\r' && text[i+1] === '\n') i++;
      lines.push(current); current = '%%ROW%%';
    } else {
      current += ch;
    }
  }
  lines.push(current);

  const rows = [];
  let row = [];
  for (const cell of lines) {
    if (cell === '%%ROW%%') {
      if (row.length) rows.push(row);
      row = [];
    } else {
      row.push(cell.trim());
    }
  }
  if (row.length) rows.push(row);

  if (!rows.length) return [];
  const headers = rows[0];
  return rows.slice(1).map(r => {
    const obj = {};
    headers.forEach((h, i) => obj[h] = r[i] || '');
    return obj;
  });
}

// ─── DATE HELPERS ───
function parseDate(s) {
  if (!s) return null;
  const d = new Date(s + 'T00:00:00');
  return isNaN(d) ? null : d;
}

function getWeekNum(d) {
  const start = new Date(d.getFullYear(), 0, 1);
  return Math.ceil(((d - start) / 86400000 + start.getDay() + 1) / 7);
}

function getQuarter(d) { return Math.floor(d.getMonth() / 3); }

function addMonths(d, n) {
  const r = new Date(d);
  r.setMonth(r.getMonth() + n);
  return r;
}

function daysBetween(a, b) {
  return Math.floor((b - a) / 86400000);
}

function formatDate(d) {
  return `${MONTH_NAMES[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function extractFirstName(email) {
  if (!email || !email.includes('@')) return email || '—';
  const local = email.split('@')[0];
  const parts = local.split('.');
  return parts[0].charAt(0).toUpperCase() + parts[0].slice(1);
}

// ─── RENDER ENGINE ───
function render(deals) {
  const app = document.getElementById('app');

  // Filter deals with valid sign dates
  const validDeals = deals.filter(d => {
    const dt = parseDate(d['Contract Signed Date']);
    return dt && !isNaN(dt);
  }).map(d => ({
    ...d,
    signDate: parseDate(d['Contract Signed Date']),
    units: parseInt(d['Total Unit Count']) || 0,
    renewalDate: addMonths(parseDate(d['Contract Signed Date']), 12),
    rep: d['AP Sales Person'] || '',
    partner: d['Partner'] || '—',
    property: d['Property Name'] || '—',
    market: d['Market'] || '—'
  }));

  const curDeals = validDeals.filter(d => d.signDate.getFullYear() === CUR_YEAR);
  const prevDeals = validDeals.filter(d => d.signDate.getFullYear() === PREV_YEAR);

  // Current period boundaries
  const curMonth = NOW.getMonth();
  const curQuarter = getQuarter(NOW);
  const curWeek = getWeekNum(NOW);

  // YTD: up to current date equivalent
  const ytdCur = curDeals.filter(d => d.signDate <= NOW);
  const prevYtdEnd = new Date(PREV_YEAR, curMonth, NOW.getDate());
  const ytdPrev = prevDeals.filter(d => d.signDate <= prevYtdEnd);

  // Quarter
  const qCur = curDeals.filter(d => getQuarter(d.signDate) === curQuarter);
  const qPrev = prevDeals.filter(d => getQuarter(d.signDate) === curQuarter && d.signDate <= new Date(PREV_YEAR, NOW.getMonth(), NOW.getDate()));

  // Month
  const mCur = curDeals.filter(d => d.signDate.getMonth() === curMonth);
  const mPrev = prevDeals.filter(d => d.signDate.getMonth() === curMonth && d.signDate.getDate() <= NOW.getDate());

  // Week
  const wCur = curDeals.filter(d => getWeekNum(d.signDate) === curWeek);
  const wPrev = prevDeals.filter(d => getWeekNum(d.signDate) === curWeek);

  const sum = (arr) => arr.reduce((s, d) => s + d.units, 0);

  function badge(cur, prev) {
    const diff = cur - prev;
    if (diff > 0) return `<span class="kpi-badge ahead"><svg viewBox="0 0 12 12"><path d="M6 2L10 8H2L6 2Z" fill="currentColor"/></svg>+${diff} vs ${PREV_YEAR}</span>`;
    if (diff < 0) return `<span class="kpi-badge behind"><svg viewBox="0 0 12 12"><path d="M6 10L2 4H10L6 10Z" fill="currentColor"/></svg>${diff} vs ${PREV_YEAR}</span>`;
    return `<span class="kpi-badge neutral">= ${PREV_YEAR}</span>`;
  }

  // Renewals
  const renewals = validDeals.map(d => ({
    ...d,
    daysUntilRenewal: daysBetween(NOW, d.renewalDate)
  })).filter(d => d.daysUntilRenewal >= -30 && d.daysUntilRenewal <= 365)
    .sort((a, b) => a.renewalDate - b.renewalDate);

  const urgentRenewals = renewals.filter(d => d.daysUntilRenewal <= 30);
  const soonRenewals = renewals.filter(d => d.daysUntilRenewal > 30 && d.daysUntilRenewal <= 90);
  const upcomingRenewals = renewals.filter(d => d.daysUntilRenewal > 0 && d.daysUntilRenewal <= 180);

  // Monthly renewal sums (next 12 months)
  const renewalMonths = [];
  for (let i = 0; i < 12; i++) {
    const mStart = new Date(CUR_YEAR, curMonth + i, 1);
    const mEnd = new Date(CUR_YEAR, curMonth + i + 1, 0);
    const mRenewals = renewals.filter(d => d.renewalDate >= mStart && d.renewalDate <= mEnd);
    renewalMonths.push({
      label: MONTH_NAMES[mStart.getMonth()] + ' ' + String(mStart.getFullYear()).slice(2),
      units: sum(mRenewals),
      deals: mRenewals.length,
      isUrgent: i === 0,
      isSoon: i === 1 || i === 2
    });
  }
  const maxRenewalUnits = Math.max(...renewalMonths.map(m => m.units), 1);

  // Rep leaderboard (current year)
  const repMap = {};
  curDeals.forEach(d => {
    const name = extractFirstName(d.rep);
    if (name === '—' || !d.rep.includes('@')) return;
    if (!repMap[name]) repMap[name] = { deals: 0, units: 0, email: d.rep };
    repMap[name].deals++;
    repMap[name].units += d.units;
  });
  const reps = Object.entries(repMap).map(([name, v]) => ({ name, ...v })).sort((a, b) => b.units - a.units);

  // ─── BUILD HTML ───
  let html = '';

  // KPI STRIP
  html += `<div class="kpi-strip">
    <div class="kpi-card">
      <div class="kpi-label">Deals YTD (${CUR_YEAR})</div>
      <div class="kpi-value">${ytdCur.length}</div>
      ${badge(ytdCur.length, ytdPrev.length)}
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Units YTD</div>
      <div class="kpi-value">${sum(ytdCur).toLocaleString()}</div>
      ${badge(sum(ytdCur), sum(ytdPrev))}
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Deals This Quarter</div>
      <div class="kpi-value">${qCur.length}</div>
      ${badge(qCur.length, qPrev.length)}
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Units This Quarter</div>
      <div class="kpi-value">${sum(qCur).toLocaleString()}</div>
      ${badge(sum(qCur), sum(qPrev))}
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Deals This Month</div>
      <div class="kpi-value">${mCur.length}</div>
      ${badge(mCur.length, mPrev.length)}
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Renewals Next 90 Days</div>
      <div class="kpi-value" style="color:${urgentRenewals.length > 0 ? 'var(--orange-light)' : 'var(--white)'}">${urgentRenewals.length + soonRenewals.length}</div>
      <span class="kpi-badge ${urgentRenewals.length > 3 ? 'behind' : 'neutral'}">${sum(urgentRenewals.concat(soonRenewals))} units at risk</span>
    </div>
  </div>`;

  // DEALS PERFORMANCE
  html += `<div class="section" id="perf-section">
    <div class="section-header">
      <div class="section-title">Deals Performance<small>${CUR_YEAR} vs ${PREV_YEAR}</small></div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div class="metric-toggle">
          <button class="metric-btn active" onclick="setMetric('deals')">Deals</button>
          <button class="metric-btn" onclick="setMetric('units')">Units</button>
        </div>
        <div class="tabs">
          <button class="tab-btn active" onclick="setView('monthly')">Monthly</button>
          <button class="tab-btn" onclick="setView('weekly')">Weekly</button>
          <button class="tab-btn" onclick="setView('quarterly')">Quarterly</button>
        </div>
      </div>
    </div>
    <div id="chart-area"></div>
    <div class="chart-legend">
      <div class="legend-item"><div class="legend-dot current"></div>${CUR_YEAR}</div>
      <div class="legend-item"><div class="legend-dot previous"></div>${PREV_YEAR}</div>
    </div>
  </div>`;

  // TWO-COL: RENEWALS + LEADERBOARD
  html += `<div class="two-col">`;

  // RENEWALS
  html += `<div class="section" style="animation-delay:0.4s">
    <div class="section-header">
      <div class="section-title">Partner Contract Renewals<small>Sign Date + 12 Months</small></div>
    </div>
    <div class="renewal-stats">
      <div class="renewal-stat urgent">
        <div class="renewal-stat-value">${sum(urgentRenewals)}</div>
        <div class="renewal-stat-label">Units &le; 30 Days</div>
      </div>
      <div class="renewal-stat soon">
        <div class="renewal-stat-value">${sum(soonRenewals)}</div>
        <div class="renewal-stat-label">Units 31-90 Days</div>
      </div>
      <div class="renewal-stat upcoming">
        <div class="renewal-stat-value">${sum(upcomingRenewals)}</div>
        <div class="renewal-stat-label">Units Next 6 Mo</div>
      </div>
    </div>
    <div style="font-size:0.72rem;color:var(--silver);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:6px;">Units Renewing by Month</div>
    <div class="renewal-months">
      ${renewalMonths.map(m => `
        <div class="renewal-month-col">
          <div class="renewal-month-count">${m.units || ''}</div>
          <div class="renewal-month-bar ${m.isUrgent ? 'has-urgent' : m.isSoon ? 'has-soon' : ''}" style="height:${Math.max((m.units / maxRenewalUnits) * 80, 2)}px"></div>
          <div class="renewal-month-label">${m.label}</div>
        </div>
      `).join('')}
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th></th><th>Property</th><th>Partner</th><th>Market</th><th>Units</th><th>Renewal Date</th><th>Rep</th>
        </tr></thead>
        <tbody>
          ${upcomingRenewals.slice(0, 30).map(d => {
            const urg = d.daysUntilRenewal <= 30 ? 'urgent' : d.daysUntilRenewal <= 90 ? 'soon' : 'normal';
            return `<tr>
              <td><span class="urgency-dot ${urg}"></span></td>
              <td style="font-weight:600">${d.property}</td>
              <td>${d.partner}</td>
              <td>${d.market}</td>
              <td><span class="units-badge">${d.units}</span></td>
              <td>${formatDate(d.renewalDate)}</td>
              <td>${extractFirstName(d.rep)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;

  // REP LEADERBOARD
  html += `<div class="section" style="animation-delay:0.45s">
    <div class="section-header">
      <div class="section-title">Rep Leaderboard<small>${CUR_YEAR} YTD</small></div>
    </div>
    ${reps.map((r, i) => `
      <div class="rep-row">
        <div class="rep-rank ${i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : ''}">${i + 1}</div>
        <div class="rep-avatar">${r.name.slice(0, 2).toUpperCase()}</div>
        <div class="rep-info">
          <div class="rep-name">${r.name}</div>
          <div class="rep-deals">${r.deals} deals</div>
        </div>
        <div class="rep-units">${r.units}<small>units</small></div>
      </div>
    `).join('')}
  </div>`;

  html += `</div>`; // end two-col

  app.innerHTML = html;

  // Store data for chart rendering
  window._dashData = { curDeals, prevDeals, validDeals };
  setView('monthly');

  document.getElementById('last-updated').textContent = 'Updated ' + NOW.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
}

// ─── CHART RENDERING ───
let currentView = 'monthly';
let currentMetric = 'deals';

function setView(view) {
  currentView = view;
  document.querySelectorAll('.tabs .tab-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === view));
  renderChart();
}

function setMetric(metric) {
  currentMetric = metric;
  document.querySelectorAll('.metric-toggle .metric-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === metric));
  renderChart();
}

function renderChart() {
  const { curDeals, prevDeals } = window._dashData;
  const area = document.getElementById('chart-area');
  if (!area) return;

  const sum = (arr) => arr.reduce((s, d) => s + d.units, 0);
  const metric = currentMetric === 'units' ? (arr) => sum(arr) : (arr) => arr.length;

  let buckets = [];

  if (currentView === 'monthly') {
    for (let m = 0; m < 12; m++) {
      const cur = curDeals.filter(d => d.signDate.getMonth() === m);
      const prev = prevDeals.filter(d => d.signDate.getMonth() === m);
      // Only show months up to current month for current year
      const isFuture = m > NOW.getMonth();
      buckets.push({ label: MONTH_NAMES[m], cur: isFuture ? 0 : metric(cur), prev: metric(prev), isFuture });
    }
  } else if (currentView === 'quarterly') {
    for (let q = 0; q < 4; q++) {
      const cur = curDeals.filter(d => getQuarter(d.signDate) === q);
      const prev = prevDeals.filter(d => getQuarter(d.signDate) === q);
      const isFuture = q > getQuarter(NOW);
      buckets.push({ label: QUARTER_NAMES[q], cur: isFuture ? 0 : metric(cur), prev: metric(prev), isFuture });
    }
  } else if (currentView === 'weekly') {
    // Show last 12 weeks
    const curWeek = getWeekNum(NOW);
    for (let w = Math.max(1, curWeek - 11); w <= curWeek; w++) {
      const cur = curDeals.filter(d => getWeekNum(d.signDate) === w);
      const prev = prevDeals.filter(d => getWeekNum(d.signDate) === w);
      buckets.push({ label: `Wk ${w}`, cur: metric(cur), prev: metric(prev), isFuture: false });
    }
  }

  const maxVal = Math.max(...buckets.flatMap(b => [b.cur, b.prev]), 1);

  area.innerHTML = `<div class="chart-container">
    ${buckets.map(b => {
      const diff = b.cur - b.prev;
      const cls = b.isFuture ? 'neutral' : diff > 0 ? 'ahead' : diff < 0 ? 'behind' : 'neutral';
      const sign = diff > 0 ? '+' : '';
      return `<div class="chart-row">
        <div class="chart-label">${b.label}</div>
        <div class="chart-bars">
          <div class="bar-track"><div class="bar-fill current" style="width:${(b.cur / maxVal) * 100}%">${b.cur || ''}</div></div>
          <div class="bar-track"><div class="bar-fill previous" style="width:${(b.prev / maxVal) * 100}%">${b.prev || ''}</div></div>
        </div>
        <div class="chart-delta ${cls}">${b.isFuture ? '—' : (diff === 0 ? '=' : sign + diff)}</div>
      </div>`;
    }).join('')}
  </div>`;
}

// ─── FETCH & BOOT ───
async function boot() {
  try {
    const resp = await fetch(SHEET_CSV);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    const deals = parseCSV(text);
    if (!deals.length) throw new Error('No data parsed');
    render(deals);
  } catch (err) {
    console.error(err);
    document.getElementById('app').innerHTML = `
      <div class="error-card">
        <h2>Unable to Load Data</h2>
        <p>The dashboard couldn't access the Google Sheet. This usually means the sheet isn't publicly shared.</p>
        <ol>
          <li>Open the <a href="https://docs.google.com/spreadsheets/d/1Mt_laFNgojNhNMHPYrlQo85dDywjWTF7W2YohR5M520/edit" target="_blank" style="color:var(--blue-glow)">New Deal Worksheet</a></li>
          <li>Click <strong>Share</strong> in the top right</li>
          <li>Under "General access," select <strong>Anyone with the link</strong></li>
          <li>Set permission to <strong>Viewer</strong></li>
          <li>Refresh this dashboard</li>
        </ol>
        <p style="margin-top:1rem;font-size:0.78rem;">Error: <code>${err.message}</code></p>
      </div>
    `;
  }
}

boot();
</script>
</body>
</html>
