<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autopilot Dashboard — Landing</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231A61D9'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='20' fill='white'%3EL%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --navy: #15192D;
  --navy-mid: #1C2038;
  --navy-light: #232842;
  --tonal: #2D3654;
  --blue: #1A61D9;
  --blue-glow: #2B7AFF;
  --baby-blue: #E7EFfb;
  --green: #08786C;
  --green-light: #0A9B8B;
  --orange: #EE533D;
  --orange-light: #FF7A68;
  --yellow: #FFD426;
  --white: #F0F0F0;
  --silver: #8B90A0;
  --ghost: rgba(255,255,255,0.06);
  --ghost-hover: rgba(255,255,255,0.10);
  --card-bg: #1A1E34;
  --card-border: rgba(255,255,255,0.06);
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 2px 20px rgba(0,0,0,0.3);
}

html { font-size: 15px; }

body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--navy);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── AMBIENT BACKGROUND ─── */
body::before {
  content: '';
  position: fixed;
  top: -40%; left: -20%;
  width: 80vw; height: 80vw;
  background: radial-gradient(ellipse, rgba(26,97,217,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -30%; right: -10%;
  width: 60vw; height: 60vw;
  background: radial-gradient(ellipse, rgba(8,120,108,0.04) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ─── TOP NAV ─── */
.topnav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(21,25,45,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--card-border);
  padding: 0 2rem;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.topnav-left {
  display: flex;
  align-items: center;
  gap: 1rem;
}
.logo-mark {
  width: 36px; height: 36px;
  background: var(--blue);
  border-radius: 10px;
  display: grid; place-items: center;
  font-family: 'Outfit', sans-serif;
  font-weight: 800;
  font-size: 1.2rem;
  color: #fff;
  letter-spacing: -0.5px;
}
.topnav h1 {
  font-family: 'Outfit', sans-serif;
  font-size: 1.25rem;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: #fff;
}
.topnav h1 span {
  font-weight: 400;
  color: var(--silver);
  margin-left: 0.5rem;
}
.topnav-right {
  display: flex;
  align-items: center;
  gap: 1.5rem;
  font-size: 0.82rem;
  color: var(--silver);
}
.status-dot {
  width: 7px; height: 7px;
  background: var(--green-light);
  border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
  animation: pulse-dot 2s ease infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ─── MAIN LAYOUT ─── */
.main {
  position: relative; z-index: 1;
  max-width: 1440px;
  margin: 0 auto;
  padding: 1.5rem 2rem 3rem;
}

/* ─── KPI STRIP ─── */
.kpi-strip {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.kpi-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 1.25rem 1.5rem;
  position: relative;
  overflow: hidden;
  opacity: 0;
  transform: translateY(12px);
  animation: card-in 0.5s ease forwards;
}
.kpi-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--blue);
  opacity: 0.6;
}

/* Hero KPI cards */
.kpi-hero-strip {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1rem;
  margin-bottom: 0.75rem;
}
.kpi-card.hero {
  padding: 1.75rem 2rem 1.5rem;
  background: linear-gradient(135deg, var(--card-bg) 0%, var(--navy-light) 100%);
  border: 1px solid rgba(255,255,255,0.08);
}
.kpi-card.hero .kpi-value {
  font-size: 2.8rem;
  letter-spacing: -1.5px;
  margin-bottom: 0.75rem;
}
.kpi-card.hero .kpi-label {
  font-size: 0.78rem;
  letter-spacing: 1.5px;
  margin-bottom: 0.75rem;
}
.kpi-card.hero::before {
  height: 4px;
  opacity: 0.9;
}
.kpi-card.hero.green::before { background: var(--green-light); }
.kpi-card.hero.blue::before { background: var(--blue-glow); }
.kpi-card.hero.orange::before { background: var(--orange); }

/* Secondary KPI row */
.kpi-secondary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 0.75rem;
  margin-bottom: 1.5rem;
}
.kpi-secondary .kpi-card {
  padding: 1rem 1.25rem;
}
.kpi-secondary .kpi-card .kpi-value {
  font-size: 1.5rem;
  margin-bottom: 0.5rem;
}
.kpi-secondary .kpi-card .kpi-label {
  font-size: 0.65rem;
  margin-bottom: 0.4rem;
}
.kpi-card:nth-child(1) { animation-delay: 0.05s; }
.kpi-card:nth-child(2) { animation-delay: 0.1s; }
.kpi-card:nth-child(3) { animation-delay: 0.15s; }
.kpi-card:nth-child(4) { animation-delay: 0.2s; }
.kpi-card:nth-child(5) { animation-delay: 0.25s; }
.kpi-card:nth-child(6) { animation-delay: 0.3s; }

@keyframes card-in {
  to { opacity: 1; transform: translateY(0); }
}

.kpi-label {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--silver);
  font-weight: 600;
  margin-bottom: 0.6rem;
}
.kpi-value {
  font-family: 'Outfit', sans-serif;
  font-size: 2.2rem;
  font-weight: 700;
  letter-spacing: -1px;
  line-height: 1;
  margin-bottom: 0.6rem;
}
.kpi-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 0.72rem;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  margin-top: 2px;
}
.kpi-badge.ahead {
  background: rgba(8,120,108,0.15);
  color: var(--green-light);
}
.kpi-badge.behind {
  background: rgba(238,83,61,0.15);
  color: var(--orange-light);
}
.kpi-badge.neutral {
  background: rgba(255,212,38,0.12);
  color: var(--yellow);
}
.kpi-badge svg { width: 12px; height: 12px; }

/* ─── SECTION PANELS ─── */
.section {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  opacity: 0;
  transform: translateY(12px);
  animation: card-in 0.6s ease forwards;
  animation-delay: 0.35s;
}
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
  gap: 0.75rem;
}
.section-title {
  font-family: 'Outfit', sans-serif;
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.section-title small {
  font-weight: 400;
  color: var(--silver);
  font-size: 0.8rem;
  margin-left: 0.5rem;
}

/* ─── TABS ─── */
.tabs {
  display: flex;
  gap: 4px;
  background: var(--ghost);
  border-radius: var(--radius-sm);
  padding: 3px;
}
.tab-btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  padding: 6px 16px;
  border: none;
  background: transparent;
  color: var(--silver);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
}
.tab-btn:hover { color: var(--white); }
.tab-btn.active {
  background: var(--blue);
  color: #fff;
}

/* ─── METRIC TOGGLE ─── */
.metric-toggle {
  display: flex;
  gap: 4px;
  background: var(--ghost);
  border-radius: var(--radius-sm);
  padding: 3px;
}
.metric-btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.72rem;
  font-weight: 600;
  padding: 4px 12px;
  border: none;
  background: transparent;
  color: var(--silver);
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.2s;
}
.metric-btn:hover { color: var(--white); }
.metric-btn.active {
  background: var(--tonal);
  color: var(--white);
}

/* ─── BAR CHART ─── */
.chart-container {
  margin-top: 1rem;
}
.chart-row {
  display: grid;
  grid-template-columns: minmax(100px, auto) 1fr 60px;
  align-items: center;
  gap: 12px;
  padding: 6px 0;
  border-bottom: 1px solid var(--ghost);
}
.chart-row:last-child { border-bottom: none; }
.chart-label {
  font-size: 0.78rem;
  color: var(--silver);
  font-weight: 500;
  white-space: nowrap;
}
.chart-bars {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.bar-track {
  height: 16px;
  background: var(--ghost);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}
.bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  display: flex;
  align-items: center;
  padding-left: 8px;
  font-size: 0.65rem;
  font-weight: 600;
  color: rgba(255,255,255,0.9);
  min-width: 0;
}
.bar-fill.current { background: var(--blue); }
.bar-fill.previous { background: var(--silver); opacity: 0.5; }

.chart-delta {
  font-size: 0.78rem;
  font-weight: 600;
  text-align: right;
}
.chart-delta.ahead { color: var(--green-light); }
.chart-delta.behind { color: var(--orange-light); }
.chart-delta.neutral { color: var(--silver); }

.chart-legend {
  display: flex;
  gap: 1.5rem;
  margin-top: 1rem;
  padding-top: 0.75rem;
  border-top: 1px solid var(--ghost);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.75rem;
  color: var(--silver);
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 3px;
}
.legend-dot.current { background: var(--blue); }
.legend-dot.previous { background: var(--silver); opacity: 0.5; }

/* ─── RENEWAL CARDS ─── */
.renewal-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 0.75rem;
  margin-bottom: 1.25rem;
}
.renewal-stat {
  background: var(--ghost);
  border-radius: var(--radius-sm);
  padding: 1rem;
  text-align: center;
}
.renewal-stat-value {
  font-family: 'Outfit', sans-serif;
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.renewal-stat-label {
  font-size: 0.7rem;
  color: var(--silver);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-top: 2px;
}
.renewal-stat.urgent .renewal-stat-value { color: var(--orange-light); }
.renewal-stat.soon .renewal-stat-value { color: var(--yellow); }
.renewal-stat.upcoming .renewal-stat-value { color: var(--blue-glow); }

/* ─── RENEWAL MONTHLY BAR ─── */
.renewal-months {
  display: flex;
  gap: 6px;
  align-items: flex-end;
  height: 120px;
  padding: 0 4px;
  margin-bottom: 1.5rem;
}
.renewal-month-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  height: 100%;
  justify-content: flex-end;
}
.renewal-month-bar {
  width: 100%;
  background: var(--blue);
  border-radius: 4px 4px 2px 2px;
  min-height: 2px;
  transition: height 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  position: relative;
  opacity: 0.7;
}
.renewal-month-bar.has-urgent { background: var(--orange); opacity: 0.9; }
.renewal-month-bar.has-soon { background: var(--yellow); opacity: 0.8; }
.renewal-month-count {
  font-family: 'Outfit', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--white);
}
.renewal-month-label {
  font-size: 0.62rem;
  color: var(--silver);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  writing-mode: horizontal-tb;
}

/* ─── TABLE ─── */
.table-wrap {
  overflow-x: auto;
  border-radius: var(--radius-sm);
  border: 1px solid var(--card-border);
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.82rem;
}
thead th {
  background: var(--ghost);
  padding: 10px 14px;
  text-align: left;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--silver);
  font-weight: 600;
  white-space: nowrap;
  border-bottom: 1px solid var(--card-border);
}
tbody tr {
  border-bottom: 1px solid var(--ghost);
  transition: background 0.15s;
}
tbody tr:hover { background: var(--ghost-hover); }
tbody tr:last-child { border-bottom: none; }
tbody td {
  padding: 10px 14px;
  white-space: nowrap;
}
.urgency-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 8px;
}
.urgency-dot.urgent { background: var(--orange); box-shadow: 0 0 8px rgba(238,83,61,0.4); }
.urgency-dot.soon { background: var(--yellow); }
.urgency-dot.normal { background: var(--tonal); }

.units-badge {
  background: var(--ghost);
  padding: 2px 10px;
  border-radius: 12px;
  font-weight: 600;
  font-size: 0.78rem;
}

/* ─── TWO COL LAYOUT ─── */
.two-col {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 1.5rem;
}

/* ─── REP LEADERBOARD ─── */
.rep-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--ghost);
}
.rep-row:last-child { border-bottom: none; }
.rep-rank {
  font-family: 'Outfit', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--silver);
  width: 24px;
  text-align: center;
}
.rep-rank.gold { color: var(--silver); }
.rep-rank.silver { color: var(--silver); }
.rep-rank.bronze { color: var(--silver); }
.rep-avatar {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--tonal);
  display: grid; place-items: center;
  font-weight: 700;
  font-size: 0.72rem;
  color: var(--baby-blue);
}
.rep-info { flex: 1; }
.rep-name {
  font-weight: 600;
  font-size: 0.85rem;
}
.rep-deals {
  font-size: 0.72rem;
  color: var(--silver);
}
.rep-units {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--white);
}
.rep-units small {
  font-size: 0.65rem;
  color: var(--silver);
  font-weight: 500;
  margin-left: 2px;
}

/* ─── LOADING ─── */
.loading-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 1.5rem;
}
.loader {
  width: 48px; height: 48px;
  border: 3px solid var(--ghost);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-size: 0.9rem;
  color: var(--silver);
}

/* ─── ERROR STATE ─── */
.error-card {
  background: var(--card-bg);
  border: 1px solid rgba(238,83,61,0.3);
  border-radius: var(--radius);
  padding: 2.5rem;
  text-align: center;
  max-width: 560px;
  margin: 4rem auto;
}
/* ─── SPARKLINE ─── */
.sparkline {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 24px;
  margin-top: 6px;
  opacity: 0.4;
}
.spark-bar {
  flex: 1;
  background: var(--white);
  border-radius: 1px;
  min-height: 2px;
}
.kpi-card.hero.green .spark-bar { background: var(--green-light); }
.kpi-card.hero.orange .spark-bar { background: var(--orange-light); }
.kpi-card.hero.blue .spark-bar { background: var(--blue-glow); }

/* ─── DEAL TYPE PILLS ─── */
.deal-type-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.deal-type-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--ghost);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 0.75rem;
  color: var(--white);
}
.deal-type-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
}
.deal-type-pill .dt-count {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
}

/* ─── SECTION LABEL DIVIDER ─── */
.section-divider {
  font-size: 0.62rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--silver);
  font-weight: 600;
  margin: 0.25rem 0 0.5rem;
  opacity: 0.6;
}

/* ─── REP SCORECARD ─── */
.scorecard {
  background: linear-gradient(180deg, var(--card-bg) 0%, rgba(21,25,45,0.95) 100%);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  opacity: 0;
  transform: translateY(12px);
  animation: card-in 0.6s ease forwards;
  animation-delay: 0.3s;
}
.scorecard-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0 3px;
}
.scorecard-table thead th {
  background: transparent;
  padding: 10px 16px 14px;
  text-align: center;
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 1.4px;
  color: var(--silver);
  font-weight: 600;
  white-space: nowrap;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.scorecard-table thead th:first-child {
  text-align: left;
  width: 160px;
}
.scorecard-table tbody tr {
  transition: all 0.2s;
  border-radius: 8px;
}
.scorecard-table tbody tr td {
  background: rgba(255,255,255,0.02);
  border-top: 1px solid transparent;
  border-bottom: 1px solid transparent;
}
.scorecard-table tbody tr td:first-child { border-radius: 8px 0 0 8px; border-left: 1px solid transparent; }
.scorecard-table tbody tr td:last-child { border-radius: 0 8px 8px 0; border-right: 1px solid transparent; }
.scorecard-table tbody tr:hover td {
  background: rgba(255,255,255,0.05);
  border-color: rgba(255,255,255,0.06);
}
/* Top 3 rows get a subtle left accent */
.scorecard-table tbody tr.sc-top td:first-child {
  border-left: 3px solid var(--blue);
}
.scorecard-table tbody tr.sc-top td {
  background: rgba(26,97,217,0.04);
}
.scorecard-table tbody tr.sc-top:hover td {
  background: rgba(26,97,217,0.08);
}
.scorecard-table tbody td {
  padding: 12px 16px;
  text-align: center;
  font-family: 'Outfit', sans-serif;
  font-size: 1.05rem;
  font-weight: 600;
  color: rgba(240,240,240,0.85);
}
.scorecard-table tbody tr.sc-top td {
  color: var(--white);
  font-weight: 700;
}
.scorecard-table tbody td:first-child {
  text-align: left;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  letter-spacing: 0.2px;
}
.scorecard-table tfoot td {
  padding: 14px 16px;
  text-align: center;
  font-family: 'Outfit', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--white);
  border-top: 1px solid rgba(255,255,255,0.1);
  background: transparent;
}
.scorecard-table tfoot td:first-child {
  text-align: left;
  font-family: 'DM Sans', sans-serif;

.sc-rank {

  height: 24px;
  border-radius: 7px;
  font-size: 0.7rem;

  color: var(--silver);
  vertical-align: middle;
}
.sc-rank.top {

}

/* Column group headers */

/* Column dividers */

/* Inline progress bar for YTD units */

  padding: 16px 16px;
  background: rgba(26,97,217,0.03);

/* #1 rank subtle pulse */

  0%, 100% { box-shadow: 0 2px 8px rgba(26,97,217,0.3); }
  50% { box-shadow: 0 2px 14px rgba(26,97,217,0.5); }

<!-- TOP NAV -->
<nav class="topnav">
  <div class="topnav-left">
    <div class="logo-mark">L</div>
    <h1>Autopilot Dashboard<span>Multifamily Partnerships</span></h1>
  </div>
  <div class="topnav-right">
    <span><span class="status-dot"></span>Live Data</span>
    <span id="last-updated"></span>
  </div>
</nav>

<!-- MAIN -->
<div class="main" id="app">
  <div class="loading-screen" id="loading">
    <div class="loader"></div>
    <div class="loading-text">Pulling latest deal data...</div>
  </div>
</div>

<script>
// ─── CONFIG ───
const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTGbdrb1E8-Ctt4eSJ4A_fsth1CgTCw3zdD_cqVcGLAoQiMh2r_5mN5opRvlW0tYTO7aLvkz-IZm3XH/pub?output=csv';
const DEINSTALL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTGbdrb1E8-Ctt4eSJ4A_fsth1CgTCw3zdD_cqVcGLAoQiMh2r_5mN5opRvlW0tYTO7aLvkz-IZm3XH/pub?gid=1480705445&single=true&output=csv';
const HS_PORTAL = '20754835';
const HS_DEALS_API = '/api/hubspot-deals';
const NOW = new Date();
const CUR_YEAR = NOW.getFullYear();
const PREV_YEAR = CUR_YEAR - 1;
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const QUARTER_NAMES = ['Q1','Q2','Q3','Q4'];

// ─── CSV PARSER ───
function parseCSV(text) {
  const lines = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (inQuotes && text[i+1] === '"') { current += '"'; i++; }
      else { inQuotes = !inQuotes; }
    } else if (ch === ',' && !inQuotes) {
      lines.push(current); current = '';
    } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
      if (ch === '\r' && text[i+1] === '\n') i++;
      lines.push(current); lines.push('%%ROW%%'); current = '';
    } else {
      current += ch;
    }
  }
  lines.push(current);

  const rows = [];
  let row = [];
  for (const cell of lines) {
    if (cell === '%%ROW%%') {
      if (row.length) rows.push(row);
      row = [];
    } else {
      row.push(cell.trim());
    }
  }
  if (row.length) rows.push(row);

  if (!rows.length) return [];
  const headers = rows[0];
  return rows.slice(1).map(r => {
    const obj = {};
    headers.forEach((h, i) => obj[h] = r[i] || '');
    return obj;
  });
}

// ─── NUMBER FORMAT ───
const fmt = (n) => Number(n).toLocaleString();

// ─── DATE HELPERS ───
function parseDate(s) {
  if (!s) return null;
  // Handle M/D/YYYY format
  const mdy = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (mdy) {
    const d = new Date(parseInt(mdy[3]), parseInt(mdy[1]) - 1, parseInt(mdy[2]));
    return isNaN(d) ? null : d;
  }
  const d = new Date(s + 'T00:00:00');
  return isNaN(d) ? null : d;
}

function getWeekNum(d) {
  const start = new Date(d.getFullYear(), 0, 1);
  return Math.ceil(((d - start) / 86400000 + start.getDay() + 1) / 7);
}

function getQuarter(d) { return Math.floor(d.getMonth() / 3); }

function addMonths(d, n) {
  const r = new Date(d);
  r.setMonth(r.getMonth() + n);
  return r;
}

function daysBetween(a, b) {
  return Math.floor((b - a) / 86400000);
}

function formatDate(d) {
  return `${MONTH_NAMES[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function extractFirstName(email) {
  if (!email || !email.includes('@')) {
    // Handle plain names like "Jack Thomasson"
    if (email && email.includes(' ')) return email.split(' ')[0];
    return email || '—';
  }
  const local = email.split('@')[0];
  const parts = local.split('.');
  return parts[0].charAt(0).toUpperCase() + parts[0].slice(1);
}

// ─── RENDER ENGINE ───
function render(deals, deinstalls, dealMap, pitchData) {
  const app = document.getElementById('app');

  // Helper: get HubSpot deal link for a property name
  // HS deal names use formats like "ric - sphere - 22" or "fd - tpa - the wayland - 39"
  const _hsCache = {};
  function hsDealLink(propertyName) {
    const key = (propertyName || '').trim().toLowerCase();
    if (_hsCache[key] !== undefined) return _hsCache[key];

    // Clean property name: remove (expansion), (phase X), etc
    const cleanName = key.replace(/\s*\(expansion\)|\s*\(phase \d+\)/gi, '').trim();

    // Direct match first
    if (dealMap[cleanName]) {
      _hsCache[key] = `https://app.hubspot.com/contacts/${HS_PORTAL}/deal/${dealMap[cleanName]}`;
      return _hsCache[key];
    }

    // Fuzzy: find HS deal names that contain the property name
    const stripped = cleanName.replace(/^the /, '');
    const candidates = [];
    for (const [hsName, dealId] of Object.entries(dealMap)) {
      // Exact substring match on full name or without "the"
      if (hsName.includes(cleanName) || hsName.includes(stripped)) {
        candidates.push({ hsName, dealId, score: 2 });
      }
    }

    // If no direct match, try matching significant words (3+ chars)
    if (!candidates.length) {
      const words = stripped.split(/\s+/).filter(w => w.length >= 3);
      if (words.length >= 1) {
        for (const [hsName, dealId] of Object.entries(dealMap)) {
          const matchCount = words.filter(w => hsName.includes(w)).length;
          // Require all significant words to match
          if (matchCount === words.length) {
            candidates.push({ hsName, dealId, score: 1 });
          }
        }
      }
    }

    if (candidates.length >= 1) {
      // Pick highest score, then shortest name (most specific)
      candidates.sort((a, b) => b.score - a.score || a.hsName.length - b.hsName.length);
      _hsCache[key] = `https://app.hubspot.com/contacts/${HS_PORTAL}/deal/${candidates[0].dealId}`;
    } else {
      _hsCache[key] = null;
    }
    return _hsCache[key];
  }

  // Parse deinstalls — each row is one unit
  const validDeinstalls = deinstalls.filter(d => {
    const dt = parseDate(d['Deinstall_Date'] || d['Requested Date']);
    return dt && !isNaN(dt);
  }).map(d => ({
    ...d,
    deinstallDate: parseDate(d['Deinstall_Date'] || d['Requested Date']),
    requestDate: parseDate(d['Requested Date']),
    property: d['Property Name'] || '—',
    market: d['Market'] || '—',
    partner: d['Partner'] || '—',
    rep: d['AP_Sales_Person'] || '',
    reason: d['Reason'] || d['Reason '] || '—'
  }));

  const curDeinstalls = validDeinstalls.filter(d => d.deinstallDate.getFullYear() === CUR_YEAR);
  const prevDeinstalls = validDeinstalls.filter(d => d.deinstallDate.getFullYear() === PREV_YEAR);

  // Filter deals with valid sign dates
  const validDeals = deals.filter(d => {
    const dt = parseDate(d['Contract Signed Date']);
    return dt && !isNaN(dt);
  }).map(d => ({
    ...d,
    signDate: parseDate(d['Contract Signed Date']),
    units: parseInt(d['Total Unit Count']) || 0,
    renewalDate: addMonths(parseDate(d['Contract Signed Date']), 12),
    rep: d['AP Sales Person'] || '',
    partner: d['Partner'] || '—',
    property: d['Property Name'] || '—',
    market: d['Market'] || '—'
  }));

  const curDeals = validDeals.filter(d => d.signDate.getFullYear() === CUR_YEAR);
  const prevDeals = validDeals.filter(d => d.signDate.getFullYear() === PREV_YEAR);

  // Current period boundaries
  const curMonth = NOW.getMonth();
  const curQuarter = getQuarter(NOW);
  const curWeek = getWeekNum(NOW);

  // YTD: up to current date equivalent
  const ytdCur = curDeals.filter(d => d.signDate <= NOW);
  const prevYtdEnd = new Date(PREV_YEAR, curMonth, NOW.getDate());
  const ytdPrev = prevDeals.filter(d => d.signDate <= prevYtdEnd);

  // Quarter
  const qCur = curDeals.filter(d => getQuarter(d.signDate) === curQuarter);
  const qPrev = prevDeals.filter(d => getQuarter(d.signDate) === curQuarter && d.signDate <= new Date(PREV_YEAR, NOW.getMonth(), NOW.getDate()));

  // Month
  const mCur = curDeals.filter(d => d.signDate.getMonth() === curMonth);
  const mPrev = prevDeals.filter(d => d.signDate.getMonth() === curMonth && d.signDate.getDate() <= NOW.getDate());

  // Week
  const wCur = curDeals.filter(d => getWeekNum(d.signDate) === curWeek);
  const wPrev = prevDeals.filter(d => getWeekNum(d.signDate) === curWeek);

  const sum = (arr) => arr.reduce((s, d) => s + d.units, 0);

  // Deinstall metrics (each row = 1 unit)
  const diYtdCur = curDeinstalls.filter(d => d.deinstallDate <= NOW);
  const diYtdPrev = prevDeinstalls.filter(d => d.deinstallDate <= prevYtdEnd);
  const diMonthCur = curDeinstalls.filter(d => d.deinstallDate.getMonth() === curMonth);
  const diMonthPrev = prevDeinstalls.filter(d => d.deinstallDate.getMonth() === curMonth && d.deinstallDate.getDate() <= NOW.getDate());
  const diQtrCur = curDeinstalls.filter(d => getQuarter(d.deinstallDate) === curQuarter);
  const diQtrPrev = prevDeinstalls.filter(d => getQuarter(d.deinstallDate) === curQuarter && d.deinstallDate <= new Date(PREV_YEAR, NOW.getMonth(), NOW.getDate()));

  // Net units = new installs - deinstalls
  const netUnitsYtd = sum(ytdCur) - diYtdCur.length;
  const netUnitsYtdPrev = sum(ytdPrev) - diYtdPrev.length;
  const netUnitsMonth = sum(mCur) - diMonthCur.length;
  const netUnitsMonthPrev = sum(mPrev) - diMonthPrev.length;

  function badge(cur, prev) {
    const diff = cur - prev;
    if (diff > 0) return `<span class="kpi-badge ahead"><svg viewBox="0 0 12 12"><path d="M6 2L10 8H2L6 2Z" fill="currentColor"/></svg>+${fmt(diff)} vs ${PREV_YEAR}</span>`;
    if (diff < 0) return `<span class="kpi-badge behind"><svg viewBox="0 0 12 12"><path d="M6 10L2 4H10L6 10Z" fill="currentColor"/></svg>${fmt(diff)} vs ${PREV_YEAR}</span>`;
    return `<span class="kpi-badge neutral">= ${PREV_YEAR}</span>`;
  }

  // Sparkline helper: returns HTML for 6-month mini bar chart
  function sparkline(monthlyValues) {
    const max = Math.max(...monthlyValues, 1);
    return `<div class="sparkline">${monthlyValues.map(v => `<div class="spark-bar" style="height:${Math.max((v/max)*100, 5)}%"></div>`).join('')}</div>`;
  }

  // Monthly data for sparklines (last 6 months with data)
  const sparkMonths = [];
  for (let m = Math.max(0, curMonth - 5); m <= curMonth; m++) {
    sparkMonths.push({
      newUnits: curDeals.filter(d => d.signDate.getMonth() === m).reduce((s,d) => s + d.units, 0),
      deals: curDeals.filter(d => d.signDate.getMonth() === m).length,
      diUnits: curDeinstalls.filter(d => d.deinstallDate.getMonth() === m).length
    });
  }
  const sparkNet = sparkMonths.map(m => Math.max(m.newUnits - m.diUnits, 0));
  const sparkDeals = sparkMonths.map(m => m.deals);
  const sparkDi = sparkMonths.map(m => m.diUnits);

  // Pitch metrics
  const pitchThisWeek = pitchData.byWeek?.thisWeek || 0;
  const pitchLastWeek = pitchData.byWeek?.lastWeek || 0;
  const pitchesByRep = pitchData.byRep || {};
  const monthlyPitchesByRep = pitchData.monthlyByRep || {};
  const pitchRepsSorted = Object.entries(pitchesByRep).sort((a, b) => b[1] - a[1]);
  // Week label: "Mon – [Today]"
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const pitchWeekLabel = 'Mon – ' + dayNames[NOW.getDay()];
  const pitchMonthKey = CUR_YEAR + '-' + String(curMonth + 1).padStart(2, '0');
  const prevPitchMonthKey = PREV_YEAR + '-' + String(curMonth + 1).padStart(2, '0');
  const pitchThisMonth = pitchData.byMonth[pitchMonthKey] || 0;
  const pitchPrevMonth = pitchData.byMonth[prevPitchMonthKey] || 0;
  // YTD pitches
  let pitchYtdCur = 0, pitchYtdPrev = 0;
  Object.entries(pitchData.byMonth).forEach(([k, v]) => {
    if (k.startsWith(CUR_YEAR + '-') && parseInt(k.split('-')[1]) <= curMonth + 1) pitchYtdCur += v;
    if (k.startsWith(PREV_YEAR + '-') && parseInt(k.split('-')[1]) <= curMonth + 1) pitchYtdPrev += v;
  });
  // Spark for pitches (monthly)
  const sparkPitches = [];
  for (let m = Math.max(0, curMonth - 5); m <= curMonth; m++) {
    const mk = CUR_YEAR + '-' + String(m + 1).padStart(2, '0');
    sparkPitches.push(pitchData.byMonth[mk] || 0);
  }

  // Deal type breakdown
  const dealTypeMap = {};
  curDeals.forEach(d => {
    const dt = (d['Deal Type'] || '').trim() || 'Other';
    if (!dealTypeMap[dt]) dealTypeMap[dt] = { deals: 0, units: 0 };
    dealTypeMap[dt].deals++;
    dealTypeMap[dt].units += d.units;
  });
  const dealTypeColors = { 'New Partner': 'var(--green-light)', 'Partner Expansion': 'var(--blue-glow)', 'Property Expansion': 'var(--yellow)', 'Other': 'var(--silver)' };

  // Top partners by new units (installs)
  const partnerInstallMap = {};
  ytdCur.forEach(d => {
    const p = d.partner && d.partner !== '—' ? d.partner.trim() : null;
    if (!p) return;
    if (!partnerInstallMap[p]) partnerInstallMap[p] = 0;
    partnerInstallMap[p] += d.units;
  });
  const topPartners = Object.entries(partnerInstallMap).sort((a, b) => b[1] - a[1]).slice(0, 10);
  const maxPartnerInstall = topPartners.length ? topPartners[0][1] : 1;

  // Renewals
  const renewals = validDeals.map(d => ({
    ...d,
    daysUntilRenewal: daysBetween(NOW, d.renewalDate)
  })).filter(d => d.daysUntilRenewal >= -30 && d.daysUntilRenewal <= 365)
    .sort((a, b) => a.renewalDate - b.renewalDate);

  const urgentRenewals = renewals.filter(d => d.daysUntilRenewal <= 30);
  const soonRenewals = renewals.filter(d => d.daysUntilRenewal > 30 && d.daysUntilRenewal <= 90);
  const upcomingRenewals = renewals.filter(d => d.daysUntilRenewal > 0 && d.daysUntilRenewal <= 180);

  // Monthly renewal sums (next 12 months)
  const renewalMonths = [];
  for (let i = 0; i < 12; i++) {
    const mStart = new Date(CUR_YEAR, curMonth + i, 1);
    const mEnd = new Date(CUR_YEAR, curMonth + i + 1, 0);
    const mRenewals = renewals.filter(d => d.renewalDate >= mStart && d.renewalDate <= mEnd);
    renewalMonths.push({
      label: MONTH_NAMES[mStart.getMonth()] + ' ' + String(mStart.getFullYear()).slice(2),
      units: sum(mRenewals),
      deals: mRenewals.length,
      isUrgent: i === 0,
      isSoon: i === 1 || i === 2
    });
  }
  const maxRenewalUnits = Math.max(...renewalMonths.map(m => m.units), 1);

  // Rep leaderboard (current year) — include all AP reps even if 0 deals
  const AP_REPS = ['Wells', 'Scout', 'Jack', 'John', 'Sophia', 'Ghislain', 'Jason', 'Richard', 'Nolan', 'Raegan', 'Xander', 'Ashtyn', 'Renato'];
  const repMap = {};
  AP_REPS.forEach(name => { repMap[name] = { deals: 0, units: 0 }; });
  curDeals.forEach(d => {
    let name = extractFirstName(d.rep);
    if (name === '—' || !d.rep.includes('@')) return;
    // Normalize "Jasoncreel" to "Jason"
    if (name.toLowerCase() === 'jasoncreel') name = 'Jason';
    if (!repMap[name]) repMap[name] = { deals: 0, units: 0 };
    repMap[name].deals++;
    repMap[name].units += d.units;
  });
  const reps = Object.entries(repMap).map(([name, v]) => ({ name, ...v })).sort((a, b) => b.units - a.units);

  // ─── REP SCORECARD DATA ───
  const repScorecard = {};
  AP_REPS.forEach(name => {
    repScorecard[name] = { ytdDeals: 0, ytdUnits: 0, monthDeals: 0, monthUnits: 0, monthPitches: 0, weekPitches: 0 };
  });
  curDeals.forEach(d => {

              <td><span class="units-badge">${d.units}</span></td>
              <td>${formatDate(d.renewalDate)}</td>
              <td>${extractFirstName(d.rep)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      <div style="text-align:center;padding:10px">
        <button onclick="document.querySelectorAll('.renewal-extra').forEach(r=>r.style.display=r.style.display==='none'?'':'none');this.textContent=this.textContent.includes('Show all')?'Show less':'Show all ${upcomingRenewals.length} renewals'" style="background:var(--ghost);border:1px solid var(--card-border);color:var(--silver);padding:6px 18px;border-radius:20px;font-size:0.75rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s" onmouseover="this.style.color='var(--white)'" onmouseout="this.style.color='var(--silver)'">Show all ${upcomingRenewals.length} renewals</button>
      </div>
    </div>
  </div>`;

  app.innerHTML = html;

  // Render deal type pills (avoid nested template literals)
  const pillsEl = document.getElementById('deal-type-pills');
  if (pillsEl) {
    pillsEl.innerHTML = dtEntries.map(function(entry) {
      var dt = entry[0], v = entry[1];
      var color = dealTypeColors[dt] || 'var(--silver)';
      return '<div class="deal-type-pill" style="padding:4px 10px;font-size:0.68rem">' +
        '<div class="deal-type-dot" style="background:' + color + ';width:6px;height:6px"></div>' +
        '<span>' + dt + '</span>' +
        '<span class="dt-count" style="font-size:0.75rem">' + fmt(v.deals) + '</span>' +
      '</div>';
    }).join('');
  }

  // Render scorecard tbody (avoid nested template literals)
  const scTbody = document.getElementById('sc-tbody');
  if (scTbody) {
    // Scale bar against last year's full-year top rep, so there's room to grow all year
    var prevYearMaxRepUnits = 0;
    var prevRepMap = {};
    prevDeals.forEach(function(d) {
      var n = extractFirstName(d.rep);
      if (n === '—' || !d.rep.includes('@')) return;
      if (n.toLowerCase() === 'jasoncreel') n = 'Jason';
      prevRepMap[n] = (prevRepMap[n] || 0) + d.units;
    });
    Object.values(prevRepMap).forEach(function(u) { if (u > prevYearMaxRepUnits) prevYearMaxRepUnits = u; });
    var maxYtdUnits = Math.max(prevYearMaxRepUnits, Math.max.apply(null, scRows.map(function(r) { return r[1].ytdUnits; }).concat([1])));
    scTbody.innerHTML = scRows.map(function(row, i) {
      var name = row[0], v = row[1];
      var isTop = i < 3;
      var initialsMap = {Wells:'WD',Scout:'SB',Jack:'JT',John:'JL',Sophia:'SN',Ghislain:'GK',Jason:'JC',Richard:'RB',Nolan:'NM',Raegan:'RM',Xander:'XR',Ashtyn:'AG',Renato:'RG'};
      var initials = initialsMap[name] || name.charAt(0);
      var barWidth = Math.round((v.ytdUnits / maxYtdUnits) * 100);
      var zd = function(n) { return n === 0 ? '<span class="sc-zero">0</span>' : fmt(n); };
      return '<tr class="' + (isTop ? 'sc-top' : '') + '">' +
        '<td><span class="sc-rank ' + (isTop ? 'top' : '') + (i === 0 ? ' first' : '') + '">' + (i + 1) + '</span><span class="sc-avatar">' + initials + '</span>' + name + '</td>' +
        '<td>' + zd(v.ytdDeals) + '</td>' +
        '<td class="sc-bar-cell ' + (isTop ? 'sc-highlight' : '') + '">' + zd(v.ytdUnits) + '<div class="sc-bar"><div class="sc-bar-fill" style="width:' + barWidth + '%"></div></div></td>' +
        '<td class="col-div">' + scBadge(name, 'monthDeals', v.monthDeals) + '</td>' +
        '<td>' + scBadge(name, 'monthUnits', v.monthUnits) + '</td>' +
        '<td class="col-div">' + scBadge(name, 'weekPitches', v.weekPitches) + '</td>' +
        '<td>' + scBadge(name, 'monthPitches', v.monthPitches) + '</td>' +
      '</tr>';
    }).join('');
  }

  // Store data for chart rendering
  window._dashData = { curDeals, prevDeals, validDeals };
  setView('monthly');

  document.getElementById('last-updated').innerHTML = 'Updated ' + NOW.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) + '<span style="opacity:0.5;margin-left:6px">· Sources: New Deal Sheet + HubSpot AP Pipeline · Auto-refreshes every hour</span>';
}

// ─── CHART RENDERING ───
let currentView = 'monthly';
let currentMetric = 'deals';

function setView(view) {
  currentView = view;
  document.querySelectorAll('.tabs .tab-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === view));
  renderChart();
}

function setMetric(metric) {
  currentMetric = metric;
  document.querySelectorAll('.metric-toggle .metric-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === metric));
  renderChart();
}

function renderChart() {
  const { curDeals, prevDeals } = window._dashData;
  const area = document.getElementById('chart-area');
  if (!area) return;

  const sum = (arr) => arr.reduce((s, d) => s + d.units, 0);
  const metric = currentMetric === 'units' ? (arr) => sum(arr) : (arr) => arr.length;

  let buckets = [];

  if (currentView === 'monthly') {
    for (let m = 0; m < 12; m++) {
      const cur = curDeals.filter(d => d.signDate.getMonth() === m);
      const prev = prevDeals.filter(d => d.signDate.getMonth() === m);
      // Only show months up to current month for current year
      const isFuture = m > NOW.getMonth();
      buckets.push({ label: MONTH_NAMES[m], cur: isFuture ? 0 : metric(cur), prev: metric(prev), isFuture });
    }
  } else if (currentView === 'quarterly') {
    for (let q = 0; q < 4; q++) {
      const cur = curDeals.filter(d => getQuarter(d.signDate) === q);
      const prev = prevDeals.filter(d => getQuarter(d.signDate) === q);
      const isFuture = q > getQuarter(NOW);
      buckets.push({ label: QUARTER_NAMES[q], cur: isFuture ? 0 : metric(cur), prev: metric(prev), isFuture });
    }
  } else if (currentView === 'weekly') {
    // Show last 12 weeks
    const curWeek = getWeekNum(NOW);
    for (let w = Math.max(1, curWeek - 11); w <= curWeek; w++) {
      const cur = curDeals.filter(d => getWeekNum(d.signDate) === w);
      const prev = prevDeals.filter(d => getWeekNum(d.signDate) === w);
      buckets.push({ label: `Wk ${w}`, cur: metric(cur), prev: metric(prev), isFuture: false });
    }
  }

  const maxVal = Math.max(...buckets.flatMap(b => [b.cur, b.prev]), 1);

  area.innerHTML = `<div class="chart-container">
    ${buckets.map(b => {
      const diff = b.cur - b.prev;
      const cls = b.isFuture ? 'neutral' : diff > 0 ? 'ahead' : diff < 0 ? 'behind' : 'neutral';
      const sign = diff > 0 ? '+' : '';
      return `<div class="chart-row">
        <div class="chart-label">${b.label}</div>
        <div class="chart-bars">
          <div class="bar-track"><div class="bar-fill current" style="width:${(b.cur / maxVal) * 100}%">${b.cur || ''}</div></div>
          <div class="bar-track"><div class="bar-fill previous" style="width:${(b.prev / maxVal) * 100}%">${b.prev || ''}</div></div>
        </div>
        <div class="chart-delta ${cls}">${b.isFuture ? '—' : (diff === 0 ? '=' : sign + diff)}</div>
      </div>`;
    }).join('')}
  </div>`;
}

// ─── FETCH & BOOT ───
async function boot() {
  try {
    // Fetch sheets + HubSpot deal mapping in parallel
    const [resp, diResp, hsResp] = await Promise.all([
      fetch(SHEET_CSV),
      fetch(DEINSTALL_CSV),
      fetch(HS_DEALS_API).catch(() => null) // don't block on HS failure
    ]);
    if (!resp.ok) throw new Error(`Deals HTTP ${resp.status}`);
    if (!diResp.ok) throw new Error(`Deinstalls HTTP ${diResp.status}`);
    const [text, diText] = await Promise.all([resp.text(), diResp.text()]);
    const deals = parseCSV(text);
    const deinstalls = parseCSV(diText).filter(d => d['Property Name']);

    // Parse HubSpot data (graceful fallback if unavailable)
    let dealMap = {}, pitchData = { byWeek: {}, byMonth: {}, total: 0 };
    if (hsResp && hsResp.ok) {
      const hsData = await hsResp.json();
      dealMap = hsData.deals || {};
      pitchData = hsData.pitches || pitchData;
      console.log('HubSpot deals loaded:', hsData.count, 'Pitches:', pitchData.total);
    } else {
      console.log('HubSpot data unavailable');
    }

    console.log('Parsed deals:', deals.length, 'Deinstalls:', deinstalls.length);
    if (!deals.length) throw new Error('No data parsed');
    render(deals, deinstalls, dealMap, pitchData);
  } catch (err) {
    console.error(err);
    document.getElementById('app').innerHTML = `
      <div class="error-card">
        <h2>Unable to Load Data</h2>
        <p>The dashboard couldn't access the Google Sheet. This usually means the sheet isn't publicly shared.</p>
        <ol>
          <li>Open the <a href="https://docs.google.com/spreadsheets/d/1Mt_laFNgojNhNMHPYrlQo85dDywjWTF7W2YohR5M520/edit" target="_blank" style="color:var(--blue-glow)">New Deal Worksheet</a></li>
          <li>Click <strong>Share</strong> in the top right</li>
          <li>Under "General access," select <strong>Anyone with the link</strong></li>
          <li>Set permission to <strong>Viewer</strong></li>
          <li>Refresh this dashboard</li>
        </ol>
        <p style="margin-top:1rem;font-size:0.78rem;">Error: <code>${err.message}</code></p>
      </div>
    `;
  }
}

boot();

// Auto-refresh every 60 minutes for TV/monitor display
setInterval(() => location.reload(), 60 * 60 * 1000);
</script>
