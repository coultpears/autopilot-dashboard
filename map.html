<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP Supply Map — Landing</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231A61D9'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='20' fill='white'%3EL%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --navy: #F8F9FB;
  --navy-mid: #FFFFFF;
  --navy-light: #F1F3F7;
  --panel: rgba(255,255,255,0.92);
  --blue: #1A61D9;
  --blue-dim: rgba(26,97,217,0.08);
  --green: #08786C;
  --green-dim: rgba(8,120,108,0.08);
  --orange: #B95B00;
  --orange-dim: rgba(185,91,0,0.06);
  --red: #EE533D;
  --white: #262626;
  --silver: #7D7A78;
  --muted: #A2A09B;
  --ghost: rgba(0,0,0,0.04);
  --border: rgba(21,25,45,0.08);
  --radius: 12px;
}

html { font-size: 14px; }
body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--navy);
  color: var(--white);
  height: 100vh; overflow: hidden;
  display: flex; flex-direction: column;
}

/* ─── NAV ─── */
.topnav {
  z-index: 1000; height: 52px; flex-shrink: 0;
  background: var(--panel); backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.topnav-left { display: flex; align-items: center; gap: 10px; }
.logo-mark {
  width: 30px; height: 30px; background: var(--blue); border-radius: 8px;
  display: grid; place-items: center;
  font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1rem; color: #fff !important;
}
.topnav h1 { font-family: 'Outfit', sans-serif; font-size: 1.05rem; font-weight: 700; }
.topnav h1 span { color: var(--silver); font-weight: 400; margin-left: 6px; }
.nav-links { display: flex; gap: 4px; }
.nav-links a {
  color: var(--silver); text-decoration: none; font-size: 0.78rem; font-weight: 500;
  padding: 5px 12px; border-radius: 6px; transition: all 0.15s;
}
.nav-links a:hover { color: var(--white); background: var(--ghost); }
.nav-links a.active { color: #fff !important; background: var(--blue); }

/* ─── CONTROLS OVERLAY ─── */
/* ─── CONTROL PANEL (top-left) ─── */
.map-controls {
  position: absolute; top: 72px; left: 12px; z-index: 900;
  display: flex; flex-direction: column; gap: 6px;
}
.control-group {
  background: var(--panel); backdrop-filter: blur(24px);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  display: flex; flex-direction: column; gap: 1px;
}
.control-group.row { flex-direction: row; gap: 0; }
.pill {
  font-family: 'Outfit', sans-serif; font-size: 0.75rem; font-weight: 600;
  padding: 7px 14px; border: none; border-radius: 7px; cursor: pointer;
  background: transparent; color: var(--silver); transition: all 0.15s;
  text-align: left; white-space: nowrap;
}
.pill:hover { color: var(--white); background: var(--ghost); }
.pill.active { background: var(--blue); color: #fff !important; }

/* ─── LEGEND ─── */
.map-legend {
  position: absolute; bottom: 80px; left: 12px; z-index: 900;
  background: var(--panel); backdrop-filter: blur(24px);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.legend-title {
  font-family: 'Outfit', sans-serif; font-size: 0.65rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px; color: var(--silver); margin-bottom: 6px;
}
.legend-item {
  display: flex; align-items: center; gap: 8px; padding: 2px 0;
  font-size: 0.75rem; color: var(--white);
}
.legend-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}

/* ─── SEARCH ─── */
.search-box {
  position: absolute; top: 72px; right: 12px; z-index: 1100;
  width: 280px;
}
.search-input {
  width: 100%; padding: 9px 14px 9px 34px;
  background: var(--panel); backdrop-filter: blur(24px);
  border: 1px solid var(--border); border-radius: 10px;
  font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
  color: var(--white); outline: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--blue); }
.search-input::placeholder { color: var(--muted); }
.search-icon {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  color: var(--muted); font-size: 0.85rem; pointer-events: none;
}
.search-results {
  position: absolute; top: 100%; left: 0; right: 0; margin-top: 4px;
  background: var(--panel); backdrop-filter: blur(24px);
  border: 1px solid var(--border); border-radius: 10px;
  max-height: 360px; overflow-y: auto;
  box-shadow: 0 8px 24px rgba(0,0,0,0.14);
  display: none; z-index: 1200;
}
.search-results.open { display: block; }
.search-result {
  padding: 10px 14px; cursor: pointer; transition: background 0.1s;
  border-bottom: 1px solid var(--ghost);
}
.search-result:last-child { border-bottom: none; }
.search-result:hover { background: var(--ghost); }
.search-result-name { font-weight: 600; font-size: 0.82rem; }
.search-result-meta { font-size: 0.68rem; color: var(--silver); margin-top: 1px; }
.search-result-type {
  display: inline-block; font-size: 0.6rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px; padding: 1px 6px;
  border-radius: 4px; margin-left: 6px;
}
.type-partner { background: var(--blue-dim); color: var(--blue); }
.type-market { background: rgba(124,58,237,0.1); color: #7C3AED; }
.type-property { background: var(--green-dim); color: var(--green); }
.type-target { background: rgba(238,83,61,0.08); color: #EE533D; }
.type-location { background: rgba(185,91,0,0.08); color: #B95B00; }

/* ─── DEINSTALL TOGGLE ─── */
.overlay-toggle {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px; margin: 0;
  background: transparent; border: none; border-radius: 7px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.75rem; color: var(--silver); cursor: pointer;
  transition: all 0.15s; user-select: none;
}
.overlay-toggle:hover { color: var(--white); background: var(--ghost); }
.overlay-toggle.active { color: #EE533D; }
.overlay-toggle input { accent-color: #EE533D; cursor: pointer; margin: 0; }

/* ─── TIME PERIOD PILLS ─── */
.period-pills {
  display: flex; gap: 0;
}
.period-pill {
  font-family: 'Outfit', sans-serif; font-size: 0.68rem; font-weight: 600;
  padding: 5px 10px; border: none; border-radius: 6px; cursor: pointer;
  background: transparent; color: var(--muted); transition: all 0.15s;
}
.period-pill:hover { color: var(--white); background: var(--ghost); }
.period-pill.active { background: #374151; color: #fff; }

/* ─── CONTROL DIVIDER ─── */
.control-divider {
  height: 1px; background: var(--border); margin: 2px 8px;
}

/* ─── PANEL (right side detail) ─── */
.detail-panel {
  position: absolute; top: 116px; right: 12px; bottom: 16px; width: 360px; z-index: 800;
  background: var(--panel); backdrop-filter: blur(24px);
  border: 1px solid var(--border); border-radius: var(--radius);
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none; transform: translateX(12px);
  transition: all 0.25s ease;
}
.detail-panel.open { opacity: 1; pointer-events: auto; transform: translateX(0); }
.detail-panel-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--ghost);
}
.detail-panel-title {
  font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.05rem;
  margin-bottom: 2px; padding-right: 28px;
}
.detail-panel-subtitle { font-size: 0.72rem; color: var(--silver); }
.detail-panel-kpis {
  display: flex; gap: 0; padding: 10px 16px; border-bottom: 1px solid var(--ghost);
}
.detail-kpi { flex: 1; text-align: center; }
.detail-kpi-val { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.1rem; }
.detail-kpi-label { font-size: 0.58rem; color: var(--silver); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
.detail-panel-tabs {
  display: flex; gap: 0; padding: 4px 16px; border-bottom: 1px solid var(--ghost);
}
.detail-tab {
  font-family: 'Outfit', sans-serif; font-size: 0.7rem; font-weight: 600;
  padding: 5px 12px; border: none; border-radius: 6px; cursor: pointer;
  background: transparent; color: var(--muted); transition: all 0.15s;
}
.detail-tab:hover { color: var(--white); }
.detail-tab.active { background: var(--blue); color: #fff; }
.detail-panel-list {
  flex: 1; overflow-y: auto; padding: 4px 0;
}
.detail-panel-list::-webkit-scrollbar { width: 3px; }
.detail-panel-list::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }
.detail-section-label {
  font-family: 'Outfit', sans-serif; font-size: 0.6rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted);
  padding: 8px 16px 4px;
}
.detail-row {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 8px 16px; transition: background 0.1s; cursor: pointer;
  border-bottom: 1px solid var(--ghost);
}
.detail-row:hover { background: rgba(37,99,235,0.04); }
.detail-row.target-row:hover { background: rgba(220,38,38,0.04); }
.detail-row-info { flex: 1; min-width: 0; }
.detail-row-name {
  font-size: 0.78rem; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.detail-row-market { font-size: 0.65rem; color: var(--silver); }
.detail-row-metrics {
  display: flex; gap: 8px; margin-top: 3px; flex-wrap: wrap;
}
.detail-metric {
  font-size: 0.62rem; padding: 1px 6px; border-radius: 4px;
  font-weight: 600; white-space: nowrap;
}
.detail-metric.units { background: var(--blue-dim); color: var(--blue); }
.detail-metric.vacant { background: rgba(220,38,38,0.08); color: #EE533D; }
.detail-metric.concession { background: rgba(217,119,6,0.08); color: #B95B00; }
.detail-metric.target-badge { background: rgba(220,38,38,0.08); color: #EE533D; }
.detail-metric.lease-up { background: rgba(139,92,246,0.08); color: #8B5CF6; }
.detail-close {
  position: absolute; top: 10px; right: 10px;
  width: 24px; height: 24px; border-radius: 6px; border: none;
  background: var(--ghost); color: var(--silver); cursor: pointer;
  font-size: 0.9rem; display: grid; place-items: center; transition: all 0.1s;
}
.detail-close:hover { background: var(--border); color: var(--white); }
.detail-back {
  display: flex; align-items: center; gap: 4px;
  padding: 6px 16px; font-size: 0.7rem; font-weight: 600;
  color: var(--blue); cursor: pointer; border-bottom: 1px solid var(--ghost);
  transition: background 0.1s; font-family: 'Outfit', sans-serif;
}
.detail-back:hover { background: var(--blue-dim); }
.detail-back svg { width: 12px; height: 12px; }

/* ─── BOTTOM BAR ─── */
.bottom-bar {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 900;
  display: flex; gap: 1px;
  background: var(--panel); backdrop-filter: blur(24px);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 20px;
}
.bb-stat { text-align: center; padding: 0 16px; border-right: 1px solid var(--ghost); }
.bb-stat:last-child { border-right: none; }
.bb-val { font-family: 'Outfit', sans-serif; font-size: 1.25rem; font-weight: 800; }
.bb-label { font-size: 0.6rem; color: var(--silver); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; margin-top: 1px; }

/* ─── MAP ─── */
#map { flex: 1; z-index: 1; background: #F8F9FB; }
.leaflet-control-zoom { border: none !important; margin-bottom: 60px !important; margin-right: 8px !important; }
.leaflet-control-zoom a {
  background: #fff !important; color: #374151 !important;
  border: 1px solid var(--border) !important; width: 36px !important; height: 36px !important;
  line-height: 36px !important; font-size: 16px !important;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08) !important;
}
.leaflet-control-zoom a:first-child { border-radius: 10px 10px 0 0 !important; }
.leaflet-control-zoom a:last-child { border-radius: 0 0 10px 10px !important; }
.leaflet-control-attribution { display: none !important; }

/* ─── BUBBLE LABELS ─── */
.bubble-label {
  background: none !important; border: none !important; box-shadow: none !important;
  font-family: 'Outfit', sans-serif; font-weight: 700; color: #fff;
  text-align: center; pointer-events: none !important;
  text-shadow: 0 1px 2px rgba(0,0,0,0.4);
}

/* ─── TOOLTIP ─── */
.leaflet-tooltip {
  background: #fff !important; color: #1F2937 !important;
  border: 1px solid rgba(0,0,0,0.1) !important; border-radius: 10px !important;
  padding: 10px 14px !important; font-family: 'DM Sans', sans-serif !important;
  font-size: 0.78rem !important; box-shadow: 0 4px 16px rgba(0,0,0,0.12) !important;
}
.leaflet-tooltip::before { border-top-color: #fff !important; }
.leaflet-tooltip-top::before { border-top-color: #fff !important; }
.leaflet-tooltip-bottom::before { border-bottom-color: #fff !important; }
.tt-dim { color: #6B7280 !important; }
.tt-val { color: #1F2937 !important; }
.tt-name { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.85rem; margin-bottom: 2px; }
.tt-row { display: flex; justify-content: space-between; gap: 16px; }
.tt-dim { color: var(--silver); }
.tt-val { font-weight: 600; }

/* ─── LOADING ─── */
.loading-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 2000;
  background: rgba(248,249,251,0.97);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
  transition: opacity 0.4s;
}
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.spinner {
  width: 36px; height: 36px; border: 3px solid var(--ghost); border-top-color: var(--blue);
  border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-family: 'Outfit', sans-serif; font-size: 0.85rem; color: var(--silver); }
.loading-progress { width: 160px; height: 3px; background: var(--ghost); border-radius: 2px; overflow: hidden; }
.loading-progress-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width 0.3s; width: 0%; }

/* ─── VIEW SWITCH (Map/Grid toggle) ─── */
.view-switch {
  display: flex; background: var(--navy-light); border-radius: 8px; padding: 3px;
  border: 1px solid var(--border);
}
.vs-btn {
  font-family: 'Outfit', sans-serif; font-size: 0.72rem; font-weight: 600;
  padding: 5px 14px; border: none; border-radius: 6px; cursor: pointer;
  background: transparent; color: var(--muted); transition: all 0.15s;
  display: flex; align-items: center; gap: 5px;
}
.vs-btn:hover { color: var(--white); }
.vs-btn.active { background: var(--blue); color: #fff; box-shadow: 0 1px 4px rgba(37,99,235,0.3); }

/* ─── GRID VIEW ─── */
.grid-view {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  background: var(--navy);
}
.grid-toolbar {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 20px; background: var(--navy-mid);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.grid-search-wrap { position: relative; flex: 1; max-width: 360px; }
.grid-search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--muted); pointer-events: none;
}
.grid-search {
  width: 100%; padding: 7px 12px 7px 32px;
  font-family: 'DM Sans', sans-serif; font-size: 0.8rem;
  background: var(--navy-light); border: 1px solid var(--border); border-radius: 8px;
  color: var(--white); outline: none; transition: border-color 0.15s;
}
.grid-search:focus { border-color: var(--blue); }
.grid-search::placeholder { color: var(--muted); }
.grid-active-btn {
  font-family: 'Outfit', sans-serif; font-size: 0.72rem; font-weight: 600;
  padding: 7px 14px; border: 1px solid var(--border); border-radius: 8px;
  cursor: pointer; background: var(--navy-light); color: var(--muted);
  display: flex; align-items: center; gap: 5px; transition: all 0.15s;
}
.grid-active-btn.active { border-color: var(--green); color: var(--green); }
.grid-active-dot {
  width: 6px; height: 6px; border-radius: 50%; background: currentColor;
}
.grid-stats {
  display: flex; gap: 16px; margin-left: auto;
  font-family: 'Outfit', sans-serif; font-size: 0.75rem; color: var(--silver);
}
.grid-stat-val { font-weight: 800; color: var(--white); margin-right: 3px; }
.grid-scroll { flex: 1; overflow: auto; }
.grid-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
.grid-scroll::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }

/* ─── GRID TABLE ─── */
.grid-table { width: 100%; border-collapse: collapse; font-size: 0.76rem; }
.grid-table thead { position: sticky; top: 0; z-index: 10; }
.grid-table th {
  background: #E7EFFB; padding: 8px 12px; text-align: left;
  font-family: 'Outfit', sans-serif; font-size: 0.62rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.6px; color: var(--silver);
  border-bottom: 2px solid var(--border); white-space: nowrap;
  user-select: none;
}
.grid-table th.sortable { cursor: pointer; transition: color 0.15s; position: relative; padding-right: 18px; }
.grid-table th.sortable:hover { color: var(--white); }
.grid-table th.sorted { color: var(--blue); }
.grid-table th.sortable::after {
  content: '\2195'; position: absolute; right: 3px; top: 50%; transform: translateY(-50%);
  font-size: 0.65rem; opacity: 0.25;
}
.grid-table th.sortable:hover::after { opacity: 0.5; }
.grid-table th.sorted.asc::after { content: '\2191'; opacity: 1; }
.grid-table th.sorted.desc::after { content: '\2193'; opacity: 1; }
.grid-table th.num { text-align: right; }
.col-expand { width: 24px; padding-right: 4px !important; }
.col-link { width: 40px; text-align: center !important; }

.grid-table td {
  padding: 7px 12px; border-bottom: 1px solid rgba(0,0,0,0.06);
  white-space: nowrap; color: var(--white);
}
.grid-table td.num { text-align: right; font-family: 'Outfit', sans-serif; font-weight: 600; letter-spacing: -0.3px; }
.grid-table tbody tr { cursor: pointer; transition: background 0.08s; }
.grid-table tbody tr:hover { background: rgba(26,97,217,0.05); }
.grid-table tbody tr.expanded { background: rgba(26,97,217,0.06); font-weight: 500; }
.grid-table tbody tr:nth-child(even):not(.expanded):not(:hover) { background: rgba(0,0,0,0.018); }

.grid-prop { font-weight: 700; font-size: 0.78rem; letter-spacing: -0.2px; }
.deinstall-flag {
  display: inline-flex; align-items: center; gap: 2px;
  margin-left: 6px; padding: 2px 6px; border-radius: 4px;
  background: rgba(238,83,61,0.08); color: #EE533D;
  font-family: 'Outfit', sans-serif; font-size: 0.58rem; font-weight: 700;
  letter-spacing: 0.3px; vertical-align: middle; cursor: help;
  border: 1px solid rgba(238,83,61,0.12);
}
.grid-partner { color: var(--silver); font-size: 0.7rem; }
.grid-partner-sub { color: var(--muted); font-size: 0.62rem; margin-top: 1px; font-style: italic; }
.grid-loc { color: var(--silver); font-size: 0.74rem; font-weight: 500; }

/* ─── Occupancy Bar ─── */
.occ-wrap { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
.occ-bar {
  display: block; width: 60px; height: 8px; background: #E5E5E3; border-radius: 99px;
  overflow: hidden; flex-shrink: 0; position: relative;
}
.occ-fill { display: block; height: 100%; border-radius: 99px; position: absolute; top: 0; left: 0; }
.occ-val { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 0.78rem; min-width: 42px; text-align: right; }

/* ─── Status Badge ─── */
.status-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.62rem; font-weight: 700; padding: 3px 10px; border-radius: 99px;
  letter-spacing: 0.3px; white-space: nowrap;
}
.status-active { background: var(--green-dim); color: var(--green); }
.status-red { background: rgba(238,83,61,0.08); color: #EE533D; }
.status-amber { background: rgba(185,91,0,0.08); color: #B95B00; }
.status-blue { background: var(--blue-dim); color: var(--blue); }

// ─── HELPERS ───
function fmt(n) { return n.toLocaleString(); }
function pct(v) { return v == null ? '--' : (v * 100).toFixed(1) + '%'; }

function resolveMarketCoords(marketName) {
  if (!marketName) return null;
  // Direct match in MARKET_COORDS
  if (MARKET_COORDS[marketName]) return MARKET_COORDS[marketName];
  // Via LOOKER_MARKET_MAP
  const mapped = LOOKER_MARKET_MAP[marketName];
  if (mapped && MARKET_COORDS[mapped]) return MARKET_COORDS[mapped];
  return null;
}

function resolveMarketKey(marketName) {
  if (!marketName) return null;
  if (MARKET_COORDS[marketName]) return marketName;
  const mapped = LOOKER_MARKET_MAP[marketName];
  if (mapped && MARKET_COORDS[mapped]) return mapped;
  return marketName; // fallback to raw name
}

function jitter(coords, i) {
  const angle = (i * 137.5) * Math.PI / 180;
  const r = 0.008 * Math.sqrt(i + 1);
  return { lat: coords.lat + r * Math.cos(angle), lng: coords.lng + r * Math.sin(angle) };
}

function clearMap() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  _pinRegistry = {};
}

// ─── AGGREGATION FROM gridData ───
function buildMarketAgg() {
  const agg = {};
  activeGridData().forEach(d => {
    const key = resolveMarketKey(d.market_name);
    const coords = resolveMarketCoords(d.market_name);
    if (!agg[key]) agg[key] = { units: 0, occupied: 0, revenue: 0, revpah: [], partners: new Set(), props: [], coords: null, deinstalls: 0 };
    const m = agg[key];
    m.units += d.home_count || 0;
    m.occupied += d.home_occupied_count || 0;
    m.revenue += d.home_daily_rent_revenue || 0;
    if (d.all_in_revpah_net != null) m.revpah.push(d.all_in_revpah_net);
    m.partners.add(d.partner_name);
    m.props.push(d);
    m.deinstalls += d.deinstall_count || 0;
    if (!m.coords && coords) m.coords = coords;
  });
  return agg;
}

// ─── SEARCH ───
function onSearch(q) {
  const el = document.getElementById('search-results');
  if (!q || q.length < 2) { el.classList.remove('open'); return; }
  q = q.toLowerCase();
  const results = [];
  const seen = new Set();

  // Partners
  const partnerAgg = {};
  activeGridData().forEach(d => {
    if (!d.partner_name) return;
    if (!partnerAgg[d.partner_name]) partnerAgg[d.partner_name] = { units: 0, markets: new Set() };
    partnerAgg[d.partner_name].units += d.home_count || 0;
    partnerAgg[d.partner_name].markets.add(d.market_name);
  });
  Object.entries(partnerAgg).forEach(([name, data]) => {
    if (name.toLowerCase().includes(q)) {
      results.push({ id: 'p:' + name, name, type: 'partner', meta: `${data.markets.size} markets · ${fmt(data.units)} units`, sort: data.units + 1000000 });
    }
  });

  // Markets
  const mktAgg = buildMarketAgg();
  Object.entries(mktAgg).forEach(([name, data]) => {
    if (name.toLowerCase().includes(q)) {
      results.push({ id: 'm:' + name, name, type: 'market', meta: `${data.partners.size} partners · ${fmt(data.units)} units`, sort: data.units + 500000 });
    }
  });

  // Properties
  activeGridData().forEach(d => {
    const key = 'prop:' + d.property_name + ':' + d.market_name;
    if (seen.has(key)) return;
    const hay = [d.property_name, d.partner_name, d.pmc_name, d.dp_name, d.market_name].filter(Boolean).join(' ').toLowerCase();
    if (hay.includes(q) || q.split(/\s+/).filter(Boolean).every(t => hay.includes(t))) {
      seen.add(key);
      results.push({ id: key, name: d.property_name, type: 'property', meta: `${d.partner_name} · ${d.market_name} · ${d.home_count || 0}u`, sort: d.home_count || 0 });
    }
  });

  // Targets
  targetData.forEach(d => {
    if (d.name.toLowerCase().includes(q) || (d.partner && d.partner.toLowerCase().includes(q)) || d.market.toLowerCase().includes(q)) {
      results.push({ id: 't:' + d.dealId, name: d.name, type: 'target', meta: `${d.partner} · ${d.market}${d.vacant ? ' · ' + d.vacant + ' vacant' : ''}`, sort: d.totalUnits || d.available || 0 });
    }
  });

  results.sort((a, b) => b.sort - a.sort);
  const top = results.slice(0, 15);

  // Show local results immediately, then async geocode if few matches
  window._searchResults = top;
  if (top.length) {
    el.innerHTML = top.map((r, i) => `
      <div class="search-result" onmousedown="selectSearchIdx(${i})">
        <div class="search-result-name">${r.name}<span class="search-result-type type-${r.type}">${r.type}</span></div>
        <div class="search-result-meta">${r.meta}</div>
      </div>
    `).join('');
    el.classList.add('open');
  }

  // Geocode address search if query looks like an address (3+ chars, few local results)
  if (q.length >= 4 && top.length < 5) {
    _geoSearch(q, el, top);
  } else if (!top.length) {
    el.classList.remove('open');
  }
}

// Debounced geocoding via Nominatim (OpenStreetMap) — free, no API key
let _geoTimer = null;
function _geoSearch(q, el, existing) {
  clearTimeout(_geoTimer);
  _geoTimer = setTimeout(async () => {
    try {
      const resp = await fetch('https://nominatim.openstreetmap.org/search?format=json&countrycodes=us&limit=3&q=' + encodeURIComponent(q), {
        headers: { 'User-Agent': 'LandingAPDashboard/1.0' }
      });
      if (!resp.ok) return;
      const places = await resp.json();
      const geoResults = places.map(p => ({
        id: 'geo:' + p.place_id,
        name: p.display_name.split(',').slice(0, 3).join(','),
        type: 'location',
        meta: 'Go to this location on map',
        sort: -1,
        lat: parseFloat(p.lat),
        lng: parseFloat(p.lon)
      }));
      if (!geoResults.length) return;
      const combined = [...existing, ...geoResults];
      window._searchResults = combined;
      el.innerHTML = combined.map((r, i) => `
        <div class="search-result" onmousedown="selectSearchIdx(${i})">
          <div class="search-result-name">${r.name}<span class="search-result-type type-${r.type}">${r.type}</span></div>
          <div class="search-result-meta">${r.meta}</div>
        </div>
      `).join('');
      el.classList.add('open');
    } catch (e) { /* geocode failed, ignore */ }
  }, 350);
}

function closeSearch() { document.getElementById('search-results').classList.remove('open'); }

let _openedFromSearch = false;
let _lastSearchQuery = '';

function selectSearchIdx(idx) {
  const r = window._searchResults?.[idx];
  if (!r) return;
  _lastSearchQuery = document.getElementById('search-input').value;
  _openedFromSearch = true;
  closeSearch();

  if (r.type === 'market') {
    setView('markets', true);
    drillIntoMarket(r.name);
  } else if (r.type === 'partner') {
    // For partner search, go to portfolio and zoom to their properties
    setView('portfolio', true);
    drillIntoPartnerFromSearch(r.name);
  } else if (r.type === 'target') {
    setView('targets', true);
    const d = targetData.find(t => t.name === r.name);
    if (!d?.coords) return;
    map.setView([d.coords.lat, d.coords.lng], 12, { animate: true });
    showHighlightPin(d.coords, targetTooltipContent(d));
  } else if (r.type === 'location') {
    // Geocoded address — fly to coordinates
    map.setView([r.lat, r.lng], 14, { animate: true });
    showHighlightPin({ lat: r.lat, lng: r.lng }, `<div style="font-family:Outfit,sans-serif;font-size:0.75rem;font-weight:600">${r.name}</div>`);
  } else {
    // Property
    setView('portfolio', true);
    const d = gridData.find(p => p.property_name === r.name);
    if (!d) return;
    const coords = resolveMarketCoords(d.market_name);
    if (!coords) return;
    map.setView([coords.lat, coords.lng], 12, { animate: true });
    showHighlightPin(coords, propertyTooltip(d));
  }
}

function showHighlightPin(coords, tooltipContent) {
  const highlight = L.circleMarker([coords.lat, coords.lng], {
    radius: 16, fillColor: '#1A61D9', color: '#fff', weight: 3, fillOpacity: 0.9
  });
  highlight.addTo(map);
  markers.push(highlight);
  highlight.bindPopup(`<div style="font-size:0.82rem">${tooltipContent}</div>`, {
    maxWidth: 300, className: 'leaflet-popup'
  }).openPopup();
}

// ─── PIN REGISTRY & ZOOM ───
let _pinRegistry = {};
let _activeHighlight = null;

function zoomToPin(key) {
  if (_activeHighlight) {
    try { _activeHighlight.pin.setRadius(_activeHighlight.r); _activeHighlight.pin.setStyle({ weight: 2, color: 'rgba(255,255,255,0.5)' }); _activeHighlight.pin.closeTooltip(); } catch(e) {}
    _activeHighlight = null;
  }
  markers.forEach(m => { try { m.closeTooltip(); } catch(e) {} });

  const pin = _pinRegistry[key];
  if (!pin) return;
  const ll = pin.getLatLng();
  map.setView([ll.lat, ll.lng], 14, { animate: true });
  setTimeout(() => {
    const origRadius = pin.getRadius();
    pin.setRadius(origRadius + 6);
    pin.setStyle({ weight: 3, color: '#1A61D9' });
    pin.openTooltip();
    _activeHighlight = { pin, r: origRadius };
  }, 300);
}

// ─── TOOLTIP BUILDERS ───
function propertyTooltip(d) {
  const occ = d.occupancy != null ? (d.occupancy * 100).toFixed(0) : null;
  const occBar = occ != null
    ? `<div style="margin:4px 0;display:flex;align-items:center;gap:6px">
        <div style="flex:1;height:6px;background:#E5E5E3;border-radius:3px;overflow:hidden"><div style="width:${occ}%;height:100%;background:${d.occupancy >= 0.85 ? '#08786C' : d.occupancy >= 0.6 ? '#B95B00' : '#EE533D'};border-radius:3px"></div></div>
        <span style="font-weight:700;font-size:0.72rem;color:${d.occupancy >= 0.85 ? '#08786C' : d.occupancy >= 0.6 ? '#B95B00' : '#EE533D'}">${occ}%</span>
      </div>`
    : '';
  const statusColor = STATUS_COLORS[d.status_color] || STATUS_COLORS.neutral;
  const statusBadge = d.status_label
    ? `<span style="display:inline-block;padding:1px 8px;border-radius:4px;font-size:0.65rem;font-weight:700;background:${statusColor}20;color:${statusColor}">${d.status_label}</span>`
    : '';
  const rev = d.home_daily_rent_revenue != null ? '$' + Math.round(d.home_daily_rent_revenue).toLocaleString() : '--';
  const deinstallFlag = d.deinstall_count > 0 ? `<div style="margin-top:4px;color:#EE533D;font-size:0.72rem;font-weight:600">${d.deinstall_count} unit${d.deinstall_count > 1 ? 's' : ''} deinstalling</div>` : '';

  return `<div class="tt-name">${d.property_name}</div>
    <div class="tt-row"><span class="tt-dim">Partner</span><span class="tt-val">${d.partner_name}</span></div>
    <div class="tt-row"><span class="tt-dim">Market</span><span class="tt-val">${d.market_name}</span></div>
    <div class="tt-row"><span class="tt-dim">Units</span><span class="tt-val">${d.home_count || 0}</span></div>
    ${occBar}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:2px">
      ${statusBadge}
      <span style="font-size:0.72rem;color:var(--green);font-weight:600">${rev}/day</span>
    </div>
    ${deinstallFlag}`;
}

function marketTooltipContent(name, data) {
  const avgOcc = data.units > 0 ? data.occupied / data.units : 0;
  const occPct = (avgOcc * 100).toFixed(1);
  return `<div class="tt-name">${name}</div>
    <div class="tt-row"><span class="tt-dim">Properties</span><span class="tt-val">${data.props.length}</span></div>
    <div class="tt-row"><span class="tt-dim">Units</span><span class="tt-val">${fmt(data.units)}</span></div>
    <div class="tt-row"><span class="tt-dim">Occupancy</span><span class="tt-val" style="color:${avgOcc >= 0.85 ? '#08786C' : avgOcc >= 0.6 ? '#B95B00' : '#EE533D'}">${occPct}%</span></div>
    <div class="tt-row"><span class="tt-dim">Daily Revenue</span><span class="tt-val" style="color:var(--green)">$${fmt(Math.round(data.revenue))}</span></div>`;
}

function targetTooltipContent(d) {
  const signals = [];
  if (d.vacant) signals.push(`<span style="color:#EE533D;font-weight:600">${d.vacant} vacant</span>`);
  if (d.available) signals.push(`${d.available} total units`);
  if (d.vacancy) signals.push(`${d.vacancy}% vacancy`);
  if (d.concessions) signals.push(`<span style="color:#B95B00">${d.concessions.slice(0, 80)}</span>`);
  if (d.leaseUp) signals.push(`<span style="color:#8B5CF6;font-weight:600">Lease-up signal</span>`);
  return `<div class="tt-name">${d.name}</div>
    <div class="tt-row"><span class="tt-dim">Partner</span><span class="tt-val">${d.partner}</span></div>
    <div class="tt-row"><span class="tt-dim">Market</span><span class="tt-val">${d.market}</span></div>
    ${signals.length ? '<div style="border-top:1px solid rgba(0,0,0,0.06);margin-top:4px;padding-top:4px;font-size:0.72rem;line-height:1.6">' + signals.join('<br>') + '</div>' : ''}`;
}

function detailClick(idx) {

// ─── PROPERTY DETAIL PANEL ───
function openPropertyDetail(d) {
  const panel = document.getElementById('detail-panel');
  document.getElementById('dp-title').textContent = d.property_name;
  document.getElementById('dp-subtitle').textContent = `${d.partner_name} — ${d.market_name}`;

  const occ = d.occupancy != null ? pct(d.occupancy) : '--';
  const rev = d.home_daily_rent_revenue != null ? '$' + Math.round(d.home_daily_rent_revenue).toLocaleString() : '--';
  const revpah = d.all_in_revpah_net != null ? '$' + d.all_in_revpah_net.toFixed(2) : '--';

  document.getElementById('dp-kpis').innerHTML = [
    { val: fmt(d.home_count || 0), label: 'Units' },
    { val: occ, label: 'Occupancy' },
    { val: rev, label: 'Daily Rev' },
    { val: revpah, label: 'RevPAH' }
  ].map(k =>
    `<div class="detail-kpi"><div class="detail-kpi-val">${k.val}</div><div class="detail-kpi-label">${k.label}</div></div>`
  ).join('');

  const backBtn = document.getElementById('dp-back');

    <button class="detail-tab active" onclick="showPropertyDetailTab('units')">Units & Status</button>
    <button class="detail-tab" onclick="showPropertyDetailTab('reservations')">Reservations</button>
  `;
