<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP Supply Map — Landing</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231A61D9'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='20' fill='white'%3EL%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  /* Landing 2.0 Brand Palette */
  --landing-navy: #15192D;       /* Primary brand */
  --landing-tonal: #2D3654;      /* Tonal blue */
  --landing-blue: #1A61D9;       /* Bright blue / CTA */
  --landing-baby: #E7EFFB;       /* Baby blue background */
  --landing-white: #F0F0F0;      /* Light background */
  --landing-teal: #156082;       /* Cool teal-blue */

  /* App tokens (mapped to brand) */
  --navy: #F8F9FB;
  --navy-mid: #FFFFFF;
  --navy-light: var(--landing-baby);
  --panel: rgba(255,255,255,0.94);
  --blue: var(--landing-blue);
  --blue-dim: rgba(26,97,217,0.08);
  --green: #08786C;
  --green-dim: rgba(8,120,108,0.08);
  --orange: #B95B00;
  --orange-dim: rgba(185,91,0,0.06);
  --red: #EE533D;
  --white: var(--landing-navy);  /* primary text uses brand navy */
  --silver: #7D7A78;
  --muted: #A2A09B;
  --ghost: rgba(21,25,45,0.04);
  --border: rgba(21,25,45,0.10);
  --radius: 12px;
}

html { font-size: 14px; }
body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--navy);
  color: var(--white);
  height: 100vh; overflow: hidden;
  display: flex; flex-direction: column;
}

/* ─── NAV ─── */
.topnav {
  z-index: 1000; height: 56px; flex-shrink: 0;
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.topnav-left { display: flex; align-items: center; gap: 12px; }
.logo-mark {
  width: 32px; height: 32px; background: var(--landing-blue); border-radius: 8px;
  display: grid; place-items: center;
  font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.05rem; color: #fff !important;
}
.topnav h1 { font-family: 'Outfit', sans-serif; font-size: 1.05rem; font-weight: 700; color: var(--landing-navy); }
.topnav h1 span { color: var(--silver); font-weight: 400; margin-left: 6px; }
.nav-links { display: flex; gap: 4px; }
.nav-links a {
  color: var(--silver); text-decoration: none; font-size: 0.78rem; font-weight: 500;
  padding: 6px 14px; border-radius: 6px; transition: all 0.15s;
}
.nav-links a:hover { color: var(--landing-navy); background: var(--ghost); }
.nav-links a.active { color: #fff !important; background: var(--landing-blue); }

/* ─── CONTROLS OVERLAY ─── */
/* ─── CONTROL PANEL (top-left) ─── */
.map-controls {
  position: absolute; top: 72px; left: 12px; z-index: 900;
  display: flex; flex-direction: column; gap: 6px;
}
.control-group {
  background: var(--panel); backdrop-filter: blur(24px);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  display: flex; flex-direction: column; gap: 1px;
}
.control-group.row { flex-direction: row; gap: 0; }
.pill {
  font-family: 'Outfit', sans-serif; font-size: 0.75rem; font-weight: 600;
  padding: 7px 14px; border: none; border-radius: 7px; cursor: pointer;
  background: transparent; color: var(--silver); transition: all 0.15s;
  text-align: left; white-space: nowrap;
}
.pill:hover { color: var(--white); background: var(--ghost); }
.pill.active { background: var(--blue); color: #fff !important; }

/* ─── LEGEND ─── */
.map-legend {
  position: absolute; bottom: 80px; left: 12px; z-index: 900;
  background: var(--panel); backdrop-filter: blur(24px);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.legend-title {
  font-family: 'Outfit', sans-serif; font-size: 0.65rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px; color: var(--silver); margin-bottom: 6px;
}
.legend-item {
  display: flex; align-items: center; gap: 8px; padding: 2px 0;
  font-size: 0.75rem; color: var(--white);
}
.legend-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}

/* ─── SEARCH ─── */
.search-box {
  position: absolute; top: 72px; right: 12px; z-index: 1100;
  width: 280px;
}
.search-input {
  width: 100%; padding: 9px 14px 9px 34px;
  background: var(--panel); backdrop-filter: blur(24px);
  border: 1px solid var(--border); border-radius: 10px;
  font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
  color: var(--white); outline: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--blue); }
.search-input::placeholder { color: var(--muted); }
.search-icon {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  color: var(--muted); font-size: 0.85rem; pointer-events: none;
}
.search-results {
  position: absolute; top: 100%; left: 0; right: 0; margin-top: 4px;
  background: var(--panel); backdrop-filter: blur(24px);
  border: 1px solid var(--border); border-radius: 10px;
  max-height: 360px; overflow-y: auto;
  box-shadow: 0 8px 24px rgba(0,0,0,0.14);
  display: none; z-index: 1200;
}
.search-results.open { display: block; }
.search-result {
  padding: 10px 14px; cursor: pointer; transition: background 0.1s;
  border-bottom: 1px solid var(--ghost);
}
.search-result:last-child { border-bottom: none; }
.search-result:hover { background: var(--ghost); }
.search-result-name { font-weight: 600; font-size: 0.82rem; }
.search-result-meta { font-size: 0.68rem; color: var(--silver); margin-top: 1px; }
.search-result-type {
  display: inline-block; font-size: 0.6rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px; padding: 1px 6px;
  border-radius: 4px; margin-left: 6px;
}
.type-partner { background: var(--blue-dim); color: var(--blue); }
.type-market { background: rgba(124,58,237,0.1); color: #7C3AED; }
.type-property { background: var(--green-dim); color: var(--green); }
.type-target { background: rgba(238,83,61,0.08); color: #EE533D; }
.type-target-owner { background: rgba(26,97,217,0.08); color: var(--blue); }
.type-target-rep { background: rgba(8,120,108,0.08); color: var(--green); }
.type-location { background: rgba(185,91,0,0.08); color: #B95B00; }

/* ─── DEINSTALL TOGGLE ─── */
.overlay-toggle {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px; margin: 0;
  background: transparent; border: none; border-radius: 7px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.75rem; color: var(--silver); cursor: pointer;
  transition: all 0.15s; user-select: none;
}
.overlay-toggle:hover { color: var(--white); background: var(--ghost); }
.overlay-toggle.active { color: #EE533D; }
.overlay-toggle input { accent-color: #EE533D; cursor: pointer; margin: 0; }

/* ─── TIME PERIOD PILLS ─── */
.period-pills {
  display: flex; gap: 0;
}
.period-pill {
  font-family: 'Outfit', sans-serif; font-size: 0.68rem; font-weight: 600;
  padding: 5px 10px; border: none; border-radius: 6px; cursor: pointer;
  background: transparent; color: var(--muted); transition: all 0.15s;
}
.period-pill:hover { color: var(--white); background: var(--ghost); }
.period-pill.active { background: #374151; color: #fff; }

/* ─── CONTROL DIVIDER ─── */
.control-divider {
  height: 1px; background: var(--border); margin: 2px 8px;
}

/* ─── PANEL (right side detail) ─── */
.detail-panel {
  position: absolute; top: 116px; right: 12px; bottom: 16px; width: 360px; z-index: 800;
  background: var(--panel); backdrop-filter: blur(24px);
  border: 1px solid var(--border); border-radius: var(--radius);
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none; transform: translateX(12px);
  transition: all 0.25s ease;
}
.detail-panel.open { opacity: 1; pointer-events: auto; transform: translateX(0); }
.detail-panel-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--ghost);
}
.detail-panel-title {
  font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.05rem;
  margin-bottom: 2px; padding-right: 28px;
}
.detail-panel-subtitle { font-size: 0.72rem; color: var(--silver); }
.detail-panel-kpis {
  display: flex; gap: 0; padding: 10px 16px; border-bottom: 1px solid var(--ghost);
}
.detail-kpi { flex: 1; text-align: center; }
.detail-kpi-val { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.1rem; }
.detail-kpi-label { font-size: 0.58rem; color: var(--silver); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
.detail-panel-tabs {
  display: flex; gap: 0; padding: 4px 16px; border-bottom: 1px solid var(--ghost);
}
.detail-tab {
  font-family: 'Outfit', sans-serif; font-size: 0.7rem; font-weight: 600;
  padding: 5px 12px; border: none; border-radius: 6px; cursor: pointer;
  background: transparent; color: var(--muted); transition: all 0.15s;
}
.detail-tab:hover { color: var(--white); }
.detail-tab.active { background: var(--blue); color: #fff; }
.detail-panel-list {
  flex: 1; overflow-y: auto; padding: 4px 0;
}
.detail-panel-list::-webkit-scrollbar { width: 3px; }
.detail-panel-list::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }
.detail-section-label {
  font-family: 'Outfit', sans-serif; font-size: 0.6rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted);
  padding: 8px 16px 4px;
}
.detail-row {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 8px 16px; transition: background 0.1s; cursor: pointer;
  border-bottom: 1px solid var(--ghost);
}
.detail-row:hover { background: rgba(37,99,235,0.04); }
.detail-row.target-row:hover { background: rgba(220,38,38,0.04); }
.detail-row-info { flex: 1; min-width: 0; }
.detail-row-name {
  font-size: 0.78rem; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.detail-row-market { font-size: 0.65rem; color: var(--silver); }
.detail-row-metrics {
  display: flex; gap: 8px; margin-top: 3px; flex-wrap: wrap;
}
.detail-metric {
  font-size: 0.62rem; padding: 1px 6px; border-radius: 4px;
  font-weight: 600; white-space: nowrap;
}
.detail-metric.units { background: var(--blue-dim); color: var(--blue); }
.detail-metric.vacant { background: rgba(220,38,38,0.08); color: #EE533D; }
.detail-metric.concession { background: rgba(217,119,6,0.08); color: #B95B00; }
.detail-metric.target-badge { background: rgba(220,38,38,0.08); color: #EE533D; }
.detail-metric.lease-up { background: rgba(139,92,246,0.08); color: #8B5CF6; }
.detail-close {
  position: absolute; top: 10px; right: 10px;
  width: 24px; height: 24px; border-radius: 6px; border: none;
  background: var(--ghost); color: var(--silver); cursor: pointer;
  font-size: 0.9rem; display: grid; place-items: center; transition: all 0.1s;
}
.detail-close:hover { background: var(--border); color: var(--white); }
.detail-back {
  display: flex; align-items: center; gap: 4px;
  padding: 6px 16px; font-size: 0.7rem; font-weight: 600;
  color: var(--blue); cursor: pointer; border-bottom: 1px solid var(--ghost);
  transition: background 0.1s; font-family: 'Outfit', sans-serif;
}
.detail-back:hover { background: var(--blue-dim); }
.detail-back svg { width: 12px; height: 12px; }

/* ─── BOTTOM BAR ─── */
.bottom-bar {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 900;
  display: flex; gap: 1px;
  background: var(--panel); backdrop-filter: blur(24px);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 20px;
}
.bb-stat { text-align: center; padding: 0 16px; border-right: 1px solid var(--ghost); }
.bb-stat:last-child { border-right: none; }
.bb-val { font-family: 'Outfit', sans-serif; font-size: 1.25rem; font-weight: 800; }
.bb-label { font-size: 0.6rem; color: var(--silver); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; margin-top: 1px; }

/* ─── MAP ─── */
#map { flex: 1; z-index: 1; background: #F8F9FB; }
.leaflet-control-zoom { border: none !important; margin-bottom: 60px !important; margin-right: 8px !important; }
.leaflet-control-zoom a {
  background: #fff !important; color: #374151 !important;
  border: 1px solid var(--border) !important; width: 36px !important; height: 36px !important;
  line-height: 36px !important; font-size: 16px !important;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08) !important;
}
.leaflet-control-zoom a:first-child { border-radius: 10px 10px 0 0 !important; }
.leaflet-control-zoom a:last-child { border-radius: 0 0 10px 10px !important; }
.leaflet-control-attribution { display: none !important; }

/* ─── BUBBLE LABELS ─── */
.bubble-label {
  background: none !important; border: none !important; box-shadow: none !important;
  font-family: 'Outfit', sans-serif; font-weight: 700; color: #fff;
  text-align: center; pointer-events: none !important;
  text-shadow: 0 1px 2px rgba(0,0,0,0.4);
}

/* ─── TOOLTIP ─── */
.leaflet-tooltip {
  background: #fff !important; color: #1F2937 !important;
  border: 1px solid rgba(0,0,0,0.1) !important; border-radius: 10px !important;
  padding: 10px 14px !important; font-family: 'DM Sans', sans-serif !important;
  font-size: 0.78rem !important; box-shadow: 0 4px 16px rgba(0,0,0,0.12) !important;
}
.leaflet-tooltip::before { border-top-color: #fff !important; }
.leaflet-tooltip-top::before { border-top-color: #fff !important; }
.leaflet-tooltip-bottom::before { border-bottom-color: #fff !important; }
.target-highlight-popup .leaflet-popup-content-wrapper {
  background: #fff; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  padding: 4px;
}
.target-highlight-popup .leaflet-popup-content {
  margin: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; color: var(--white);
}
.target-highlight-popup .leaflet-popup-tip { background: #fff; }
.target-highlight-ring {
  animation: targetPulse 1.4s ease-in-out infinite;
  transform-origin: center;
}
@keyframes targetPulse {
  0%, 100% { stroke-opacity: 1; stroke-width: 4; }
  50% { stroke-opacity: 0.5; stroke-width: 6; }
}
.tt-dim { color: #6B7280 !important; }
.tt-val { color: #1F2937 !important; }
.tt-name { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.85rem; margin-bottom: 2px; }
.tt-row { display: flex; justify-content: space-between; gap: 16px; }
.tt-dim { color: var(--silver); }
.tt-val { font-weight: 600; }

/* ─── LOADING ─── */
.loading-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 2000;
  background: rgba(248,249,251,0.97);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
  transition: opacity 0.4s;
}
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.spinner {
  width: 36px; height: 36px; border: 3px solid var(--ghost); border-top-color: var(--blue);
  border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-family: 'Outfit', sans-serif; font-size: 0.85rem; color: var(--silver); }
.loading-progress { width: 160px; height: 3px; background: var(--ghost); border-radius: 2px; overflow: hidden; }
.loading-progress-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width 0.3s; width: 0%; }

/* ─── VIEW SWITCH (Map/Grid toggle) ─── */
.view-switch {
  display: flex; background: var(--landing-baby); border-radius: 8px; padding: 3px;
  border: 1px solid var(--border);
}
.vs-btn {
  font-family: 'Outfit', sans-serif; font-size: 0.72rem; font-weight: 600;
  padding: 5px 14px; border: none; border-radius: 6px; cursor: pointer;
  background: transparent; color: var(--silver); transition: all 0.15s;
  display: flex; align-items: center; gap: 5px;
}
.vs-btn:hover { color: var(--landing-navy); }
.vs-btn.active { background: var(--landing-blue); color: #fff; box-shadow: 0 1px 4px rgba(26,97,217,0.3); }

/* ─── GRID VIEW ─── */
.grid-view {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  background: var(--navy);
}
.grid-toolbar {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 20px; background: var(--navy-mid);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.grid-search-wrap { position: relative; flex: 1; max-width: 360px; }
.grid-search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--muted); pointer-events: none;
}
.grid-search {
  width: 100%; padding: 7px 12px 7px 32px;
  font-family: 'DM Sans', sans-serif; font-size: 0.8rem;
  background: var(--navy-light); border: 1px solid var(--border); border-radius: 8px;
  color: var(--white); outline: none; transition: border-color 0.15s;
}
.grid-search:focus { border-color: var(--blue); }
.grid-search::placeholder { color: var(--muted); }
.grid-active-btn {
  font-family: 'Outfit', sans-serif; font-size: 0.72rem; font-weight: 600;
  padding: 7px 14px; border: 1px solid var(--border); border-radius: 8px;
  cursor: pointer; background: var(--navy-light); color: var(--muted);
  display: flex; align-items: center; gap: 5px; transition: all 0.15s;
}
.grid-active-btn.active { border-color: var(--green); color: var(--green); }
.grid-active-dot {
  width: 6px; height: 6px; border-radius: 50%; background: currentColor;
}
.grid-stats {
  display: flex; gap: 16px; margin-left: auto;
  font-family: 'Outfit', sans-serif; font-size: 0.75rem; color: var(--silver);
}
.grid-stat-val { font-weight: 800; color: var(--white); margin-right: 3px; }
.grid-scroll { flex: 1; overflow: auto; }
.grid-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
.grid-scroll::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }

/* ─── GRID TABLE ─── */
.grid-table { width: 100%; border-collapse: collapse; font-size: 0.76rem; }
.grid-table thead { position: sticky; top: 0; z-index: 10; }
.grid-table th {
  background: #E7EFFB; padding: 8px 12px; text-align: left;
  font-family: 'Outfit', sans-serif; font-size: 0.62rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.6px; color: var(--silver);
  border-bottom: 2px solid var(--border); white-space: nowrap;
  user-select: none;
}
.grid-table th.sortable { cursor: pointer; transition: color 0.15s; position: relative; padding-right: 18px; }
.grid-table th.sortable:hover { color: var(--white); }
.grid-table th.sorted { color: var(--blue); }
.grid-table th.sortable::after {
  content: '\2195'; position: absolute; right: 3px; top: 50%; transform: translateY(-50%);
  font-size: 0.65rem; opacity: 0.25;
}
.grid-table th.sortable:hover::after { opacity: 0.5; }
.grid-table th.sorted.asc::after { content: '\2191'; opacity: 1; }
.grid-table th.sorted.desc::after { content: '\2193'; opacity: 1; }
.grid-table th.num { text-align: right; }
.col-expand { width: 24px; padding-right: 4px !important; }
.col-link { width: 40px; text-align: center !important; }

.grid-table td {
  padding: 7px 12px; border-bottom: 1px solid rgba(0,0,0,0.06);
  white-space: nowrap; color: var(--white);
}
.grid-table td.num { text-align: right; font-family: 'Outfit', sans-serif; font-weight: 600; letter-spacing: -0.3px; }
.grid-table tbody tr { cursor: pointer; transition: background 0.08s; }
.grid-table tbody tr:hover { background: rgba(26,97,217,0.05); }
.grid-table tbody tr.expanded { background: rgba(26,97,217,0.06); font-weight: 500; }
.grid-table tbody tr:nth-child(even):not(.expanded):not(:hover) { background: rgba(0,0,0,0.018); }

.grid-prop { font-weight: 700; font-size: 0.78rem; letter-spacing: -0.2px; }
.deinstall-flag {
  display: inline-flex; align-items: center; gap: 2px;
  margin-left: 6px; padding: 2px 6px; border-radius: 4px;
  background: rgba(238,83,61,0.08); color: #EE533D;
  font-family: 'Outfit', sans-serif; font-size: 0.58rem; font-weight: 700;
  letter-spacing: 0.3px; vertical-align: middle; cursor: help;
  border: 1px solid rgba(238,83,61,0.12);
}
.grid-partner { color: var(--silver); font-size: 0.7rem; }

.occ-bar {

}
.occ-fill { display: block; height: 100%; border-radius: 99px; position: absolute; top: 0; left: 0; }
.occ-val { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 0.78rem; min-width: 42px; text-align: right; }

  display: inline-flex; align-items: center; gap: 4px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.62rem; font-weight: 700; padding: 3px 10px; border-radius: 99px;
  letter-spacing: 0.3px; white-space: nowrap;
}
.status-active { background: var(--green-dim); color: var(--green); }
.status-red { background: rgba(238,83,61,0.08); color: #EE533D; }
.status-amber { background: rgba(185,91,0,0.08); color: #B95B00; }
.status-blue { background: var(--blue-dim); color: var(--blue); }
.status-inactive { background: rgba(0,0,0,0.04); color: var(--muted); }

/* ─── Reservation Chips ─── */
.res-chip {
  display: inline-flex; align-items: center; justify-content: center; gap: 3px;
  min-width: 22px; padding: 2px 8px; border-radius: 5px;
  font-family: 'Outfit', sans-serif; font-size: 0.68rem; font-weight: 700;
  margin: 0 2px;

.res-curr { background: var(--green-dim); color: var(--green); }
.res-fut { background: var(--blue-dim); color: var(--blue); }
.res-label { font-weight: 500; font-size: 0.55rem; opacity: 0.75; text-transform: uppercase; letter-spacing: 0.4px; }

.unit-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

function resolveMarketCoords(marketName) {
  if (!marketName) return null;
  // Direct match in MARKET_COORDS
  if (MARKET_COORDS[marketName]) return MARKET_COORDS[marketName];
  // Via LOOKER_MARKET_MAP
  const mapped = LOOKER_MARKET_MAP[marketName];
  if (mapped && MARKET_COORDS[mapped]) return MARKET_COORDS[mapped];
  // Via SUBURB_METRO
  const metro = SUBURB_METRO[marketName];
  if (metro && MARKET_COORDS[metro]) return MARKET_COORDS[metro];
  // State-level fallback (parse "City, ST" format)
  const stateMatch = marketName.match(/,\s*([A-Z]{2})\s*$/);
  if (stateMatch && STATE_COORDS[stateMatch[1]]) return STATE_COORDS[stateMatch[1]];
  return null;
}

function resolveMarketKey(marketName) {
  if (!marketName) return null;
  if (MARKET_COORDS[marketName]) return marketName;
  const mapped = LOOKER_MARKET_MAP[marketName];
  if (mapped && MARKET_COORDS[mapped]) return mapped;
  return marketName; // fallback to raw name
}

function jitter(coords, i) {
  const angle = (i * 137.5) * Math.PI / 180;
  const r = 0.008 * Math.sqrt(i + 1);
  return { lat: coords.lat + r * Math.cos(angle), lng: coords.lng + r * Math.sin(angle) };
}

  markers.forEach(m => map.removeLayer(m));
  markers = [];

// ─── AGGREGATION FROM gridData ───
function buildMarketAgg() {
  const agg = {};
  activeGridData().forEach(d => {
    const key = resolveMarketKey(d.market_name);
    const coords = resolveMarketCoords(d.market_name);
    if (!agg[key]) agg[key] = { units: 0, occupied: 0, revenue: 0, revpah: [], partners: new Set(), props: [], coords: null, deinstalls: 0 };
    const m = agg[key];
    m.units += d.home_count || 0;
    m.occupied += d.home_occupied_count || 0;
    m.revenue += d.home_daily_rent_revenue || 0;
    if (d.all_in_revpah_net != null) m.revpah.push(d.all_in_revpah_net);
    m.partners.add(d.partner_name);
    m.props.push(d);
    m.deinstalls += d.deinstall_count || 0;
    if (!m.coords && coords) m.coords = coords;
  });
  return agg;
}

// ─── SEARCH ───
function onSearch(q) {
  const el = document.getElementById('search-results');
  if (!q || q.length < 2) { el.classList.remove('open'); return; }
  q = q.toLowerCase();
  const results = [];
  const seen = new Set();

  // Partners
  const partnerAgg = {};
  activeGridData().forEach(d => {
    if (!d.partner_name) return;
    if (!partnerAgg[d.partner_name]) partnerAgg[d.partner_name] = { units: 0, markets: new Set() };
    partnerAgg[d.partner_name].units += d.home_count || 0;
    partnerAgg[d.partner_name].markets.add(d.market_name);
  });
  Object.entries(partnerAgg).forEach(([name, data]) => {
    if (name.toLowerCase().includes(q)) {
      results.push({ id: 'p:' + name, name, type: 'partner', meta: `${data.markets.size} markets · ${fmt(data.units)} units`, sort: data.units + 1000000 });
    }
  });

  // Markets
  const mktAgg = buildMarketAgg();
  Object.entries(mktAgg).forEach(([name, data]) => {
    if (name.toLowerCase().includes(q)) {
      results.push({ id: 'm:' + name, name, type: 'market', meta: `${data.partners.size} partners · ${fmt(data.units)} units`, sort: data.units + 500000 });
    }
  });

  // Properties
  activeGridData().forEach(d => {
    const key = 'prop:' + d.property_name + ':' + d.market_name;
    if (seen.has(key)) return;
    const hay = [d.property_name, d.partner_name, d.pmc_name, d.dp_name, d.market_name].filter(Boolean).join(' ').toLowerCase();
    if (hay.includes(q) || q.split(/\s+/).filter(Boolean).every(t => hay.includes(t))) {
      seen.add(key);
      results.push({ id: key, name: d.property_name, type: 'property', meta: `${d.partner_name} · ${d.market_name} · ${d.home_count || 0}u`, sort: d.home_count || 0 });
    }
  });

  // Target owners (groups of CoStar targets under the same True Owner)
  const targetOwnerAgg = {};
  targetData.forEach(d => {
    if (!d.partner || d.partner === '—') return;
    if (!targetOwnerAgg[d.partner]) targetOwnerAgg[d.partner] = { targets: 0, units: 0, markets: new Set() };
    targetOwnerAgg[d.partner].targets++;
    targetOwnerAgg[d.partner].units += d.totalUnits || 0;
    if (d.market) targetOwnerAgg[d.partner].markets.add(d.market);
  });
  Object.entries(targetOwnerAgg).forEach(([name, data]) => {
    if (name.toLowerCase().includes(q)) {
      results.push({
        id: 'to:' + name,
        name,
        type: 'target-owner',
        meta: `${data.targets} target${data.targets === 1 ? '' : 's'} · ${data.markets.size} market${data.markets.size === 1 ? '' : 's'} · ${fmt(data.units)} units`,
        sort: data.units + 800000   // ranked just below partner, above individual target
      });
    }
  });

  // Target reps
  const targetRepAgg = {};
  targetData.forEach(d => {
    if (!d.rep) return;
    if (!targetRepAgg[d.rep]) targetRepAgg[d.rep] = { targets: 0, units: 0 };
    targetRepAgg[d.rep].targets++;
    targetRepAgg[d.rep].units += d.totalUnits || 0;
  });
  Object.entries(targetRepAgg).forEach(([name, data]) => {
    if (name.toLowerCase().includes(q)) {
      results.push({
        id: 'tr:' + name,
        name,
        type: 'target-rep',
        meta: `${data.targets} target${data.targets === 1 ? '' : 's'} assigned · ${fmt(data.units)} units`,
        sort: data.units + 700000
      });
    }
  });

  // Individual targets
  targetData.forEach(d => {
    const hay = [d.name, d.partner, d.rep, d.market, d.address].filter(Boolean).join(' ').toLowerCase();
    if (hay.includes(q) || q.split(/\s+/).filter(Boolean).every(t => hay.includes(t))) {
      const meta = [d.rep, d.market, (d.totalUnits ? d.totalUnits + 'u' : '')].filter(Boolean).join(' · ');
      results.push({ id: 't:' + d.dealId, name: d.name, type: 'target', meta, sort: d.totalUnits || 0 });
    }
  });

  results.sort((a, b) => b.sort - a.sort);
  const top = results.slice(0, 15);

  // Show local results immediately, then async geocode if few matches
  window._searchResults = top;
  if (top.length) {
    el.innerHTML = top.map((r, i) => `
      <div class="search-result" onmousedown="selectSearchIdx(${i})">
        <div class="search-result-name">${r.name}<span class="search-result-type type-${r.type}">${r.type}</span></div>
        <div class="search-result-meta">${r.meta}</div>
      </div>
    `).join('');
    el.classList.add('open');
  }

  // Geocode address search if query looks like an address (3+ chars, few local results)
  if (q.length >= 4 && top.length < 5) {
    _geoSearch(q, el, top);
  } else if (!top.length) {
    el.classList.remove('open');
  }
}

// Debounced geocoding via Nominatim (OpenStreetMap) — free, no API key
let _geoTimer = null;
function _geoSearch(q, el, existing) {
  clearTimeout(_geoTimer);
  _geoTimer = setTimeout(async () => {
    try {
      const resp = await fetch('https://nominatim.openstreetmap.org/search?format=json&countrycodes=us&limit=3&q=' + encodeURIComponent(q), {
        headers: { 'User-Agent': 'LandingAPDashboard/1.0' }
      });
      if (!resp.ok) return;
      const places = await resp.json();
      const geoResults = places.map(p => ({
        id: 'geo:' + p.place_id,
        name: p.display_name.split(',').slice(0, 3).join(','),
        type: 'location',
        meta: 'Go to this location on map',
        sort: -1,
        lat: parseFloat(p.lat),
        lng: parseFloat(p.lon)
      }));
      if (!geoResults.length) return;
      const combined = [...existing, ...geoResults];
      window._searchResults = combined;
      el.innerHTML = combined.map((r, i) => `
        <div class="search-result" onmousedown="selectSearchIdx(${i})">
          <div class="search-result-name">${r.name}<span class="search-result-type type-${r.type}">${r.type}</span></div>
          <div class="search-result-meta">${r.meta}</div>
        </div>
      `).join('');
      el.classList.add('open');
    } catch (e) { /* geocode failed, ignore */ }
  }, 350);
}

function closeSearch() { document.getElementById('search-results').classList.remove('open'); }

let _openedFromSearch = false;
let _lastSearchQuery = '';

function selectSearchIdx(idx) {
  const r = window._searchResults?.[idx];
  if (!r) return;
  _lastSearchQuery = document.getElementById('search-input').value;
  _openedFromSearch = true;
  closeSearch();

  if (r.type === 'market') {
    setView('markets', true);
    drillIntoMarket(r.name);
  } else if (r.type === 'partner') {
    // For partner search, go to portfolio and zoom to their properties
    setView('portfolio', true);
    drillIntoPartnerFromSearch(r.name);
  } else if (r.type === 'target-owner') {
    setView('targets', true);
    // Apply owner filter + zoom to fit all of this owner's targets
    const input = document.getElementById('owner-filter-input');
    if (input) input.value = r.name;
    applyOwnerFilter(r.name);
    zoomToActiveTargets();
  } else if (r.type === 'target-rep') {
    setView('targets', true);
    const input = document.getElementById('rep-filter-input');
    if (input) input.value = r.name;
    applyRepFilter(r.name);
    zoomToActiveTargets();
  } else if (r.type === 'target') {
    setView('targets', true);
    const d = targetData.find(t => t.name === r.name);
    if (!d?.coords) return;
    // Drill into its market first, then highlight the specific pin
    if (d.market) drillIntoTargetMarket(d.market);
    setTimeout(() => highlightTargetPin(d), 450);
  } else if (r.type === 'location') {
    // Geocoded address — fly to coordinates
    map.setView([r.lat, r.lng], 14, { animate: true });
    showHighlightPin({ lat: r.lat, lng: r.lng }, `<div style="font-family:Outfit,sans-serif;font-size:0.75rem;font-weight:600">${r.name}</div>`);
  } else {
    // Property
    setView('portfolio', true);
    const d = gridData.find(p => p.property_name === r.name);
    if (!d) return;
    const coords = resolveMarketCoords(d.market_name);
    if (!coords) return;
    map.setView([coords.lat, coords.lng], 12, { animate: true });
    showHighlightPin(coords, propertyTooltip(d));
  }
}

function showHighlightPin(coords, tooltipContent) {
  const highlight = L.circleMarker([coords.lat, coords.lng], {
    radius: 16, fillColor: '#1A61D9', color: '#fff', weight: 3, fillOpacity: 0.9
  });
  highlight.addTo(map);
  markers.push(highlight);
  highlight.bindPopup(`<div style="font-size:0.82rem">${tooltipContent}</div>`, {
    maxWidth: 300, className: 'leaflet-popup'
  }).openPopup();
}

// ─── PIN REGISTRY & ZOOM ───
let _pinRegistry = {};
let _activeHighlight = null;

function zoomToPin(key) {
  if (_activeHighlight) {
    try { _activeHighlight.pin.setRadius(_activeHighlight.r); _activeHighlight.pin.setStyle({ weight: 2, color: 'rgba(255,255,255,0.5)' }); _activeHighlight.pin.closeTooltip(); } catch(e) {}
    _activeHighlight = null;
  }
  markers.forEach(m => { try { m.closeTooltip(); } catch(e) {} });

  const pin = _pinRegistry[key];
  if (!pin) return;
  const ll = pin.getLatLng();
  map.setView([ll.lat, ll.lng], 14, { animate: true });
  setTimeout(() => {
    const origRadius = pin.getRadius();
    pin.setRadius(origRadius + 6);
    pin.setStyle({ weight: 3, color: '#1A61D9' });
    pin.openTooltip();
    _activeHighlight = { pin, r: origRadius };
  }, 300);
}

// ─── TOOLTIP BUILDERS ───
function propertyTooltip(d) {
  const occ = d.occupancy != null ? (d.occupancy * 100).toFixed(0) : null;
  const occBar = occ != null
    ? `<div style="margin:4px 0;display:flex;align-items:center;gap:6px">
        <div style="flex:1;height:6px;background:#E5E5E3;border-radius:3px;overflow:hidden"><div style="width:${occ}%;height:100%;background:${d.occupancy >= 0.85 ? '#08786C' : d.occupancy >= 0.6 ? '#B95B00' : '#EE533D'};border-radius:3px"></div></div>
        <span style="font-weight:700;font-size:0.72rem;color:${d.occupancy >= 0.85 ? '#08786C' : d.occupancy >= 0.6 ? '#B95B00' : '#EE533D'}">${occ}%</span>
      </div>`
    : '';
  const statusColor = STATUS_COLORS[d.status_color] || STATUS_COLORS.neutral;
  const statusBadge = d.status_label
    ? `<span style="display:inline-block;padding:1px 8px;border-radius:4px;font-size:0.65rem;font-weight:700;background:${statusColor}20;color:${statusColor}">${d.status_label}</span>`
    : '';
  const rev = d.home_daily_rent_revenue != null ? '$' + Math.round(d.home_daily_rent_revenue).toLocaleString() : '--';
  const deinstallFlag = d.deinstall_count > 0 ? `<div style="margin-top:4px;color:#EE533D;font-size:0.72rem;font-weight:600">${d.deinstall_count} unit${d.deinstall_count > 1 ? 's' : ''} deinstalling</div>` : '';

  return `<div class="tt-name">${d.property_name}</div>
    <div class="tt-row"><span class="tt-dim">Partner</span><span class="tt-val">${d.partner_name}</span></div>
    <div class="tt-row"><span class="tt-dim">Market</span><span class="tt-val">${d.market_name}</span></div>
    <div class="tt-row"><span class="tt-dim">Units</span><span class="tt-val">${d.home_count || 0}</span></div>
    ${occBar}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:2px">
      ${statusBadge}
      <span style="font-size:0.72rem;color:var(--green);font-weight:600">${rev}/day</span>
    </div>
    ${deinstallFlag}`;
}

function marketTooltipContent(name, data) {
  const avgOcc = data.units > 0 ? data.occupied / data.units : 0;
  const occPct = (avgOcc * 100).toFixed(1);
  return `<div class="tt-name">${name}</div>
    <div class="tt-row"><span class="tt-dim">Properties</span><span class="tt-val">${data.props.length}</span></div>
    <div class="tt-row"><span class="tt-dim">Units</span><span class="tt-val">${fmt(data.units)}</span></div>
    <div class="tt-row"><span class="tt-dim">Occupancy</span><span class="tt-val" style="color:${avgOcc >= 0.85 ? '#08786C' : avgOcc >= 0.6 ? '#B95B00' : '#EE533D'}">${occPct}%</span></div>
    <div class="tt-row"><span class="tt-dim">Daily Revenue</span><span class="tt-val" style="color:var(--green)">$${fmt(Math.round(data.revenue))}</span></div>`;
}

// Return a direct link to the property's website, or null if we don't have one.
// Priority: property_website (curated in HS) > costar_leasing_company_website (from CoStar ingest).
function resolveWebsiteLink(d) {
  if (!d.website) return null;
  let url = d.website;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  if (d.websiteSource === 'property') {
    return { url, label: 'Website', title: 'Property marketing website' };
  }
  return { url, label: 'Leasing Co.', title: 'Leasing company site' };
}

function targetTooltipContent(d) {
  const stars = d.starRating ? ' <span style="color:#B95B00;font-size:0.72rem">' + '★'.repeat(Math.round(d.starRating)) + '</span>' : '';
  const rows = [];
  if (d.address) rows.push(`<div style="color:var(--silver);font-size:0.68rem;margin-bottom:3px">${d.address}${d.assetClass ? ' · ' + d.assetClass : ''}</div>`);
  const kpi = [];
  if (d.totalUnits) kpi.push(`<b>${d.totalUnits}u</b>`);
  if (d.vacantUnits > 0) {
    const v = d.vacantUnits;
    const vc = v >= 10 ? '#08786C' : v >= 5 ? '#EAB308' : '#EE533D';
    const est = d.vacantEstimated ? '<span style="font-size:0.6rem;opacity:0.8" title="Estimated from vacancy %">~</span>' : '';
    kpi.push(`<span style="color:${vc};font-weight:600">${v}${est} vacant</span>`);
  } else if (d.vacancy > 0) {
    kpi.push(`<span style="color:#EE533D">${d.vacancy.toFixed(1)}% vac</span>`);
  }
  if (d.askingRent) kpi.push(`$${Math.round(d.askingRent).toLocaleString()}/u`);
  if (kpi.length) rows.push(`<div style="font-size:0.72rem;margin-bottom:4px">${kpi.join(' · ')}</div>`);
  if (d.partner && d.partner !== '—') rows.push(`<div class="tt-row"><span class="tt-dim">Owner</span><span class="tt-val">${d.partner}</span></div>`);
  if (d.rep) rows.push(`<div class="tt-row"><span class="tt-dim">Rep</span><span class="tt-val">${d.rep}</span></div>`);
  if (d.stage) rows.push(`<div class="tt-row"><span class="tt-dim">Stage</span><span class="tt-val" style="color:var(--blue);font-weight:600">${d.stage}</span></div>`);
  const ago = syncedAgo(d.lastSynced);
  if (ago) rows.push(`<div style="margin-top:4px;font-size:0.62rem;color:var(--muted);text-align:right">Synced ${ago}</div>`);
  if (d.leaseUp) rows.push(`<div style="color:#8B5CF6;font-weight:600;font-size:0.68rem">Lease-up signal</div>`);

  // Quick-action links: Website + HubSpot deal + Google Maps
  const links = [];
  // Website link — only rendered if a URL was curated in HubSpot or captured by the ingest
  const webInfo = resolveWebsiteLink(d);
  if (webInfo) {
    links.push(`<a href="${webInfo.url}" target="_blank" rel="noopener" title="${webInfo.title}" style="color:#2D3654;font-weight:600;font-size:0.7rem;text-decoration:none;padding:4px 10px;border-radius:6px;background:rgba(45,54,84,0.08);display:inline-flex;align-items:center;gap:4px">${webInfo.label} &#8599;</a>`);
  }
  if (d.dealId) {
    links.push(`<a href="https://app.hubspot.com/contacts/20754835/record/0-3/${d.dealId}" target="_blank" rel="noopener" style="color:var(--landing-blue);font-weight:600;font-size:0.7rem;text-decoration:none;padding:4px 10px;border-radius:6px;background:var(--landing-baby);display:inline-flex;align-items:center;gap:4px">HubSpot &#8599;</a>`);
  }
  if (d.address) {
    // Include property name so Google Maps lands on the named place, not just the street address
    const q = encodeURIComponent([d.name, d.address].filter(Boolean).join(' '));
    links.push(`<a href="https://www.google.com/maps/search/?api=1&query=${q}" target="_blank" rel="noopener" style="color:var(--landing-teal);font-weight:600;font-size:0.7rem;text-decoration:none;padding:4px 10px;border-radius:6px;background:rgba(21,96,130,0.08);display:inline-flex;align-items:center;gap:4px">Google Maps &#8599;</a>`);
  }
  if (links.length) rows.push(`<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">${links.join('')}</div>`);

  return `<div class="tt-name">${d.name}${stars}</div>${rows.join('')}`;
}

// ─── DETAIL PANEL ───
let _drillState = null;
let _detailListItems = [];

function closeDetail(resetSearch) {
  document.getElementById('detail-panel').classList.remove('open');
  _drillState = null;
  if (resetSearch !== false) _openedFromSearch = false;
  updateLegend(currentView);
  renderView();
}

function goBackFromDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  _drillState = null;
  updateLegend(currentView);
  renderView();
  if (_lastSearchQuery) {
    const input = document.getElementById('search-input');
    input.value = _lastSearchQuery;
    input.focus();
    onSearch(_lastSearchQuery);
  }
}

function detailClick(idx) {
  const item = _detailListItems[idx];
  if (!item) return;
  if (item.propertyData) {
    // Drill into property detail
    openPropertyDetail(item.propertyData);
  } else if (item.key) {
    zoomToPin(item.key);
  } else if (item.marketKey) {
    drillIntoMarket(item.marketKey);
  }
}

// ─── PROPERTY DETAIL PANEL ───
function openPropertyDetail(d) {
  // Pan map to the property's pin and highlight it (was missing — felt "broken")
  const key = 'prop:' + d.property_name + ':' + d.market_name;
  const pin = _pinRegistry[key];
  if (pin) {
    map.stop();
    const ll = pin.getLatLng();
    map.flyTo([ll.lat, ll.lng], Math.max(map.getZoom(), 11), { animate: true, duration: 0.4 });
    // Restore previous highlight then pump up this pin
    if (_selectedPortfolioPin && _selectedPortfolioOrig) {
      try { _selectedPortfolioPin.setStyle(_selectedPortfolioOrig); _selectedPortfolioPin.setRadius(_selectedPortfolioOrig._radius); } catch(e) {}
    }
    _selectedPortfolioOrig = {
      color: pin.options.color, weight: pin.options.weight, fillOpacity: pin.options.fillOpacity, _radius: pin.getRadius()
    };
    pin.setStyle({ color: '#1A61D9', weight: 5, fillOpacity: 1 });
    pin.setRadius(_selectedPortfolioOrig._radius + 6);
    pin.bringToFront();
    _selectedPortfolioPin = pin;
  }

  const panel = document.getElementById('detail-panel');
  document.getElementById('dp-title').textContent = d.property_name;
  document.getElementById('dp-subtitle').textContent = `${d.partner_name} — ${d.market_name}`;

  const occ = d.occupancy != null ? pct(d.occupancy) : '--';
  const rev = d.home_daily_rent_revenue != null ? '$' + Math.round(d.home_daily_rent_revenue).toLocaleString() : '--';
  const revpah = d.all_in_revpah_net != null ? '$' + d.all_in_revpah_net.toFixed(2) : '--';

  document.getElementById('dp-kpis').innerHTML = [
    { val: fmt(d.home_count || 0), label: 'Units' },
    { val: occ, label: 'Occupancy' },
    { val: rev, label: 'Daily Rev' },
    { val: revpah, label: 'RevPAH' }
  ].map(k =>
    `<div class="detail-kpi"><div class="detail-kpi-val">${k.val}</div><div class="detail-kpi-label">${k.label}</div></div>`
  ).join('');

  const backBtn = document.getElementById('dp-back');
  backBtn.style.display = _openedFromSearch || _drillState ? '' : 'none';

  _drillState = { title: d.property_name, type: 'property', propertyData: d };

  document.getElementById('dp-tabs').innerHTML = `
    <button class="detail-tab active" onclick="showPropertyDetailTab('units')">Units & Status</button>
    <button class="detail-tab" onclick="showPropertyDetailTab('reservations')">Reservations</button>
  `;

  // Load unit detail
  document.getElementById('dp-list').innerHTML = '<div style="padding:24px;text-align:center;color:var(--muted)"><div class="spinner" style="display:inline-block;width:18px;height:18px;border-width:2px;vertical-align:middle;margin-right:8px"></div>Loading...</div>';
  panel.classList.add('open');

  loadPropertyDetailContent(d.property_name, 'units');
}

async function loadPropertyDetailContent(name, tab) {
  const listEl = document.getElementById('dp-list');
  try {
    const data = await fetchPropertyDetail(name);
    if (tab === 'units') renderPropertyDetailUnits(listEl, data.units);
    else renderPropertyDetailReservations(listEl, data.reservations);
  } catch (e) {
    listEl.innerHTML = `<div style="padding:24px;text-align:center;color:var(--muted)">Error loading details: ${e.message}</div>`;
  }
}

function showPropertyDetailTab(tab) {
  document.querySelectorAll('.detail-tab').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (!_drillState || _drillState.type !== 'property') return;
  document.getElementById('dp-list').innerHTML = '<div style="padding:24px;text-align:center;color:var(--muted)"><div class="spinner" style="display:inline-block;width:18px;height:18px;border-width:2px;vertical-align:middle;margin-right:8px"></div>Loading...</div>';
  loadPropertyDetailContent(_drillState.title, tab);
}

function renderPropertyDetailUnits(el, units) {
  if (!units || !units.length) { el.innerHTML = '<div style="padding:24px;text-align:center;color:var(--muted)">No unit data</div>'; return; }
  let html = '';
  units.forEach(u => {
    const installed = u.home_is_installed === 'Yes';
    const resStatus = (u.home_reservation_status || '').toLowerCase();
    const hasRes = resStatus && !resStatus.includes('not reserved') && resStatus !== '';
    let statusDot, statusLabel;
    if (installed && hasRes) { statusDot = 'unit-dot-green'; statusLabel = 'Occupied'; }
    else if (installed && !hasRes) { statusDot = 'unit-dot-amber'; statusLabel = 'Available'; }
    else if (!installed && u.deinstall_date) { statusDot = 'unit-dot-red'; statusLabel = 'Deinstalled'; }
    else { statusDot = 'unit-dot-blue'; statusLabel = 'Unactivated'; }

    const rev = u.home_daily_rent_revenue != null ? '$' + Number(u.home_daily_rent_revenue).toFixed(0) : '--';
    const deinstallHtml = u.deinstall_date
      ? `<span style="color:#EE533D;font-size:0.62rem;font-weight:600">DI ${u.deinstall_date}</span>`
      : (u.expected_deinstall_date && !installed)
        ? `<span style="color:#B95B00;font-size:0.62rem">${u.expected_deinstall_date} (exp)</span>`
        : '';

    html += `<div class="detail-row" style="cursor:default">
      <div class="detail-row-info">
        <div class="detail-row-name"><span class="unit-dot ${statusDot}"></span>${gEsc(u.unit_number)}</div>
        <div class="detail-row-market">${statusLabel}${u.home_reservation_status ? ' · ' + gEsc(u.home_reservation_status) : ''}</div>
        <div class="detail-row-metrics">
          <span class="detail-metric units">${rev}/day</span>
          ${u.days_vacant_standard != null ? `<span class="detail-metric ${u.days_vacant_standard > 30 ? 'vacant' : 'units'}">${u.days_vacant_standard}d vacant</span>` : ''}
          ${deinstallHtml ? `<span class="detail-metric vacant">${deinstallHtml}</span>` : ''}
        </div>
      </div>
    </div>`;
  });
  el.innerHTML = html;
}

function renderPropertyDetailReservations(el, res) {
  if (!res || !res.length) { el.innerHTML = '<div style="padding:24px;text-align:center;color:var(--muted)">No reservations</div>'; return; }
  const sorted = [...res].sort((a, b) => (b.reservation_start_date || '').localeCompare(a.reservation_start_date || ''));
  let html = '';
  sorted.slice(0, 50).forEach(r => {
    const isCurr = r.current_reservation_count > 0;
    const isFut = r.future_reservation_count > 0;
    const badge = isCurr ? '<span class="gd-badge-curr">Active</span>' : isFut ? '<span class="gd-badge-future">Upcoming</span>' : '<span style="color:var(--muted);font-size:0.65rem">Past</span>';
    let totalNights = r.reservation_length_raw;
    if (totalNights == null && r.reservation_start_date && r.reservation_end_date) {
      const start = new Date(r.reservation_start_date);
      const end = new Date(r.reservation_end_date);
      if (!isNaN(start) && !isNaN(end)) totalNights = Math.round((end - start) / 86400000);
    }
    const nightsStr = totalNights != null ? totalNights + ' nights' : '';

    html += `<div class="detail-row" style="cursor:default">
      <div class="detail-row-info">
        <div class="detail-row-name">${gEsc(r.unit_number)} ${badge}</div>
        <div class="detail-row-market">${gEsc(r.reservation_start_date || '--')} &rarr; ${gEsc(r.reservation_end_date || '--')}</div>
        <div class="detail-row-metrics">
          ${nightsStr ? `<span class="detail-metric units">${nightsStr}</span>` : ''}
          <span class="detail-metric" style="background:rgba(0,0,0,0.04);color:var(--silver)">${gEsc(r.reservation_length || '--')}</span>
        </div>
      </div>
    </div>`;
  });
  if (res.length > 50) html += `<div style="padding:12px 16px;text-align:center;color:var(--muted);font-size:0.72rem">Showing 50 of ${res.length} reservations</div>`;
  el.innerHTML = html;
}

// ─── MARKET DETAIL PANEL ───
function drillIntoMarket(name) {
  const mktAgg = buildMarketAgg();
  const mk = mktAgg[name];
  if (!mk?.coords) return;

  const avgOcc = mk.units > 0 ? mk.occupied / mk.units : 0;

  _drillState = { title: name, type: 'market', props: mk.props, coords: mk.coords };

  const panel = document.getElementById('detail-panel');
  document.getElementById('dp-title').textContent = name;
  document.getElementById('dp-subtitle').textContent = `${mk.props.length} properties`;
  document.getElementById('dp-kpis').innerHTML = [
    { val: fmt(mk.units), label: 'Total Units' },
    { val: pct(avgOcc), label: 'Avg Occupancy' },
    { val: '$' + fmt(Math.round(mk.revenue)), label: 'Total Daily Rev' }
  ].map(k =>
    `<div class="detail-kpi"><div class="detail-kpi-val">${k.val}</div><div class="detail-kpi-label">${k.label}</div></div>`
  ).join('');

  const backBtn = document.getElementById('dp-back');
  backBtn.style.display = _openedFromSearch ? '' : 'none';

  document.getElementById('dp-tabs').innerHTML = `
    <button class="detail-tab active" onclick="showMarketDetailTab('properties')">Properties (${mk.props.length})</button>
  `;

  renderMarketPropertyList(mk.props);
  panel.classList.add('open');

  // Zoom
  clearMap();
  plotPortfolioPins(mk.props);
  map.setView([mk.coords.lat, mk.coords.lng], 10, { animate: true });
}

function showMarketDetailTab(tab) {
  document.querySelectorAll('.detail-tab').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (!_drillState || _drillState.type !== 'market') return;
  renderMarketPropertyList(_drillState.props);
}

function renderMarketPropertyList(props) {
  const sorted = [...props].sort((a, b) => (b.home_count || 0) - (a.home_count || 0));
  _detailListItems = sorted.map(d => ({ propertyData: d }));
  document.getElementById('dp-list').innerHTML = sorted.map((d, i) => {
    const occ = d.occupancy != null ? (d.occupancy * 100).toFixed(0) + '%' : '--';
    const statusColor = STATUS_COLORS[d.status_color] || STATUS_COLORS.neutral;
    return `<div class="detail-row" onclick="detailClick(${i})">
      <div class="detail-row-info">
        <div class="detail-row-name">${d.property_name}</div>
        <div class="detail-row-market">${d.partner_name}</div>
        <div class="detail-row-metrics">
          <span class="detail-metric units">${d.home_count || 0}u</span>
          <span class="detail-metric" style="background:${statusColor}20;color:${statusColor}">${occ} occ</span>
          ${d.deinstall_count > 0 ? `<span class="detail-metric vacant">${d.deinstall_count} DI</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('') || '<div style="padding:16px;color:var(--silver);font-size:0.8rem">No properties found</div>';
}

// Partner search drill-in (from search)
function drillIntoPartnerFromSearch(partnerName) {
  const props = activeGridData().filter(d => (d.partner_name || '').toLowerCase() === partnerName.toLowerCase());
  if (!props.length) return;

  _drillState = { title: partnerName, type: 'partner-search', props };

  const totalUnits = props.reduce((s, d) => s + (d.home_count || 0), 0);
  const totalOcc = props.reduce((s, d) => s + (d.home_occupied_count || 0), 0);
  const avgOcc = totalUnits > 0 ? totalOcc / totalUnits : 0;
  const markets = new Set(props.map(d => d.market_name));

  const panel = document.getElementById('detail-panel');
  document.getElementById('dp-title').textContent = partnerName;
  document.getElementById('dp-subtitle').textContent = `${markets.size} markets · ${props.length} properties`;
  document.getElementById('dp-kpis').innerHTML = [
    { val: fmt(totalUnits), label: 'Total Units' },
    { val: pct(avgOcc), label: 'Avg Occupancy' },
    { val: props.length.toString(), label: 'Properties' }
  ].map(k =>
    `<div class="detail-kpi"><div class="detail-kpi-val">${k.val}</div><div class="detail-kpi-label">${k.label}</div></div>`
  ).join('');

  document.getElementById('dp-back').style.display = '';
  document.getElementById('dp-tabs').innerHTML = `
    <button class="detail-tab active" onclick="showMarketDetailTab('properties')">Properties (${props.length})</button>
  `;

  renderMarketPropertyList(props);
  panel.classList.add('open');

  // Plot and zoom to all their properties
  clearMap();
  plotPortfolioPins(props);
  const allCoords = props.map(d => resolveMarketCoords(d.market_name)).filter(Boolean);
  if (allCoords.length > 1) {
    map.fitBounds(allCoords.map(c => [c.lat, c.lng]), { padding: [80, 80], animate: true });
  } else if (allCoords.length === 1) {
    map.setView([allCoords[0].lat, allCoords[0].lng], 10, { animate: true });
  }
}

// ─── RENDER: PORTFOLIO (individual property pins) ───
function plotPortfolioPins(data) {
  data.forEach((d, i) => {
    const coords = resolveMarketCoords(d.market_name);
    if (!coords) return;
    const pos = jitter(coords, i);
    const units = d.home_count || 1;
    const sz = Math.max(6, Math.min(20, 4 + Math.sqrt(units) * 2));
    const color = STATUS_COLORS[d.status_color] || STATUS_COLORS.neutral;

    const pin = L.circleMarker([pos.lat, pos.lng], {

    });
    pin.bindTooltip(propertyTooltip(d), { direction: 'top', offset: [0, -sz] });

    pin.addTo(map);
    markers.push(pin);
    _pinRegistry['prop:' + d.property_name + ':' + d.market_name] = pin;
  });
}

// ─── TARGETS: aggregate by market (respects True Owner filter) ───
function buildTargetMarketAgg() {
  const agg = {};
  for (const t of activeTargetData()) {
    if (!t.market) continue;
    const key = t.market;
    if (!agg[key]) {
      agg[key] = { name: key, targets: [], units: 0, vacancySum: 0, vacancyCount: 0, freshCount: 0, coords: null };
    }
    agg[key].targets.push(t);
    agg[key].units += t.totalUnits || 0;
    if (t.vacancy > 0) { agg[key].vacancySum += t.vacancy; agg[key].vacancyCount++; }
    if (t.lastSynced && (Date.now()/1000 - t.lastSynced) < 7 * 86400) agg[key].freshCount++;
    // Market-level coords: first target's market coords (via lookup)
    if (!agg[key].coords) {
      const mk = MARKET_COORDS[key] || (LOOKER_MARKET_MAP[key] ? MARKET_COORDS[LOOKER_MARKET_MAP[key]] : null);
      if (mk) agg[key].coords = mk;
      else if (t.coords) agg[key].coords = t.coords; // fallback: first geocoded target
    }
  }
  return agg;
}

function daysSince(epochSec) {
  if (!epochSec) return null;
  return Math.floor((Date.now()/1000 - epochSec) / 86400);
}

function syncedAgo(epochSec) {
  const d = daysSince(epochSec);
  if (d == null) return '';
  if (d === 0) return 'today';
  if (d === 1) return '1d ago';
  if (d < 7) return d + 'd ago';
  if (d < 30) return Math.floor(d/7) + 'w ago';
  return Math.floor(d/30) + 'mo ago';
}

// Color by vacant-unit bucket: green=10+ (high opportunity), yellow=5-9, red=1-4, gray=0
function targetPinColor(d) {
  const v = d.vacantUnits || 0;
  if (v >= 10) return '#08786C'; // green
  if (v >= 5) return '#EAB308';  // yellow
  if (v >= 1) return '#EE533D';  // red
  return '#A2A09B';              // gray — no known vacancy
}

function drillIntoTargetMarket(marketName) {
  const mktAgg = buildTargetMarketAgg();
  const mk = mktAgg[marketName];
  if (!mk?.coords) return;

  _drillState = { title: marketName, type: 'target-market', targets: mk.targets, coords: mk.coords };

  const panel = document.getElementById('detail-panel');
  document.getElementById('dp-title').textContent = marketName;
  document.getElementById('dp-subtitle').textContent = `${mk.targets.length} CoStar targets`;

  const avgVacancy = mk.vacancyCount > 0 ? mk.vacancySum / mk.vacancyCount : 0;
  document.getElementById('dp-kpis').innerHTML = [
    { val: fmt(mk.units), label: 'Total Units' },
    { val: avgVacancy.toFixed(1) + '%', label: 'Avg Vacancy' },
    { val: mk.freshCount, label: 'Fresh (<7d)' }
  ].map(k =>
    `<div class="detail-kpi"><div class="detail-kpi-val">${k.val}</div><div class="detail-kpi-label">${k.label}</div></div>`
  ).join('');

  document.getElementById('dp-back').style.display = '';
  document.getElementById('dp-tabs').innerHTML = `
    <button class="detail-tab active">Properties (${mk.targets.length})</button>
  `;

  renderTargetPropertyList(mk.targets);
  panel.classList.add('open');

  // For targets without coords yet, assign the market center so they show up immediately
  for (const t of mk.targets) {
    if (!t.coords) { t.coords = mk.coords; t.coordsSource = 'market'; }
  }

  // Clear map + any lingering highlight/tooltip
  clearMapTooltips();
  clearMap();
  plotTargetPins(mk.targets);
  // Zoom to market center — pins use jitter around market coords so they spread cleanly
  map.setView([mk.coords.lat, mk.coords.lng], 11, { animate: true, duration: 0.3 });
  // NOTE: client-side per-address geocoding intentionally disabled — it caused 20s
  // of stuttering re-renders after drill-in. Re-enable once a server-side cache exists.
}

// Client-side geocoding with localStorage cache — lazy, batched on market drill-in
const GEO_CACHE_KEY = 'landingTargetGeoCache_v1';
let _geoCache = null;
function loadGeoCache() {
  if (_geoCache) return _geoCache;
  try { _geoCache = JSON.parse(localStorage.getItem(GEO_CACHE_KEY) || '{}'); }
  catch (e) { _geoCache = {}; }
  return _geoCache;
}
function saveGeoCache() {
  try { localStorage.setItem(GEO_CACHE_KEY, JSON.stringify(_geoCache || {})); }
  catch (e) { /* quota full, ignore */ }
}
async function geocodeClient(address) {
  if (!address || address.length < 5) return null;
  const cache = loadGeoCache();
  if (cache[address] !== undefined) return cache[address]; // null or {lat,lng}
  try {
    const resp = await fetch('https://nominatim.openstreetmap.org/search?format=json&countrycodes=us&limit=1&q=' + encodeURIComponent(address));
    if (!resp.ok) { cache[address] = null; saveGeoCache(); return null; }
    const arr = await resp.json();
    if (!Array.isArray(arr) || !arr.length) { cache[address] = null; saveGeoCache(); return null; }
    const coords = { lat: parseFloat(arr[0].lat), lng: parseFloat(arr[0].lon) };
    cache[address] = coords;
    saveGeoCache();
    return coords;
  } catch (e) { return null; }
}

async function geocodeTargetsInMarket(targets) {
  // Resolve address-level coords for each target, one at a time (respects Nominatim rate limit)
  // Returns count of newly geocoded addresses
  let count = 0;
  for (const t of targets) {
    if (t.coords && t.coordsSource === 'address') continue; // already have address-level
    if (!t.address) continue;
    const coords = await geocodeClient(t.address);
    if (coords) {
      t.coords = coords;
      t.coordsSource = 'address';
      count++;
      // Progressive render: update the pin if still viewing this market
      if (_drillState?.type === 'target-market') {
        updateTargetPin(t);
      }
    }
    // 1 req/sec max for Nominatim
    await new Promise(r => setTimeout(r, 1100));
  }
  return count;
}

function updateTargetPin(d) {
  // Find the existing pin for this target and move it to new coords
  const existing = markers.find(m => m._targetDealId === d.dealId);
  if (existing) {
    existing.setLatLng([d.coords.lat, d.coords.lng]);
  }
}

function plotTargetPins(targets) {
  const LOW_RENT_THRESHOLD = 1450;
  targets.forEach((d, i) => {
    if (!d.coords) return;
    const pos = jitter(d.coords, i);
    d._pinPos = pos;  // store jittered position for highlight click
    const color = targetPinColor(d);
    const sz = Math.max(6, Math.min(18, 5 + Math.sqrt(d.totalUnits || 1) * 1.5));
    const lowRent = d.askingRent > 0 && d.askingRent < LOW_RENT_THRESHOLD;
    const pin = L.circleMarker([pos.lat, pos.lng], {
      radius: sz,
      fillColor: color,
      color: lowRent ? '#000000' : color,
      weight: lowRent ? 3 : 2,
      fillOpacity: 0.85
    });
    pin.bindTooltip(targetTooltipContent(d), { direction: 'top', offset: [0, -sz] });
    pin._targetDealId = d.dealId;
    // On direct pin click, trigger the same highlight flow as clicking from the list
    pin.on('click', () => { clearMapTooltips(); highlightTargetPin(d); });
    pin.addTo(map); markers.push(pin);
  });
}

      : '';

function clearTargetSelection() {
  _selectedTargets.clear();
  // Restore all pins to their original style
  for (const m of markers) {
    if (m._origStyle) {
      try { m.setStyle(m._origStyle); m.setRadius(m._origRadius); } catch(e){}
    }
  }
  // Close any popup
  if (_activePopup) {
    try { map.closePopup(_activePopup); } catch(e){}
    _activePopup = null;
  }
  // Refresh list
  if (_drillState?.type === 'target-market') renderTargetPropertyList(_drillState.targets);
}

// State for currently-selected pin (target or portfolio)
let _selectedTargetPin = null;
let _selectedTargetOrig = null;
let _activePopup = null;
let _selectedPortfolioPin = null;
let _selectedPortfolioOrig = null;

function targetDetailClick(i) {
  const item = _detailListItems[i];
  const d = item?.targetData;
  if (!d?.coords) return;
  const pin = markers.find(m => m._targetDealId === d.dealId);

  if (_selectedTargets.has(d.dealId)) {
    // DESELECT — restore original style explicitly (every property, null the dashArray)
    _selectedTargets.delete(d.dealId);
    if (pin && pin._origStyle) {
      pin.setStyle({
        color: pin._origStyle.color,
        weight: pin._origStyle.weight != null ? pin._origStyle.weight : 2,
        fillOpacity: pin._origStyle.fillOpacity != null ? pin._origStyle.fillOpacity : 0.85,
        dashArray: pin._origStyle.dashArray || null
      });
      pin.setRadius(pin._origRadius);
    }
  } else {
    // SELECT — capture original ONCE, then apply selection style
    _selectedTargets.add(d.dealId);
    if (pin) {
      if (!pin._origStyle) {
        pin._origStyle = {
          color: pin.options.color,
          weight: pin.options.weight,
          fillOpacity: pin.options.fillOpacity,
          dashArray: pin.options.dashArray
        };
        pin._origRadius = pin.getRadius();
      }
      pin.setStyle({ color: '#1A61D9', weight: 5, fillOpacity: 1, dashArray: null });
      pin.setRadius(pin._origRadius + 6);
      pin.bringToFront();
    }
  }

  fitMapToSelectedTargets();
  if (_drillState?.type === 'target-market') renderTargetPropertyList(_drillState.targets);
}

function fitMapToSelectedTargets() {
  if (_selectedTargets.size === 0) {
    // Nothing selected: re-fit to whole drill-in market at city zoom
    if (_drillState?.coords) {
      map.setView([_drillState.coords.lat, _drillState.coords.lng], 11, { animate: true, duration: 0.4 });
    }
    if (_activePopup) { try { map.closePopup(_activePopup); } catch(e){} _activePopup = null; }
    return;
  }

  // Build coords array of all selected targets
  const targets = (_drillState?.targets || []).filter(t => _selectedTargets.has(t.dealId) && t.coords);
  console.log('[TARGETS] fitMap — selected:', targets.length, targets.map(t => t.name));
  if (!targets.length) return;

  // Always close existing popup first
  if (_activePopup) { try { map.closePopup(_activePopup); } catch(e){} _activePopup = null; }
  map.stop();

  if (targets.length === 1) {
    const t = targets[0];
    const ll = t._pinPos ? [t._pinPos.lat, t._pinPos.lng] : [t.coords.lat, t.coords.lng];
    console.log('[TARGETS] single select, zoom to', ll);
    map.setView(ll, 17, { animate: true, duration: 0.4 });
    _activePopup = L.popup({
      closeButton: true, autoClose: false, closeOnClick: false, autoPan: false,
      className: 'target-highlight-popup', offset: [0, -18], maxWidth: 300
    }).setLatLng(ll).setContent(targetTooltipContent(t)).openOn(map);
    return;
  }

  // Multiple selected: compute bounds + zoom that fits them with comfortable padding
  const points = targets.map(t => {
    const p = t._pinPos || t.coords;
    return [p.lat, p.lng];
  });
  console.log('[TARGETS] multi select bounds points:', points);

  // Compute manually — fitBounds sometimes doesn't trigger a visible move when bounds are very small
  const lats = points.map(p => p[0]);
  const lngs = points.map(p => p[1]);
  const minLat = Math.min(...lats), maxLat = Math.max(...lats);
  const minLng = Math.min(...lngs), maxLng = Math.max(...lngs);
  const centerLat = (minLat + maxLat) / 2;
  const centerLng = (minLng + maxLng) / 2;
  const latSpan = Math.max(0.001, maxLat - minLat);
  const lngSpan = Math.max(0.001, maxLng - minLng);
  // Approximate zoom for a 0.05° span = ~13, 0.01° = ~15, 0.005° = ~16
  const span = Math.max(latSpan, lngSpan);
  let zoom;
  if (span < 0.005) zoom = 16;
  else if (span < 0.015) zoom = 15;
  else if (span < 0.04) zoom = 14;
  else if (span < 0.1) zoom = 13;
  else if (span < 0.3) zoom = 12;
  else zoom = 11;
  console.log('[TARGETS] computed zoom:', zoom, 'center:', centerLat, centerLng, 'span:', span);
  map.setView([centerLat, centerLng], zoom, { animate: true, duration: 0.4 });
}

function clearMapTooltips() {
  // Restore previous pin's original style
  if (_selectedTargetPin && _selectedTargetOrig) {
    try {

function highlightTargetPin(d) {

function toggleDeinstalls(on) {
  showDeinstalls = on;
  document.getElementById('deinstall-toggle').classList.toggle('active', on);
  if (on) renderDeinstallOverlay();
  else { deinstallMarkers.forEach(m => map.removeLayer(m)); deinstallMarkers = []; }

function renderDeinstallOverlay() {
  deinstallMarkers.forEach(m => map.removeLayer(m));
  deinstallMarkers = [];
  if (!showDeinstalls || !gridData.length) return;

  // Aggregate deinstalls by market from active gridData
  const diByMarket = {};
  activeGridData().forEach(d => {
    if (!d.deinstall_count || d.deinstall_count <= 0) return;
    const mktKey = resolveMarketKey(d.market_name);
    const coords = resolveMarketCoords(d.market_name);
    if (!coords) return;
    if (!diByMarket[mktKey]) diByMarket[mktKey] = { count: 0, coords, properties: [] };
    diByMarket[mktKey].count += d.deinstall_count;
    diByMarket[mktKey].properties.push({ name: d.property_name, count: d.deinstall_count });
  });

  Object.entries(diByMarket).forEach(([mkt, data]) => {
    const sz = Math.max(6, Math.min(22, 4 + Math.sqrt(data.count) * 2.5));

    const ring = L.circleMarker([data.coords.lat, data.coords.lng], {
      radius: sz + 4, fillColor: 'rgba(220,38,38,0.12)', color: '#EE533D',
      weight: 2, fillOpacity: 0.4, dashArray: '4 3'
    });

    const topProps = data.properties.sort((a, b) => b.count - a.count).slice(0, 5)
      .map(p => `<div class="tt-row"><span class="tt-dim" style="font-size:0.72rem">${p.name}</span><span class="tt-val" style="font-size:0.72rem;color:#EE533D">${p.count}</span></div>`).join('');

    ring.bindTooltip(`
      <div class="tt-name" style="color:#EE533D">Deinstalls: ${mkt}</div>
      <div class="tt-row"><span class="tt-dim">Units Deinstalling</span><span class="tt-val" style="color:#EE533D">${data.count}</span></div>
      ${topProps ? '<div style="border-top:1px solid rgba(0,0,0,0.06);margin-top:4px;padding-top:4px"><div style="font-size:0.65rem;color:var(--silver);font-weight:600;margin-bottom:2px">BY PROPERTY</div>' + topProps + '</div>' : ''}
    `, { direction: 'top', offset: [0, -sz - 4] });

    ring.addTo(map);
    deinstallMarkers.push(ring);
  });
}

// ─── MAP INIT ───
async function initMap() {
  const lt = document.getElementById('loading-text');
  const lb = document.getElementById('loading-bar');

  try {
    lt.textContent = 'Loading portfolio data...';
    lb.style.width = '20%';

    // Wait for gridData to be populated by loadGrid() AND fetch targets in parallel
    const [, targetResp] = await Promise.all([
      gridDataPromise,
      fetch(MAP_DATA_API).catch(() => null)
    ]);

    lb.style.width = '60%';
    lt.textContent = 'Processing map data...';

    // Parse CoStar targets from HubSpot
    if (targetResp && targetResp.ok) {
      const enrichData = await targetResp.json();
      const rawTargets = enrichData.targets || [];
      targetData = rawTargets.map(t => {
        // Prefer server-geocoded coords, fall back to market-level lookup
        let coords = t.coords;
        let coordsSource = t.coordsSource;
        if (!coords) {
          coords = MARKET_COORDS[t.market] || (() => {
            const mapped = LOOKER_MARKET_MAP[t.market];
            return mapped ? MARKET_COORDS[mapped] : null;
          })();
          if (coords) coordsSource = 'market';
        }
        return { ...t, coords, coordsSource };
      });
      const unmappedTargets = [...new Set(targetData.filter(d => !d.coords && d.market).map(d => d.market))];
      if (unmappedTargets.length) console.warn('Unmapped target markets:', unmappedTargets);
      console.log(`CoStar targets loaded: ${targetData.length} (${targetData.filter(d => d.coords).length} mapped, ${targetData.filter(d => d.coordsSource === 'address').length} address-accurate)`);
    }

    lb.style.width = '90%';

    // Log mapping stats
    const mapped = gridData.filter(d => resolveMarketCoords(d.market_name)).length;
    const unmapped = [...new Set(gridData.filter(d => !resolveMarketCoords(d.market_name)).map(d => d.market_name))].filter(Boolean);
    if (unmapped.length) console.warn('Unmapped markets:', unmapped);
    console.log(`Map ready: ${gridData.length} properties, ${mapped} mapped to coordinates`);

    lb.style.width = '100%';
    document.getElementById('loading').classList.add('hidden');
    updateLegend('portfolio');
    renderView();
  } catch (err) {
    console.error(err);
    lt.textContent = 'Map data unavailable — switch to Grid view';
    document.getElementById('loading').classList.add('hidden');
  }
}

async function loadGrid(attempt = 1) {
  const tbody = document.getElementById('grid-body');
  tbody.innerHTML = `<tr><td colspan="14" class="gd-loading"><div class="spinner" style="display:inline-block;width:18px;height:18px;border-width:2px;vertical-align:middle;margin-right:8px"></div>Loading portfolio data${attempt > 1 ? ' (retry ' + attempt + ')' : ''}...</td></tr>`;
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 45000); // 45s client timeout
    const resp = await fetch(GRID_API + '/grid-data', { signal: ctrl.signal });
    clearTimeout(timer);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    gridData = await resp.json();
    if (!Array.isArray(gridData)) throw new Error('Invalid response shape');
    if (gridDataReady) { gridDataReady(); gridDataReady = null; }
    const now = new Date();
    document.getElementById('grid-date-ref').textContent = 'Data as of ' + now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) + ' \u2022 ' + now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    gridApplyFilters();
  } catch (e) {
    // Auto-retry once on failure (handles cold-start timeouts)
    if (attempt < 2) {
      console.warn('grid-data fetch failed, retrying:', e.message);
      return loadGrid(attempt + 1);
    }
    const errDetail = e.name === 'AbortError' ? 'request timed out' : e.message;
    tbody.innerHTML = `<tr><td colspan="14" class="gd-empty">Couldn't load portfolio data (${gEsc(errDetail)}).<br><button onclick="loadGrid()" style="margin-top:8px;padding:6px 14px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-family:Outfit,sans-serif;font-weight:600;cursor:pointer;font-size:0.72rem">Retry</button></td></tr>`;
    if (gridDataReady) { gridDataReady(); gridDataReady = null; }
  }
}

function gridFuzzy(text, q) {
  if (!q) return true;
  text = (text || '').toLowerCase().trim();
  q = q.toLowerCase().trim();
  if (!q) return true;
  if (text.includes(q)) return true;
  return q.split(/\s+/).filter(Boolean).every(t => text.includes(t));
}

function gridSearch(val) {
  gridSearchTerm = val;
  gridApplyFilters();
}

function gridToggleActive() {
  gridActiveOnly = !gridActiveOnly;
  const btn = document.getElementById('grid-active-btn');
  btn.classList.toggle('active', gridActiveOnly);
  gridApplyFilters();
}

function gridApplyFilters() {
  gridFiltered = gridData.filter(r => {
    if (gridActiveOnly && (!r.active_property_count || r.active_property_count < 1)) return false;
    const hay = [r.property_name, r.partner_name, r.pmc_name, r.dp_name, r.market_name].filter(Boolean).join(' ');
    return gridFuzzy(hay, gridSearchTerm);
  });
  gridRender();
  gridUpdateStats();
}

function gridSort(col) {
  if (gridSortCol === col) gridSortDir = gridSortDir === 'asc' ? 'desc' : 'asc';
  else { gridSortCol = col; gridSortDir = 'asc'; }
  gridApplyFilters();
  document.querySelectorAll('.grid-table th.sortable').forEach(th => {
    const match = th.dataset.col === gridSortCol;
    th.classList.toggle('sorted', match);
    th.classList.toggle('asc', match && gridSortDir === 'asc');
    th.classList.toggle('desc', match && gridSortDir === 'desc');
  });
}
// Attach sort handlers
document.querySelectorAll('.grid-table th.sortable').forEach(th => {
  th.addEventListener('click', () => gridSort(th.dataset.col));
});

function gridSorted(data) {
  return [...data].sort((a, b) => {
    let va = a[gridSortCol], vb = b[gridSortCol];
    if (va == null) va = '';
    if (vb == null) vb = '';
    if (typeof va === 'number' && typeof vb === 'number') return gridSortDir === 'asc' ? va - vb : vb - va;
    va = String(va).toLowerCase(); vb = String(vb).toLowerCase();
    return gridSortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
  });
}

function gFmt(n) { return n == null ? '--' : Number(n).toLocaleString(); }
function gPct(v) { return v == null ? '--' : (v * 100).toFixed(1) + '%'; }
function gOccColor(v) {
  if (v == null) return 'var(--muted)';
  if (v >= 0.85) return 'var(--green)';
  if (v >= 0.6) return '#B95B00';
  return '#EE533D';
}
function gEsc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function statusHtml(r) {
