<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP Supply Map — Landing</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231A61D9'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='20' fill='white'%3EL%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --navy: #F8F9FB;
  --navy-mid: #FFFFFF;
  --navy-light: #F1F3F7;
  --panel: rgba(255,255,255,0.92);
  --blue: #2563EB;
  --blue-dim: rgba(37,99,235,0.08);
  --green: #059669;
  --green-dim: rgba(5,150,105,0.08);
  --orange: #EA580C;
  --orange-dim: rgba(234,88,12,0.06);
  --white: #1F2937;
  --silver: #6B7280;
  --muted: #9CA3AF;
  --ghost: rgba(0,0,0,0.04);
  --border: rgba(0,0,0,0.08);
  --radius: 12px;
}

html { font-size: 14px; }
body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--navy);
  color: var(--white);
  height: 100vh; overflow: hidden;
  display: flex; flex-direction: column;
}

/* ─── NAV ─── */
.topnav {
  z-index: 1000; height: 52px; flex-shrink: 0;
  background: var(--panel); backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.topnav-left { display: flex; align-items: center; gap: 10px; }
.logo-mark {
  width: 30px; height: 30px; background: var(--blue); border-radius: 8px;
  display: grid; place-items: center;
  font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1rem; color: #fff !important;
}
.topnav h1 { font-family: 'Outfit', sans-serif; font-size: 1.05rem; font-weight: 700; }
.topnav h1 span { color: var(--silver); font-weight: 400; margin-left: 6px; }
.nav-links { display: flex; gap: 4px; }
.nav-links a {
  color: var(--silver); text-decoration: none; font-size: 0.78rem; font-weight: 500;
  padding: 5px 12px; border-radius: 6px; transition: all 0.15s;
}
.nav-links a:hover { color: var(--white); background: var(--ghost); }
.nav-links a.active { color: #fff !important; background: var(--blue); }

/* ─── CONTROLS OVERLAY ─── */
/* ─── CONTROL PANEL (top-left) ─── */
.map-controls {
  position: absolute; top: 72px; left: 12px; z-index: 900;
  display: flex; flex-direction: column; gap: 6px;
}
.control-group {
  background: var(--panel); backdrop-filter: blur(24px);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  display: flex; flex-direction: column; gap: 1px;
}
.control-group.row { flex-direction: row; gap: 0; }
.pill {
  font-family: 'Outfit', sans-serif; font-size: 0.75rem; font-weight: 600;
  padding: 7px 14px; border: none; border-radius: 7px; cursor: pointer;
  background: transparent; color: var(--silver); transition: all 0.15s;
  text-align: left; white-space: nowrap;
}
.pill:hover { color: var(--white); background: var(--ghost); }
.pill.active { background: var(--blue); color: #fff !important; }

/* ─── LEGEND ─── */
.map-legend {
  position: absolute; bottom: 80px; left: 12px; z-index: 900;
  background: var(--panel); backdrop-filter: blur(24px);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.legend-title {
  font-family: 'Outfit', sans-serif; font-size: 0.65rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px; color: var(--silver); margin-bottom: 6px;
}
.legend-item {
  display: flex; align-items: center; gap: 8px; padding: 2px 0;
  font-size: 0.75rem; color: var(--white);
}
.legend-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}

/* ─── SEARCH ─── */
.search-box {
  position: absolute; top: 72px; right: 12px; z-index: 1100;
  width: 280px;
}
.search-input {
  width: 100%; padding: 9px 14px 9px 34px;
  background: var(--panel); backdrop-filter: blur(24px);
  border: 1px solid var(--border); border-radius: 10px;
  font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
  color: var(--white); outline: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--blue); }
.search-input::placeholder { color: var(--muted); }
.search-icon {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  color: var(--muted); font-size: 0.85rem; pointer-events: none;
}
.search-results {
  position: absolute; top: 100%; left: 0; right: 0; margin-top: 4px;
  background: var(--panel); backdrop-filter: blur(24px);
  border: 1px solid var(--border); border-radius: 10px;
  max-height: 360px; overflow-y: auto;
  box-shadow: 0 8px 24px rgba(0,0,0,0.14);
  display: none; z-index: 1200;
}
.search-results.open { display: block; }
.search-result {
  padding: 10px 14px; cursor: pointer; transition: background 0.1s;
  border-bottom: 1px solid var(--ghost);
}
.search-result:last-child { border-bottom: none; }
.search-result:hover { background: var(--ghost); }
.search-result-name { font-weight: 600; font-size: 0.82rem; }
.search-result-meta { font-size: 0.68rem; color: var(--silver); margin-top: 1px; }
.search-result-type {
  display: inline-block; font-size: 0.6rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px; padding: 1px 6px;
  border-radius: 4px; margin-left: 6px;
}
.type-partner { background: var(--blue-dim); color: var(--blue); }
.type-market { background: rgba(124,58,237,0.1); color: #7C3AED; }
.type-property { background: var(--green-dim); color: var(--green); }
.type-target { background: rgba(220,38,38,0.08); color: #DC2626; }

/* ─── DEINSTALL TOGGLE ─── */
.overlay-toggle {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px; margin: 0;
  background: transparent; border: none; border-radius: 7px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.75rem; color: var(--silver); cursor: pointer;
  transition: all 0.15s; user-select: none;
}
.overlay-toggle:hover { color: var(--white); background: var(--ghost); }
.overlay-toggle.active { color: #DC2626; }
.overlay-toggle input { accent-color: #DC2626; cursor: pointer; margin: 0; }

/* ─── TIME PERIOD PILLS ─── */
.period-pills {
  display: flex; gap: 0;
}
.period-pill {
  font-family: 'Outfit', sans-serif; font-size: 0.68rem; font-weight: 600;
  padding: 5px 10px; border: none; border-radius: 6px; cursor: pointer;
  background: transparent; color: var(--muted); transition: all 0.15s;
}
.period-pill:hover { color: var(--white); background: var(--ghost); }
.period-pill.active { background: #374151; color: #fff; }

/* ─── CONTROL DIVIDER ─── */
.control-divider {
  height: 1px; background: var(--border); margin: 2px 8px;
}

/* ─── PANEL (right side detail) ─── */
.detail-panel {
  position: absolute; top: 116px; right: 12px; bottom: 16px; width: 360px; z-index: 800;
  background: var(--panel); backdrop-filter: blur(24px);
  border: 1px solid var(--border); border-radius: var(--radius);
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none; transform: translateX(12px);
  transition: all 0.25s ease;
}
.detail-panel.open { opacity: 1; pointer-events: auto; transform: translateX(0); }
.detail-panel-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--ghost);
}
.detail-panel-title {
  font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.05rem;
  margin-bottom: 2px; padding-right: 28px;
}
.detail-panel-subtitle { font-size: 0.72rem; color: var(--silver); }
.detail-panel-kpis {
  display: flex; gap: 0; padding: 10px 16px; border-bottom: 1px solid var(--ghost);
}
.detail-kpi { flex: 1; text-align: center; }
.detail-kpi-val { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.1rem; }
.detail-kpi-label { font-size: 0.58rem; color: var(--silver); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
.detail-panel-tabs {
  display: flex; gap: 0; padding: 4px 16px; border-bottom: 1px solid var(--ghost);
}
.detail-tab {
  font-family: 'Outfit', sans-serif; font-size: 0.7rem; font-weight: 600;
  padding: 5px 12px; border: none; border-radius: 6px; cursor: pointer;
  background: transparent; color: var(--muted); transition: all 0.15s;
}
.detail-tab:hover { color: var(--white); }
.detail-tab.active { background: var(--blue); color: #fff; }
.detail-panel-list {
  flex: 1; overflow-y: auto; padding: 4px 0;
}
.detail-panel-list::-webkit-scrollbar { width: 3px; }
.detail-panel-list::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }
.detail-section-label {
  font-family: 'Outfit', sans-serif; font-size: 0.6rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted);
  padding: 8px 16px 4px;
}
.detail-row {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 8px 16px; transition: background 0.1s; cursor: pointer;
  border-bottom: 1px solid var(--ghost);
}
.detail-row:hover { background: rgba(37,99,235,0.04); }
.detail-row.target-row:hover { background: rgba(220,38,38,0.04); }
.detail-row-info { flex: 1; min-width: 0; }
.detail-row-name {
  font-size: 0.78rem; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.detail-row-market { font-size: 0.65rem; color: var(--silver); }
.detail-row-metrics {
  display: flex; gap: 8px; margin-top: 3px; flex-wrap: wrap;
}
.detail-metric {
  font-size: 0.62rem; padding: 1px 6px; border-radius: 4px;
  font-weight: 600; white-space: nowrap;
}
.detail-metric.units { background: var(--blue-dim); color: var(--blue); }
.detail-metric.vacant { background: rgba(220,38,38,0.08); color: #DC2626; }
.detail-metric.concession { background: rgba(217,119,6,0.08); color: #D97706; }
.detail-metric.target-badge { background: rgba(220,38,38,0.08); color: #DC2626; }
.detail-metric.lease-up { background: rgba(139,92,246,0.08); color: #8B5CF6; }
.detail-close {
  position: absolute; top: 10px; right: 10px;
  width: 24px; height: 24px; border-radius: 6px; border: none;
  background: var(--ghost); color: var(--silver); cursor: pointer;
  font-size: 0.9rem; display: grid; place-items: center; transition: all 0.1s;
}
.detail-close:hover { background: var(--border); color: var(--white); }
.detail-back {
  display: flex; align-items: center; gap: 4px;
  padding: 6px 16px; font-size: 0.7rem; font-weight: 600;
  color: var(--blue); cursor: pointer; border-bottom: 1px solid var(--ghost);
  transition: background 0.1s; font-family: 'Outfit', sans-serif;
}
.detail-back:hover { background: var(--blue-dim); }
.detail-back svg { width: 12px; height: 12px; }

/* ─── BOTTOM BAR ─── */
.bottom-bar {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 900;
  display: flex; gap: 1px;
  background: var(--panel); backdrop-filter: blur(24px);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 20px;
}
.bb-stat { text-align: center; padding: 0 16px; border-right: 1px solid var(--ghost); }
.bb-stat:last-child { border-right: none; }
.bb-val { font-family: 'Outfit', sans-serif; font-size: 1.25rem; font-weight: 800; }
.bb-label { font-size: 0.6rem; color: var(--silver); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; margin-top: 1px; }

/* ─── MAP ─── */
#map { flex: 1; z-index: 1; background: #F8F9FB; }
.leaflet-control-zoom { border: none !important; margin-bottom: 60px !important; margin-right: 8px !important; }
.leaflet-control-zoom a {
  background: #fff !important; color: #374151 !important;
  border: 1px solid var(--border) !important; width: 36px !important; height: 36px !important;
  line-height: 36px !important; font-size: 16px !important;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08) !important;
}
.leaflet-control-zoom a:first-child { border-radius: 10px 10px 0 0 !important; }
.leaflet-control-zoom a:last-child { border-radius: 0 0 10px 10px !important; }
.leaflet-control-attribution { display: none !important; }

/* ─── BUBBLE LABELS ─── */
.bubble-label {
  background: none !important; border: none !important; box-shadow: none !important;
  font-family: 'Outfit', sans-serif; font-weight: 700; color: #fff;
  text-align: center; pointer-events: none !important;
  text-shadow: 0 1px 2px rgba(0,0,0,0.4);
}

/* ─── TOOLTIP ─── */
.leaflet-tooltip {
  background: #fff !important; color: #1F2937 !important;
  border: 1px solid rgba(0,0,0,0.1) !important; border-radius: 10px !important;
  padding: 10px 14px !important; font-family: 'DM Sans', sans-serif !important;
  font-size: 0.78rem !important; box-shadow: 0 4px 16px rgba(0,0,0,0.12) !important;
}
.leaflet-tooltip::before { border-top-color: #fff !important; }
.leaflet-tooltip-top::before { border-top-color: #fff !important; }
.leaflet-tooltip-bottom::before { border-bottom-color: #fff !important; }
.tt-dim { color: #6B7280 !important; }
.tt-val { color: #1F2937 !important; }
.tt-name { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.85rem; margin-bottom: 2px; }
.tt-row { display: flex; justify-content: space-between; gap: 16px; }
.tt-dim { color: var(--silver); }
.tt-val { font-weight: 600; }

/* ─── LOADING ─── */
.loading-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 2000;
  background: rgba(248,249,251,0.97);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
  transition: opacity 0.4s;
}
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.spinner {
  width: 36px; height: 36px; border: 3px solid var(--ghost); border-top-color: var(--blue);
  border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-family: 'Outfit', sans-serif; font-size: 0.85rem; color: var(--silver); }
.loading-progress { width: 160px; height: 3px; background: var(--ghost); border-radius: 2px; overflow: hidden; }
.loading-progress-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width 0.3s; width: 0%; }

/* ─── VIEW SWITCH (Map/Grid toggle) ─── */
.view-switch {
  display: flex; background: var(--navy-light); border-radius: 8px; padding: 3px;
  border: 1px solid var(--border);
}
.vs-btn {
  font-family: 'Outfit', sans-serif; font-size: 0.72rem; font-weight: 600;
  padding: 5px 14px; border: none; border-radius: 6px; cursor: pointer;
  background: transparent; color: var(--muted); transition: all 0.15s;
  display: flex; align-items: center; gap: 5px;
}
.vs-btn:hover { color: var(--white); }
.vs-btn.active { background: var(--blue); color: #fff; box-shadow: 0 1px 4px rgba(37,99,235,0.3); }

/* ─── GRID VIEW ─── */
.grid-view {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  background: var(--navy);
}
.grid-toolbar {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 20px; background: var(--navy-mid);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.grid-search-wrap { position: relative; flex: 1; max-width: 360px; }
.grid-search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--muted); pointer-events: none;
}
.grid-search {
  width: 100%; padding: 7px 12px 7px 32px;
  font-family: 'DM Sans', sans-serif; font-size: 0.8rem;
  background: var(--navy-light); border: 1px solid var(--border); border-radius: 8px;
  color: var(--white); outline: none; transition: border-color 0.15s;
}
.grid-search:focus { border-color: var(--blue); }
.grid-search::placeholder { color: var(--muted); }
.grid-active-btn {
  font-family: 'Outfit', sans-serif; font-size: 0.72rem; font-weight: 600;
  padding: 7px 14px; border: 1px solid var(--border); border-radius: 8px;
  cursor: pointer; background: var(--navy-light); color: var(--muted);
  display: flex; align-items: center; gap: 5px; transition: all 0.15s;
}
.grid-active-btn.active { border-color: var(--green); color: var(--green); }
.grid-active-dot {
  width: 6px; height: 6px; border-radius: 50%; background: currentColor;
}
.grid-stats {
  display: flex; gap: 16px; margin-left: auto;
  font-family: 'Outfit', sans-serif; font-size: 0.75rem; color: var(--silver);
}
.grid-stat-val { font-weight: 800; color: var(--white); margin-right: 3px; }
.grid-scroll { flex: 1; overflow: auto; }
.grid-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
.grid-scroll::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }

/* ─── GRID TABLE ─── */
.grid-table { width: 100%; border-collapse: collapse; font-size: 0.76rem; }
.grid-table thead { position: sticky; top: 0; z-index: 10; }
.grid-table th {
  background: #EDEEF2; padding: 8px 12px; text-align: left;
  font-family: 'Outfit', sans-serif; font-size: 0.62rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.6px; color: var(--silver);
  border-bottom: 2px solid var(--border); white-space: nowrap;
  user-select: none;
}
.grid-table th.sortable { cursor: pointer; transition: color 0.15s; position: relative; padding-right: 18px; }
.grid-table th.sortable:hover { color: var(--white); }
.grid-table th.sorted { color: var(--blue); }
.grid-table th.sortable::after {
  content: '\2195'; position: absolute; right: 3px; top: 50%; transform: translateY(-50%);
  font-size: 0.65rem; opacity: 0.25;
}
.grid-table th.sortable:hover::after { opacity: 0.5; }
.grid-table th.sorted.asc::after { content: '\2191'; opacity: 1; }
.grid-table th.sorted.desc::after { content: '\2193'; opacity: 1; }
.grid-table th.num { text-align: right; }
.col-expand { width: 24px; padding-right: 4px !important; }
.col-link { width: 40px; text-align: center !important; }

.grid-table td {
  padding: 7px 12px; border-bottom: 1px solid rgba(0,0,0,0.06);
  white-space: nowrap; color: var(--white);
}
.grid-table td.num { text-align: right; font-family: 'Outfit', sans-serif; font-weight: 600; letter-spacing: -0.3px; }
.grid-table tbody tr { cursor: pointer; transition: background 0.08s; }
.grid-table tbody tr:hover { background: rgba(37,99,235,0.05); }
.grid-table tbody tr.expanded { background: rgba(37,99,235,0.06); }
.grid-table tbody tr:nth-child(4n+1):not(.expanded):not(:hover) { background: rgba(0,0,0,0.015); }

.grid-prop { font-weight: 600; font-size: 0.78rem; }
.grid-partner { color: var(--silver); font-size: 0.68rem; }
.grid-loc { color: var(--silver); font-size: 0.74rem; }

/* ─── Occupancy Bar ─── */
.occ-wrap { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
.occ-bar {
  display: block; width: 60px; height: 8px; background: #D1D5DB; border-radius: 99px;
  overflow: hidden; flex-shrink: 0; position: relative;
}
.occ-fill { display: block; height: 100%; border-radius: 99px; position: absolute; top: 0; left: 0; }
.occ-val { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 0.78rem; min-width: 42px; text-align: right; }

/* ─── Status Badge ─── */
.status-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.62rem; font-weight: 700; padding: 3px 10px; border-radius: 99px;
  letter-spacing: 0.3px; white-space: nowrap;
}
.status-active { background: var(--green-dim); color: var(--green); }
.status-red { background: rgba(220,38,38,0.08); color: #DC2626; }
.status-amber { background: rgba(217,119,6,0.08); color: #D97706; }
.status-blue { background: var(--blue-dim); color: var(--blue); }
.status-inactive { background: rgba(0,0,0,0.04); color: var(--muted); }

/* ─── Reservation Chips ─── */
.res-chip {
  display: inline-flex; align-items: center; justify-content: center; gap: 3px;
  min-width: 22px; padding: 2px 8px; border-radius: 5px;
  font-family: 'Outfit', sans-serif; font-size: 0.68rem; font-weight: 700;
  margin: 0 2px;
}
.res-curr { background: var(--green-dim); color: var(--green); }
.res-fut { background: var(--blue-dim); color: var(--blue); }
.res-label { font-weight: 500; font-size: 0.55rem; opacity: 0.75; text-transform: uppercase; letter-spacing: 0.4px; }

/* ─── Unit Status Dots ─── */

function parseCSV(text) {
  const lines = text.split('\n'); if (!lines.length) return [];
  const hdrs = parseLine(lines[0]);
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const v = parseLine(line), o = {};
    hdrs.forEach((h, i) => o[h.trim()] = (v[i] || '').trim());
    return o;
  });
}
function parseLine(line) {
  const r = []; let c = '', q = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (q) { if (ch === '"' && line[i+1] === '"') { c += '"'; i++; } else if (ch === '"') q = false; else c += ch; }
    else { if (ch === '"') q = true; else if (ch === ',') { r.push(c); c = ''; } else c += ch; }
  }
  r.push(c); return r;
}

  const months = { '3m': 3, '6m': 6, '12m': 12 };
  const d = new Date(now);
  d.setMonth(d.getMonth() - (months[period] || 12));
  return d;
}

// ─── SEARCH ───
function onSearch(q) {
  const el = document.getElementById('search-results');
  if (!q || q.length < 2) { el.classList.remove('open'); return; }
  q = q.toLowerCase();
  const results = [];
  const seen = new Set(); // dedupe

  // Partners — always show first if name matches (use full unfiltered data)
  Object.entries(partnerAggFull).forEach(([name, data]) => {
    if (name.toLowerCase().includes(q)) {
      results.push({ id: 'p:' + name, name, type: 'partner', meta: `${data.markets.size} markets · ${fmt(data.units)} units`, sort: data.units + 1000000 });
    }
  });
  // Markets
  Object.entries(marketAggFull).forEach(([name, data]) => {
    if (name.toLowerCase().includes(q)) {
      results.push({ id: 'm:' + name, name, type: 'market', meta: `${data.partners.size} partners · ${fmt(data.units)} units`, sort: data.units + 500000 });
    }
  });
  // Properties — match on name, partner, or market (use full data)
  allDataFull.forEach(d => {
    const key = 'prop:' + d.property + d.market;
    if (seen.has(key)) return;
    if (d.property.toLowerCase().includes(q) || d.partner.toLowerCase().includes(q) || d.market.toLowerCase().includes(q)) {
      seen.add(key);
      results.push({ id: key, name: d.property, type: 'property', meta: `${d.partner} · ${d.market} · ${d.units}u`, sort: d.units });
    }
  });
  // Targets
  targetData.forEach(d => {
    if (d.name.toLowerCase().includes(q) || (d.partner && d.partner.toLowerCase().includes(q)) || d.market.toLowerCase().includes(q)) {
      results.push({ id: 't:' + d.dealId, name: d.name, type: 'target', meta: `${d.partner} · ${d.market}${d.vacant ? ' · ' + d.vacant + ' vacant' : ''}`, sort: d.totalUnits || d.available || 0 });
    }
  });

  results.sort((a, b) => b.sort - a.sort);
  const top = results.slice(0, 15);

  if (!top.length) { el.classList.remove('open'); return; }
  // Store results for click handling (avoids quote-escaping issues in inline handlers)
  window._searchResults = top;
  el.innerHTML = top.map((r, i) => `
    <div class="search-result" onmousedown="selectSearchIdx(${i})">
      <div class="search-result-name">${r.name}<span class="search-result-type type-${r.type}">${r.type}</span></div>
      <div class="search-result-meta">${r.meta}</div>
    </div>
  `).join('');
  el.classList.add('open');
}

function closeSearch() { document.getElementById('search-results').classList.remove('open'); }

function selectSearchIdx(idx) {
  const r = window._searchResults?.[idx];
  if (!r) return;
  _lastSearchQuery = document.getElementById('search-input').value;
  _openedFromSearch = true;
  closeSearch();

  if (r.type === 'market') {
    setView('markets', true);
    drillIntoMarket(r.name);

  } else if (r.type === 'partner') {
    setView('partners', true);
    drillIntoPartner(r.name);

  } else if (r.type === 'target') {
    setView('targets', true);
    const d = targetData.find(t => t.name === r.name);
    if (!d?.coords) return;
    map.setView([d.coords.lat, d.coords.lng], 12, { animate: true });
    // Highlight with a temporary prominent marker
    showHighlightPin(d.coords, targetTooltipContent(d));

  } else {
    // Property
    setView('properties', true);
    const d = allDataFull.find(p => p.property === r.name);
    if (!d?.coords) return;
    map.setView([d.coords.lat, d.coords.lng], 12, { animate: true });
    showHighlightPin(d.coords, propertyTooltip(d));
  }
}

// Show a highlighted pin with an open popup at given coords
function showHighlightPin(coords, tooltipContent) {
  const highlight = L.circleMarker([coords.lat, coords.lng], {
    radius: 16, fillColor: '#2563EB', color: '#fff', weight: 3, fillOpacity: 0.9
  });
  highlight.addTo(map);
  markers.push(highlight);
  // Use popup instead of tooltip so it stays open
  highlight.bindPopup(`<div style="font-size:0.82rem">${tooltipContent}</div>`, {
    maxWidth: 300, className: 'leaflet-popup'
  }).openPopup();
}

function targetTooltipContent(d) {
  const signals = [];
  if (d.vacant) signals.push(`<span style="color:#DC2626;font-weight:600">${d.vacant} vacant</span>`);
  if (d.available) signals.push(`${d.available} total units`);
  if (d.vacancy) signals.push(`${d.vacancy}% vacancy`);
  if (d.concessions) signals.push(`<span style="color:#D97706">${d.concessions.slice(0, 80)}</span>`);
  if (d.leaseUp) signals.push(`<span style="color:#8B5CF6;font-weight:600">Lease-up signal</span>`);
  return `<div class="tt-name">${d.name}</div>
    <div class="tt-row"><span class="tt-dim">Partner</span><span class="tt-val">${d.partner}</span></div>
    <div class="tt-row"><span class="tt-dim">Market</span><span class="tt-val">${d.market}</span></div>
    ${signals.length ? '<div style="border-top:1px solid rgba(0,0,0,0.06);margin-top:4px;padding-top:4px;font-size:0.72rem;line-height:1.6">' + signals.join('<br>') + '</div>' : ''}`;
}

// ─── DRILL-IN: PORTFOLIO VIEW ───
// Stores current drill-in state for tab switching
let _drillState = null;
let _openedFromSearch = false; // track if detail was opened via search
let _lastSearchQuery = ''; // preserve search for back navigation

function drillIntoMarket(name) {
  const mk = marketAggFull[name];
  if (!mk?.coords) return;

  // Collect current properties in this market (full, unfiltered)
  const props = mk.props.map(d => ({
    name: d.property, market: d.market, partner: d.partner, units: d.units,
    type: 'current', coords: d.coords,
    ...getEnrichmentObj(d.property)
  }));

  // Collect targets in this market
  const tgts = targetData.filter(t => t.market === name || resolveMarket(t.market) === name).map(t => ({
    name: t.name, market: t.market, partner: t.partner, units: t.totalUnits || t.available || 0,
    type: 'target', coords: t.coords,
    vacant: t.vacant, available: t.available, vacancy: t.vacancy,
    concessions: t.concessions, leaseUp: t.leaseUp
  }));

  _drillState = { title: name, type: 'market', props, targets: tgts, coords: mk.coords };

  // Combined partner count across current + targets
  const allPartners = new Set([...props.map(d => d.partner), ...tgts.map(d => d.partner)].filter(Boolean));

  openPortfolioPanel(name,
    `${allPartners.size} partners · ${props.length} properties · ${tgts.length} targets`,
    [
      { val: fmt(mk.units), label: 'Current Units' },
      { val: allPartners.size.toString(), label: 'Partners' },
      { val: props.length.toString(), label: 'Properties' },
      { val: tgts.length.toString(), label: 'Targets' }
    ], props, tgts);

  // Map pins
  clearMap();
  plotPropertyPins(props, '#059669');
  plotTargetPins(tgts);
  map.setView([mk.coords.lat, mk.coords.lng], 10, { animate: true });
}

function drillIntoPartner(name) {
  // Fuzzy match: find the partner key that matches (case-insensitive) — use full data
  const partnerKey = Object.keys(partnerAggFull).find(k => k.toLowerCase() === name.toLowerCase()) || name;
  const pk = partnerAggFull[partnerKey];
  if (!pk) return;
  const wc = pk.props.filter(d => d.coords);
  if (!wc.length) return;

  const props = pk.props.map(d => ({
    name: d.property, market: d.market, partner: d.partner, units: d.units,
    type: 'current', coords: d.coords,
    ...getEnrichmentObj(d.property)
  }));

  // Find targets for this partner (fuzzy match on partner name)
  const pLower = partnerKey.toLowerCase();
  const tgts = targetData.filter(t => t.partner && t.partner.toLowerCase().includes(pLower)).map(t => ({
    name: t.name, market: t.market, partner: t.partner, units: t.totalUnits || t.available || 0,
    type: 'target', coords: t.coords,
    vacant: t.vacant, available: t.available, vacancy: t.vacancy,
    concessions: t.concessions, leaseUp: t.leaseUp
  }));

  _drillState = { title: partnerKey, type: 'partner', props, targets: tgts };

  // Compute combined market count (current + targets)
  const allMarkets = new Set([...props.map(d => d.market), ...tgts.map(d => d.market)].filter(Boolean));
  const totalProps = props.length + tgts.length;

  openPortfolioPanel(partnerKey,
    `${allMarkets.size} markets · ${props.length} properties · ${tgts.length} targets`,
    [
      { val: fmt(pk.units), label: 'Current Units' },
      { val: allMarkets.size.toString(), label: 'Markets' },
      { val: props.length.toString(), label: 'Properties' },
      { val: tgts.length.toString(), label: 'Targets' }
    ], props, tgts);

  // Map pins
  clearMap();
  plotPropertyPins(props, '#2563EB');
  plotTargetPins(tgts);

  const allCoords = [...props, ...tgts].filter(d => d.coords);
  const bounds = allCoords.map(d => [d.coords.lat, d.coords.lng]);
  if (bounds.length > 1) map.fitBounds(bounds, { padding: [80, 80], animate: true });
  else if (bounds.length === 1) map.setView(bounds[0], 10, { animate: true });
}

function getEnrichmentObj(propertyName) {
  const e = getEnrichment(propertyName);
  if (!e) return { vacant: 0, available: 0, vacancy: 0, concessions: '' };
  return { vacant: e.vacant, available: e.available, vacancy: e.vacancy, concessions: e.concessions };
}

// Pin registry: name -> marker reference (for direct lookup from detail list)
let _pinRegistry = {};

function plotPropertyPins(props, color) {
  props.forEach((d, i) => {
    if (!d.coords) return;
    const pos = jitter(d.coords, i);
    const sz = Math.max(5, Math.min(14, 4 + Math.sqrt(d.units) * 1.8));
    const pin = L.circleMarker([pos.lat, pos.lng], {
      radius: sz, fillColor: color, color: 'rgba(255,255,255,0.5)', weight: 2, fillOpacity: 0.9
    });
    pin.bindTooltip(propertyTooltip({ property: d.name, partner: d.partner, market: d.market, units: d.units, rep: '—' }), { direction: 'top', offset: [0, -sz] });
    pin.addTo(map); markers.push(pin);
    _pinRegistry['prop:' + d.name + ':' + d.market] = pin;
  });
}

function plotTargetPins(tgts) {
  tgts.forEach((d, i) => {
    if (!d.coords) return;
    const pos = jitter(d.coords, i + 500);
    const hasSignal = d.vacant > 0 || d.concessions;
    const color = hasSignal ? '#DC2626' : '#9CA3AF';
    const sz = Math.max(4, Math.min(10, 3 + Math.sqrt(d.units || 1) * 1.2));
    const pin = L.circleMarker([pos.lat, pos.lng], {
      radius: sz, fillColor: color, color: 'rgba(255,255,255,0.5)',
      weight: 1.5, fillOpacity: 0.7, dashArray: '3 2'
    });
    pin.bindTooltip(targetTooltipContent(d), { direction: 'top', offset: [0, -sz] });
    pin.addTo(map); markers.push(pin);
    _pinRegistry['tgt:' + d.name + ':' + d.market] = pin;
  });
}

function clearMap() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  _pinRegistry = {};
}

let _activeHighlight = null;

function zoomToPin(key) {
  // Reset previous highlight
  if (_activeHighlight) {
    try { _activeHighlight.pin.setRadius(_activeHighlight.r); _activeHighlight.pin.setStyle({ weight: 2, color: 'rgba(255,255,255,0.5)' }); _activeHighlight.pin.closeTooltip(); } catch(e) {}
    _activeHighlight = null;
  }
  // Close all open tooltips
  markers.forEach(m => { try { m.closeTooltip(); } catch(e) {} });

  const pin = _pinRegistry[key];
  if (!pin) return;
  const ll = pin.getLatLng();
  map.setView([ll.lat, ll.lng], 14, { animate: true });
  setTimeout(() => {
    const origRadius = pin.getRadius();
    pin.setRadius(origRadius + 6);
    pin.setStyle({ weight: 3, color: '#2563EB' });
    pin.openTooltip();
    _activeHighlight = { pin, r: origRadius };
  }, 300);
}

// Index-based click from detail list (avoids all quote/escaping issues)
let _detailListItems = [];

function detailClick(idx) {
  const item = _detailListItems[idx];
  if (!item) return;
  if (item.key) {
    zoomToPin(item.key);
  } else if (item.market) {
    // Market row — zoom to market coords
    const coords = MARKET_COORDS[item.market];
    if (coords) {
      // Reset previous highlight
      if (_activeHighlight) { try { _activeHighlight.pin.setRadius(_activeHighlight.r); _activeHighlight.pin.setStyle({ weight: 2, color: 'rgba(255,255,255,0.5)' }); _activeHighlight.pin.closeTooltip(); } catch(e) {} _activeHighlight = null; }
      markers.forEach(m => { try { m.closeTooltip(); } catch(e) {} });
      map.setView([coords.lat, coords.lng], 11, { animate: true });
    }
  }
}

// ─── PORTFOLIO PANEL ───
function openPortfolioPanel(title, subtitle, kpis, props, targets) {
  const panel = document.getElementById('detail-panel');
  document.getElementById('dp-title').textContent = title;
  document.getElementById('dp-subtitle').textContent = subtitle;
  document.getElementById('dp-kpis').innerHTML = kpis.map(k =>
    `<div class="detail-kpi"><div class="detail-kpi-val">${k.val}</div><div class="detail-kpi-label">${k.label}</div></div>`
  ).join('');

  // Show back button if opened from search
  const backBtn = document.getElementById('dp-back');
  backBtn.style.display = _openedFromSearch ? '' : 'none';

  // Tabs
  const hasTgts = targets.length > 0;
  document.getElementById('dp-tabs').innerHTML = `
    <button class="detail-tab active" onclick="showDetailTab('properties')">Properties (${props.length})</button>
    ${hasTgts ? `<button class="detail-tab" onclick="showDetailTab('targets')">Targets (${targets.length})</button>` : ''}
    <button class="detail-tab" onclick="showDetailTab('markets')">By Market</button>
  `;

  renderDetailPropertyList(props);
  panel.classList.add('open');
}

function showDetailTab(tab) {
  if (!_drillState) return;
  document.querySelectorAll('.detail-tab').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  if (tab === 'properties') renderDetailPropertyList(_drillState.props);
  else if (tab === 'targets') renderDetailTargetList(_drillState.targets);
  else if (tab === 'markets') renderDetailMarketList();
}

function renderDetailPropertyList(props) {
  const sorted = [...props].sort((a, b) => b.units - a.units);
  _detailListItems = sorted.map(d => ({ key: 'prop:' + d.name + ':' + d.market }));
  document.getElementById('dp-list').innerHTML = sorted.map((d, i) => `
    <div class="detail-row" onclick="detailClick(${i})">
      <div class="detail-row-info">
        <div class="detail-row-name">${d.name}</div>
        <div class="detail-row-market">${d.market}${d.partner !== _drillState?.title ? ' · ' + d.partner : ''}</div>
        <div class="detail-row-metrics">
          <span class="detail-metric units">${d.units}u</span>
          ${d.vacant ? `<span class="detail-metric vacant">${d.vacant} vacant</span>` : ''}
          ${d.concessions ? `<span class="detail-metric concession">Concessions</span>` : ''}
        </div>
      </div>
    </div>`
  ).join('') || '<div style="padding:16px;color:var(--silver);font-size:0.8rem">No properties found</div>';
}

function renderDetailTargetList(tgts) {
  const sorted = [...tgts].sort((a, b) => (b.vacant || 0) - (a.vacant || 0) || (b.units || 0) - (a.units || 0));
  _detailListItems = sorted.map(d => ({ key: 'tgt:' + d.name + ':' + d.market }));
  document.getElementById('dp-list').innerHTML = sorted.map((d, i) => `
    <div class="detail-row target-row" onclick="detailClick(${i})">
      <div class="detail-row-info">
        <div class="detail-row-name">${d.name}</div>
        <div class="detail-row-market">${d.market}${d.partner !== _drillState?.title ? ' · ' + d.partner : ''}</div>
        <div class="detail-row-metrics">
          <span class="detail-metric target-badge">Target</span>
          ${d.units ? `<span class="detail-metric units">${d.units}u</span>` : ''}
          ${d.vacant ? `<span class="detail-metric vacant">${d.vacant} vacant</span>` : ''}
          ${d.concessions ? `<span class="detail-metric concession">Concessions</span>` : ''}
          ${d.leaseUp ? `<span class="detail-metric lease-up">Lease-up</span>` : ''}
        </div>
      </div>
    </div>`
  ).join('') || '<div style="padding:16px;color:var(--silver);font-size:0.8rem">No targets found</div>';
}

function renderDetailMarketList() {
  const all = [...(_drillState?.props || []), ...(_drillState?.targets || [])];
  const byMkt = {};
  all.forEach(d => {
    if (!byMkt[d.market]) byMkt[d.market] = { units: 0, count: 0, targets: 0, props: 0 };
    byMkt[d.market].units += d.units || 0;
    byMkt[d.market].count++;
    if (d.type === 'target') byMkt[d.market].targets++;
    else byMkt[d.market].props++;
  });
  const sorted = Object.entries(byMkt).sort((a, b) => b[1].units - a[1].units);
  _detailListItems = sorted.map(([mkt]) => ({ market: mkt }));
  document.getElementById('dp-list').innerHTML = sorted.map(([mkt, v], i) => `
    <div class="detail-row" onclick="detailClick(${i})">
      <div class="detail-row-info">
        <div class="detail-row-name">${mkt}</div>
        <div class="detail-row-metrics">
          ${v.props ? `<span class="detail-metric units">${v.props} properties · ${v.units}u</span>` : ''}
          ${v.targets ? `<span class="detail-metric target-badge">${v.targets} targets</span>` : ''}
        </div>
      </div>
    </div>`
  ).join('');
}

// ─── DEINSTALL OVERLAY ───
function toggleDeinstalls(on) {
  showDeinstalls = on;
  document.getElementById('deinstall-toggle').classList.toggle('active', on);
  if (on) renderDeinstallOverlay();
  else { deinstallMarkers.forEach(m => map.removeLayer(m)); deinstallMarkers = []; }
}

function renderDeinstallOverlay() {
  deinstallMarkers.forEach(m => map.removeLayer(m));
  deinstallMarkers = [];
  if (!showDeinstalls || !deinstallData.length) return;

  // Aggregate deinstalls by market
  const diByMarket = {};
  deinstallData.forEach(d => {
    const mkt = d.market;
    if (!mkt || !MARKET_COORDS[mkt]) return;
    if (!diByMarket[mkt]) diByMarket[mkt] = { count: 0, reasons: {}, partners: {} };
    diByMarket[mkt].count++;
    const reason = d.reason || 'Unknown';
    diByMarket[mkt].reasons[reason] = (diByMarket[mkt].reasons[reason] || 0) + 1;
    const partner = d.partner || 'Unknown';
    diByMarket[mkt].partners[partner] = (diByMarket[mkt].partners[partner] || 0) + 1;
  });

  const maxDi = Math.max(...Object.values(diByMarket).map(d => d.count), 1);

  Object.entries(diByMarket).forEach(([mkt, data]) => {
    const coords = MARKET_COORDS[mkt];
    if (!coords) return;
    const sz = Math.max(6, Math.min(22, 4 + Math.sqrt(data.count) * 2.5));

    const ring = L.circleMarker([coords.lat, coords.lng], {
      radius: sz + 4, fillColor: 'rgba(220,38,38,0.12)', color: '#DC2626',
      weight: 2, fillOpacity: 0.4, dashArray: '4 3'
    });

    const topReasons = Object.entries(data.reasons).sort((a, b) => b[1] - a[1]).slice(0, 3)
      .map(([r, c]) => `<div class="tt-row"><span class="tt-dim" style="font-size:0.72rem">${r}</span><span class="tt-val" style="font-size:0.72rem;color:#DC2626">${c}</span></div>`).join('');
    const topPartners = Object.entries(data.partners).sort((a, b) => b[1] - a[1]).slice(0, 3)
      .map(([p, c]) => `<div class="tt-row"><span class="tt-dim" style="font-size:0.72rem">${p}</span><span class="tt-val" style="font-size:0.72rem;color:#DC2626">${c}</span></div>`).join('');

    ring.bindTooltip(`
      <div class="tt-name" style="color:#DC2626">Deinstalls: ${mkt}</div>
      <div class="tt-row"><span class="tt-dim">Units Lost (YTD)</span><span class="tt-val" style="color:#DC2626">${data.count}</span></div>
      ${topReasons ? '<div style="border-top:1px solid rgba(0,0,0,0.06);margin-top:4px;padding-top:4px"><div style="font-size:0.65rem;color:var(--silver);font-weight:600;margin-bottom:2px">TOP REASONS</div>' + topReasons + '</div>' : ''}
      ${topPartners ? '<div style="border-top:1px solid rgba(0,0,0,0.06);margin-top:4px;padding-top:4px"><div style="font-size:0.65rem;color:var(--silver);font-weight:600;margin-bottom:2px">BY PARTNER</div>' + topPartners + '</div>' : ''}
    `, { direction: 'top', offset: [0, -sz - 4] });

    ring.addTo(map);
    deinstallMarkers.push(ring);
  });
}

// ─── ENRICHMENT HELPERS ───
function getEnrichment(propertyName) {
  if (!propertyName) return null;
  return enrichmentMap[propertyName.toLowerCase()] || null;
}

function enrichmentBadges(e) {
  if (!e) return '';
  const parts = [];
  if (e.vacant) parts.push(`<span style="color:#DC2626;font-weight:600">${e.vacant} vacant</span>`);
  if (e.available) parts.push(`${e.available} avail`);
  if (e.vacancy) parts.push(`${e.vacancy}% vac rate`);
  if (e.concessions) parts.push(`<span style="color:#D97706;font-style:italic">${e.concessions.slice(0, 60)}${e.concessions.length > 60 ? '...' : ''}</span>`);
  return parts.length ? '<div style="border-top:1px solid rgba(0,0,0,0.06);margin-top:4px;padding-top:4px;font-size:0.72rem;line-height:1.5">' + parts.join(' · ') + '</div>' : '';
}

// Bubble color by density tier
function bubbleColor(units, max) {
  if (units >= max * 0.4) return { fill: '#2563EB', stroke: 'rgba(37,99,235,0.5)', glow: 'rgba(37,99,235,0.12)' };
  if (units >= max * 0.15) return { fill: '#7C3AED', stroke: 'rgba(124,58,237,0.45)', glow: 'rgba(124,58,237,0.10)' };
  return { fill: '#EA580C', stroke: 'rgba(234,88,12,0.5)', glow: 'rgba(234,88,12,0.12)' };
}

// ─── AGGREGATES ───
let marketAgg = {}, partnerAgg = {};
// Full (unfiltered) aggregates for search and drill-in — never affected by time period
let marketAggFull = {}, partnerAggFull = {};

function computeAggs() {
  marketAgg = {}; partnerAgg = {};
  allData.forEach(d => {
    if (!marketAgg[d.market]) marketAgg[d.market] = { units: 0, partners: new Set(), props: [], coords: null };
    const m = marketAgg[d.market];
    m.units += d.units; m.partners.add(d.partner); m.props.push(d);
    if (!m.coords && d.coords) m.coords = d.coords;

    if (!partnerAgg[d.partner]) partnerAgg[d.partner] = { units: 0, markets: new Set(), props: [] };
    const p = partnerAgg[d.partner];
    p.units += d.units; p.markets.add(d.market); p.props.push(d);
  });
}

function computeFullAggs() {
  marketAggFull = {}; partnerAggFull = {};
  allDataFull.forEach(d => {
    if (!marketAggFull[d.market]) marketAggFull[d.market] = { units: 0, partners: new Set(), props: [], coords: null };
    const m = marketAggFull[d.market];
    m.units += d.units; m.partners.add(d.partner); m.props.push(d);
    if (!m.coords && d.coords) m.coords = d.coords;

    if (!partnerAggFull[d.partner]) partnerAggFull[d.partner] = { units: 0, markets: new Set(), props: [] };
    const p = partnerAggFull[d.partner];
    p.units += d.units; p.markets.add(d.market); p.props.push(d);
  });
}

// ─── TOOLTIP BUILDERS ───
function marketTooltip(name, data) {
  const topPartners = Object.entries(data.props.reduce((a, d) => { a[d.partner] = (a[d.partner]||0) + d.units; return a; }, {}))
    .sort((a, b) => b[1] - a[1]).slice(0, 3);
  return `<div class="tt-name">${name}</div>
    <div class="tt-row"><span class="tt-dim">Units</span><span class="tt-val">${fmt(data.units)}</span></div>
    <div class="tt-row"><span class="tt-dim">Partners</span><span class="tt-val">${data.partners.size}</span></div>
    <div class="tt-row"><span class="tt-dim">Properties</span><span class="tt-val">${data.props.length}</span></div>
    ${topPartners.length ? '<div style="border-top:1px solid rgba(0,0,0,0.06);margin-top:4px;padding-top:4px">' +
      topPartners.map(([p, u]) => `<div class="tt-row"><span class="tt-dim" style="font-size:0.72rem">${p}</span><span class="tt-val" style="font-size:0.72rem">${u}u</span></div>`).join('') + '</div>' : ''}`;
}

function partnerTooltip(name, data) {
  const topMarkets = Object.entries(data.props.reduce((a, d) => { a[d.market] = (a[d.market]||0) + d.units; return a; }, {}))
    .sort((a, b) => b[1] - a[1]).slice(0, 3);
  return `<div class="tt-name">${name}</div>
    <div class="tt-row"><span class="tt-dim">Units</span><span class="tt-val">${fmt(data.units)}</span></div>
    <div class="tt-row"><span class="tt-dim">Markets</span><span class="tt-val">${data.markets.size}</span></div>
    <div class="tt-row"><span class="tt-dim">Properties</span><span class="tt-val">${data.props.length}</span></div>
    ${topMarkets.length ? '<div style="border-top:1px solid rgba(0,0,0,0.06);margin-top:4px;padding-top:4px">' +
      topMarkets.map(([m, u]) => `<div class="tt-row"><span class="tt-dim" style="font-size:0.72rem">${m}</span><span class="tt-val" style="font-size:0.72rem">${u}u</span></div>`).join('') + '</div>' : ''}`;
}

function propertyTooltip(d) {
  const e = getEnrichment(d.property);
  return `<div class="tt-name">${d.property}</div>
    <div class="tt-row"><span class="tt-dim">Partner</span><span class="tt-val">${d.partner}</span></div>
    <div class="tt-row"><span class="tt-dim">Market</span><span class="tt-val">${d.market}</span></div>
    <div class="tt-row"><span class="tt-dim">Units</span><span class="tt-val">${fmt(d.units)}</span></div>
    ${d.rep !== '—' ? `<div class="tt-row"><span class="tt-dim">Rep</span><span class="tt-val">${d.rep}</span></div>` : ''}
    ${enrichmentBadges(e)}`;
}

// ─── RENDER: MARKETS ───
function renderMarkets() {
  clearMap();
  const entries = Object.entries(marketAgg).filter(([, v]) => v.coords);
  const maxUnits = Math.max(...entries.map(([, v]) => v.units), 1);

  entries.forEach(([name, data]) => {
    const sz = Math.max(14, Math.min(44, 10 + Math.sqrt(data.units) * 3));
    const c = bubbleColor(data.units, maxUnits);

    // Glow ring
    const glow = L.circleMarker([data.coords.lat, data.coords.lng], {
      radius: sz + 6, fillColor: c.glow, color: 'transparent', weight: 0, fillOpacity: 1
    });
    glow.addTo(map); markers.push(glow);

    // Main bubble
    const bubble = L.circleMarker([data.coords.lat, data.coords.lng], {
      radius: sz, fillColor: c.fill, color: c.stroke, weight: 2, fillOpacity: 0.85
    });

    bubble.bindTooltip(marketTooltip(name, data), { direction: 'top', offset: [0, -sz], className: '' });

    bubble.on('click', () => drillIntoMarket(name));

    bubble.addTo(map); markers.push(bubble);

    // Unit count label — show on all but the smallest bubbles
    if (sz >= 14) {
      const label = L.divIcon({
        className: 'bubble-label',
        html: `<div style="font-size:${Math.max(8, Math.min(13, sz * 0.38))}px">${data.units}</div>`,
        iconSize: [sz * 2, sz], iconAnchor: [sz, sz / 2]
      });
      const lm = L.marker([data.coords.lat, data.coords.lng], { icon: label, interactive: false });
      lm.addTo(map); markers.push(lm);
    }
  });

  // Bottom bar
  const totalMkts = entries.length;
  const totalUnits = entries.reduce((s, [, v]) => s + v.units, 0);
  const avgPerMkt = Math.round(totalUnits / totalMkts);
  const singlePartner = entries.filter(([, v]) => v.partners.size === 1).length;
  const thinMkts = entries.filter(([, v]) => v.units < avgPerMkt * 0.4).length;

  document.getElementById('bottom-bar').innerHTML = `
    <div class="bb-stat"><div class="bb-val">${fmt(totalMkts)}</div><div class="bb-label">Markets</div></div>
    <div class="bb-stat"><div class="bb-val">${fmt(totalUnits)}</div><div class="bb-label">Total Units</div></div>
    <div class="bb-stat"><div class="bb-val">${fmt(avgPerMkt)}</div><div class="bb-label">Avg / Market</div></div>
    <div class="bb-stat"><div class="bb-val" style="color:var(--orange)">${singlePartner}</div><div class="bb-label">Sole Partner</div></div>
    <div class="bb-stat"><div class="bb-val" style="color:var(--orange)">${thinMkts}</div><div class="bb-label">Low Density</div></div>
  `;
}

// ─── RENDER: PARTNERS ───
function renderPartners() {
  clearMap();
  const entries = Object.entries(partnerAgg).filter(([, v]) => v.props.some(p => p.coords));
  const maxUnits = Math.max(...entries.map(([, v]) => v.units), 1);

  entries.forEach(([name, data]) => {
    const wc = data.props.filter(d => d.coords);
    const lat = wc.reduce((s, d) => s + d.coords.lat, 0) / wc.length;
    const lng = wc.reduce((s, d) => s + d.coords.lng, 0) / wc.length;
    const sz = Math.max(8, Math.min(30, 6 + Math.sqrt(data.units) * 2.5));
    const c = bubbleColor(data.units, maxUnits);

    const bubble = L.circleMarker([lat, lng], {
      radius: sz, fillColor: c.fill, color: c.stroke, weight: 2, fillOpacity: 0.85
    });

    bubble.bindTooltip(partnerTooltip(name, data), { direction: 'top', offset: [0, -sz] });

    bubble.on('click', () => drillIntoPartner(name));

    bubble.addTo(map); markers.push(bubble);

    // Unit count label on partner bubble
    if (sz >= 12) {
      const label = L.divIcon({
        className: 'bubble-label',
        html: `<div style="font-size:${Math.max(8, Math.min(13, sz * 0.38))}px">${data.units}</div>`,
        iconSize: [sz * 2, sz], iconAnchor: [sz, sz / 2]
      });
      const lm = L.marker([lat, lng], { icon: label, interactive: false });
      lm.addTo(map); markers.push(lm);
    }
  });

  const totalPartners = entries.length;
  const totalUnits = entries.reduce((s, [, v]) => s + v.units, 0);
  const multiMkt = entries.filter(([, v]) => v.markets.size > 1).length;
  const totalMkts = new Set(allData.map(d => d.market)).size;

  document.getElementById('bottom-bar').innerHTML = `
    <div class="bb-stat"><div class="bb-val">${fmt(totalPartners)}</div><div class="bb-label">Partners</div></div>
    <div class="bb-stat"><div class="bb-val">${fmt(totalUnits)}</div><div class="bb-label">Total Units</div></div>
    <div class="bb-stat"><div class="bb-val">${fmt(totalMkts)}</div><div class="bb-label">Markets</div></div>
    <div class="bb-stat"><div class="bb-val">${multiMkt}</div><div class="bb-label">Multi-Market</div></div>
  `;
}

// ─── RENDER: PROPERTIES ───
function renderProperties() {
  clearMap();
  const wc = allData.filter(d => d.coords);
  const maxUnits = Math.max(...wc.map(d => d.units), 1);

  wc.forEach((d, i) => {
    const pos = jitter(d.coords, i);
    const sz = Math.max(5, Math.min(16, 3 + Math.sqrt(d.units) * 2));
    const pin = L.circleMarker([pos.lat, pos.lng], {
      radius: sz, fillColor: '#059669', color: 'rgba(5,150,105,0.45)', weight: 1.5, fillOpacity: 0.8
    });
    pin.bindTooltip(propertyTooltip(d), { direction: 'top', offset: [0, -sz] });
    pin.addTo(map); markers.push(pin);
  });

  const totalUnits = wc.reduce((s, d) => s + d.units, 0);
  const mkts = new Set(wc.map(d => d.market)).size;
  const partners = new Set(wc.map(d => d.partner)).size;

  document.getElementById('bottom-bar').innerHTML = `
    <div class="bb-stat"><div class="bb-val">${fmt(wc.length)}</div><div class="bb-label">Properties</div></div>
    <div class="bb-stat"><div class="bb-val">${fmt(totalUnits)}</div><div class="bb-label">Total Units</div></div>
    <div class="bb-stat"><div class="bb-val">${fmt(partners)}</div><div class="bb-label">Partners</div></div>
    <div class="bb-stat"><div class="bb-val">${fmt(mkts)}</div><div class="bb-label">Markets</div></div>
  `;
}

// ─── RENDER: TARGETS ───
function renderTargets() {
  clearMap();
  const withCoords = targetData.filter(d => d.coords);

  if (!withCoords.length) {
    document.getElementById('bottom-bar').innerHTML = `
      <div class="bb-stat"><div class="bb-val">0</div><div class="bb-label">Targets</div></div>
      <div class="bb-stat" style="padding:0 16px"><div class="bb-label" style="font-size:0.75rem;color:var(--silver)">Expansion targets load from HubSpot after deploy</div></div>
    `;
    return;
  }

  const maxUnits = Math.max(...withCoords.map(d => d.totalUnits || d.available || 1), 1);

  withCoords.forEach((d, i) => {
    const pos = jitter(d.coords, i);
    const hasVacancy = d.vacant > 0 || d.vacancy > 0;
    const hasConcessions = !!d.concessions;
    // Color: red-orange = high vacancy/concessions (hot target), yellow = moderate, grey = cold
    let color = '#9CA3AF'; // default grey
    if (hasVacancy && hasConcessions) color = '#DC2626'; // hot
    else if (hasVacancy || hasConcessions) color = '#F59E0B'; // warm
    else if (d.leaseUp) color = '#8B5CF6'; // lease-up signal

    const sz = Math.max(5, Math.min(16, 4 + Math.sqrt(d.totalUnits || d.available || 1) * 1.5));
    const pin = L.circleMarker([pos.lat, pos.lng], {
      radius: sz, fillColor: color, color: color.replace(')', ',0.5)').replace('rgb', 'rgba'),
      weight: 2, fillOpacity: 0.8
    });

    const signals = [];
    if (d.vacant) signals.push(`<span style="color:#DC2626;font-weight:600">${d.vacant} vacant</span>`);
    if (d.available) signals.push(`${d.available} total units`);
    if (d.vacancy) signals.push(`${d.vacancy}% vacancy`);
    if (d.concessions) signals.push(`<span style="color:#D97706">${d.concessions.slice(0, 80)}${d.concessions.length > 80 ? '...' : ''}</span>`);
    if (d.leaseUp) signals.push(`<span style="color:#8B5CF6;font-weight:600">Lease-up signal</span>`);

    pin.bindTooltip(`
      <div class="tt-name">${d.name}</div>
      <div class="tt-row"><span class="tt-dim">Partner</span><span class="tt-val">${d.partner}</span></div>
      <div class="tt-row"><span class="tt-dim">Market</span><span class="tt-val">${d.market}</span></div>
      ${d.totalUnits ? `<div class="tt-row"><span class="tt-dim">Total Units</span><span class="tt-val">${d.totalUnits}</span></div>` : ''}
      ${signals.length ? '<div style="border-top:1px solid rgba(0,0,0,0.06);margin-top:4px;padding-top:4px;font-size:0.72rem;line-height:1.6">' + signals.join('<br>') + '</div>' : ''}
    `, { direction: 'top', offset: [0, -sz] });

    pin.addTo(map); markers.push(pin);
  });

  // Stats
  const totalTargets = withCoords.length;
  const withVacancy = withCoords.filter(d => d.vacant > 0).length;
  const withConcessions = withCoords.filter(d => d.concessions).length;
  const hotTargets = withCoords.filter(d => (d.vacant > 0 || d.vacancy > 0) && d.concessions).length;
  const targetMarkets = new Set(withCoords.map(d => d.market)).size;

  document.getElementById('bottom-bar').innerHTML = `
    <div class="bb-stat"><div class="bb-val">${fmt(totalTargets)}</div><div class="bb-label">Targets</div></div>
    <div class="bb-stat"><div class="bb-val">${fmt(targetMarkets)}</div><div class="bb-label">Markets</div></div>
    <div class="bb-stat"><div class="bb-val" style="color:#DC2626">${hotTargets}</div><div class="bb-label">Hot (Vac + Conc)</div></div>
    <div class="bb-stat"><div class="bb-val" style="color:#F59E0B">${withVacancy}</div><div class="bb-label">Vacancy Signal</div></div>
    <div class="bb-stat"><div class="bb-val" style="color:#D97706">${withConcessions}</div><div class="bb-label">Concessions</div></div>
  `;
}

// ─── INIT ───
async function init() {
  const lt = document.getElementById('loading-text');
  const lb = document.getElementById('loading-bar');
  try {
    lt.textContent = 'Fetching data...';
    lb.style.width = '20%';

    // Fetch deals, deinstalls, and enrichment in parallel
    const [resp, diResp, enrichResp] = await Promise.all([
      fetch(SHEET_CSV),
      fetch(DEINSTALL_CSV),
      fetch(MAP_DATA_API).catch(() => null)
    ]);

    if (!resp.ok) throw new Error(`Deals HTTP ${resp.status}`);
    lb.style.width = '50%';

    const rows = parseCSV(await resp.text()).filter(d => d['Property Name']);

    // Parse deinstalls — resolve city-only market names to full "City, ST" keys
    if (diResp && diResp.ok) {
      const diRows = parseCSV(await diResp.text()).filter(d => d['Property Name']);
      deinstallDataFull = diRows.filter(d => {
        const dt = new Date(d['Deinstall_Date'] || d['Requested Date']);
        return dt && !isNaN(dt);
      }).map(d => {
        const rawMkt = (d['Market'] || '').trim();
        const resolved = resolveMarket(rawMkt) || rawMkt;
        return {
          property: d['Property Name'] || '—',
          market: resolved,
          partner: d['Partner'] || '—',
          reason: d['Reason'] || d['Reason '] || '—',
          date: d['Deinstall_Date'] || d['Requested Date']
        };
      });
      console.log(`Deinstalls loaded: ${deinstallDataFull.length} total`);
    }

    // Parse enrichment + targets
    if (enrichResp && enrichResp.ok) {
      const enrichData = await enrichResp.json();
      enrichmentMap = enrichData.enrichment || {};
      console.log(`Enrichment loaded: ${Object.keys(enrichmentMap).length} properties`);

      const rawTargets = enrichData.targets || [];
      targetData = rawTargets.map(t => ({
        ...t,
        coords: MARKET_COORDS[t.market] || MARKET_COORDS[resolveMarket(t.market)] || null
      }));
      const unmappedTargets = [...new Set(targetData.filter(d => !d.coords && d.market).map(d => d.market))];
      if (unmappedTargets.length) console.warn('Unmapped target markets:', unmappedTargets);
      console.log(`Targets loaded: ${targetData.length} (${targetData.filter(d => d.coords).length} mapped)`);
    }

    lb.style.width = '80%';

    allDataFull = rows.map(d => {
      const mkt = (d['Market'] || '').trim();
      return {
        property: d['Property Name'] || '—', market: mkt || '—',
        address: (d['Property Address'] || '').trim(),
        partner: d['Partner'] || '—', rep: cleanRep(d['AP Sales Person'] || '—'),
        units: parseInt(d['Total Unit Count']) || 0, dealType: d['Deal Type'] || '—',
        signDate: d['Contract Signed Date'] || '',
        coords: MARKET_COORDS[mkt] || null
      };
    });

    const mapped = allDataFull.filter(d => d.coords).length;
    const unmapped = [...new Set(allDataFull.filter(d => !d.coords).map(d => d.market))].filter(Boolean);
    if (unmapped.length) console.warn('Unmapped markets:', unmapped);
    console.log(`Loaded ${allDataFull.length} properties, ${mapped} mapped`);

    lb.style.width = '100%';
    computeFullAggs();
    document.getElementById('loading').classList.add('hidden');
    updateLegend('markets');
    applyPeriodFilter(); // sets allData/deinstallData from full arrays, computes aggs, renders
  } catch (err) {
    console.error(err);
    lt.textContent = 'Map data unavailable — switch to Grid view';
    document.getElementById('loading').classList.add('hidden');
  }
}

  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="14" class="gd-empty">Failed to load grid data.<br><span style="font-size:0.68rem">Make sure the API server is running: <code>python server.py</code> in landing-internal-data</span></td></tr>`;
  }
}

function gridFuzzy(text, q) {
  if (!q) return true;
  text = (text || '').toLowerCase().trim();
  q = q.toLowerCase().trim();
  if (!q) return true;
  if (text.includes(q)) return true;
  return q.split(/\s+/).filter(Boolean).every(t => text.includes(t));
}

function gridSearch(val) {
  gridSearchTerm = val;
  gridApplyFilters();
}

function gridToggleActive() {
  gridActiveOnly = !gridActiveOnly;
  const btn = document.getElementById('grid-active-btn');
  btn.classList.toggle('active', gridActiveOnly);
  gridApplyFilters();
}

function gridApplyFilters() {
  gridFiltered = gridData.filter(r => {
    if (gridActiveOnly && (!r.active_property_count || r.active_property_count < 1)) return false;
    const hay = [r.property_name, r.partner_name, r.market_name].join(' ');
    return gridFuzzy(hay, gridSearchTerm);
  });
  gridRender();
  gridUpdateStats();
}

function gridSort(col) {
  if (gridSortCol === col) gridSortDir = gridSortDir === 'asc' ? 'desc' : 'asc';
  else { gridSortCol = col; gridSortDir = 'asc'; }
  gridApplyFilters();
  document.querySelectorAll('.grid-table th.sortable').forEach(th => {
    const match = th.dataset.col === gridSortCol;
    th.classList.toggle('sorted', match);
    th.classList.toggle('asc', match && gridSortDir === 'asc');
    th.classList.toggle('desc', match && gridSortDir === 'desc');
  });
}
// Attach sort handlers
document.querySelectorAll('.grid-table th.sortable').forEach(th => {
  th.addEventListener('click', () => gridSort(th.dataset.col));
});

function gridSorted(data) {
  return [...data].sort((a, b) => {
    let va = a[gridSortCol], vb = b[gridSortCol];
    if (va == null) va = '';
    if (vb == null) vb = '';
    if (typeof va === 'number' && typeof vb === 'number') return gridSortDir === 'asc' ? va - vb : vb - va;
    va = String(va).toLowerCase(); vb = String(vb).toLowerCase();
    return gridSortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
  });
}

function gFmt(n) { return n == null ? '--' : Number(n).toLocaleString(); }
function gPct(v) { return v == null ? '--' : (v * 100).toFixed(1) + '%'; }
function gOccColor(v) {
  if (v == null) return 'var(--muted)';
  if (v >= 0.85) return 'var(--green)';
  if (v >= 0.6) return '#D97706';
  return '#DC2626';
}
function gEsc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function statusHtml(r) {
  const lbl = r.status_label || 'Unknown';
  const colorMap = {
    green: 'status-active',
    red: 'status-red',
    amber: 'status-amber',
    blue: 'status-blue',
    neutral: 'status-inactive',
  };
  const cls = colorMap[r.status_color] || 'status-inactive';
  return `<span class="status-badge ${cls}"><span class="grid-active-dot"></span>${gEsc(lbl)}</span>`;
}

function gridRender() {
  const tbody = document.getElementById('grid-body');
  const sorted = gridSorted(gridFiltered);
  if (!sorted.length) {
    tbody.innerHTML = '<tr><td colspan="14" class="gd-empty">No properties match your search</td></tr>';
    return;
  }
  let html = '';
  sorted.forEach(r => {
    const occ = r.occupancy;
    const occW = occ != null ? Math.round(occ * 100) : 0;
    const isExp = gridExpandedProp === r.property_name;
    const adminUrl = r.admin_url || '#';
    const units = r.home_count || 0;
    const occupied = r.home_occupied_count || 0;
    const vacant = units - occupied;
    const currRes = r.current_reservation_count || 0;
    const futRes = r.future_reservation_count || 0;

    html += `<tr class="${isExp ? 'expanded' : ''}" onclick="gridToggleExpand('${gEsc(r.property_name)}')">
      <td><span class="expand-chevron">&#9654;</span></td>
      <td class="grid-prop">${gEsc(r.property_name)}</td>
      <td class="grid-partner">${gEsc(r.partner_name)}</td>
      <td class="grid-loc">${gEsc(r.market_name)}</td>
      <td class="num">${gFmt(units)}</td>
      <td class="num"><div class="occ-wrap"><span class="occ-bar"><span class="occ-fill" style="width:${occW}%;background:${gOccColor(occ)}"></span></span><span class="occ-val" style="color:${gOccColor(occ)}">${gPct(occ)}</span></div></td>
      <td class="num"><span style="color:var(--green);font-weight:700">${occupied}</span><span style="color:var(--muted);margin:0 3px">/</span><span style="color:${vacant > 0 ? '#DC2626' : 'var(--muted)'};font-weight:${vacant > 0 ? '700' : '400'}">${vacant}</span></td>
      <td class="num"><span class="res-chip res-curr">${currRes} <span class="res-label">now</span></span><span class="res-chip res-fut">${futRes} <span class="res-label">upcoming</span></span></td>
      <td class="num">${r.home_average_rent_cost != null ? '$' + Math.round(r.home_average_rent_cost).toLocaleString() : '--'}</td>
      <td class="num" style="color:var(--green);font-weight:700">${r.home_daily_rent_revenue != null ? '$' + Math.round(r.home_daily_rent_revenue).toLocaleString() : '--'}</td>
      <td class="num">${r.home_daily_rent_cost_autopilot != null ? '$' + Math.round(r.home_daily_rent_cost_autopilot).toLocaleString() : '--'}</td>
      <td class="num" style="font-weight:700">${r.all_in_revpah_net != null ? '$' + r.all_in_revpah_net.toFixed(2) : '--'}</td>
      <td>${statusHtml(r)}</td>
      <td><a href="${gEsc(adminUrl)}" target="_blank" class="admin-link" onclick="event.stopPropagation()">&#8599;</a></td>
    </tr>`;

    if (isExp) {
      html += `<tr><td colspan="14" class="grid-detail-cell"><div class="grid-detail">
        <div class="grid-detail-tabs">
          <button class="gd-tab active" onclick="event.stopPropagation();gridDetailTab('${gEsc(r.property_name)}','units',this)">Units &amp; Status</button>
          <button class="gd-tab" onclick="event.stopPropagation();gridDetailTab('${gEsc(r.property_name)}','reservations',this)">Reservations</button>
        </div>
        <div id="grid-detail-content" class="gd-loading"><div class="spinner" style="display:inline-block;width:16px;height:16px;border-width:2px;vertical-align:middle;margin-right:6px"></div>Loading...</div>
      </div></td></tr>`;
    }
  });
  tbody.innerHTML = html;
  if (gridExpandedProp) gridLoadUnits(gridExpandedProp);
}

function gridToggleExpand(name) {
  gridExpandedProp = gridExpandedProp === name ? null : name;
  gridRender();
}

async function gridDetailTab(name, tab, btn) {
  btn.parentElement.querySelectorAll('.gd-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  if (tab === 'units') gridLoadUnits(name);
  else gridLoadReservations(name);
}

async function gridLoadUnits(name) {
  const el = document.getElementById('grid-detail-content');
  if (!el) return;

  // Use cache if available
  if (_unitCache[name]) { renderUnitTable(el, _unitCache[name]); return; }

  el.innerHTML = '<div class="gd-loading"><div class="spinner" style="display:inline-block;width:16px;height:16px;border-width:2px;vertical-align:middle;margin-right:6px"></div>Loading units...</div>';
  try {
    const resp = await fetch(GRID_API + '/property-units?name=' + encodeURIComponent(name));
    const units = await resp.json();
    _unitCache[name] = units;
    renderUnitTable(el, units);
  } catch (e) { el.innerHTML = `<div class="gd-empty">Error: ${e.message}</div>`; }
}

function renderUnitTable(el, units) {
    if (!units.length) { el.innerHTML = '<div class="gd-empty">No unit data</div>'; return; }
    let h = `<table class="gd-subtable"><thead><tr>
      <th>Unit</th><th>Status</th><th>Res. Status</th><th>Current Reservation</th><th>Days Vacant</th><th class="num">Base Rent</th><th class="num">Landing Rent</th><th class="num">Markup</th><th class="num">Daily Rev</th><th>Deinstall</th>
    </tr></thead><tbody>`;
    units.forEach(u => {
      // Status indicator — use installed + reservation status as the real signals
      const installed = u.home_is_installed === 'Yes';
      const resStatus = (u.home_reservation_status || '').toLowerCase();
      const hasRes = resStatus && !resStatus.includes('not reserved') && resStatus !== '';
      let statusIcon, statusTip;
      if (installed && hasRes) { statusIcon = '<span class="unit-dot unit-dot-green" title="Installed & Occupied"></span>'; statusTip = 'Occupied'; }
      else if (installed && !hasRes) { statusIcon = '<span class="unit-dot unit-dot-amber" title="Installed, No Reservation"></span>'; statusTip = 'Available'; }
      else if (!installed && u.deinstall_date) { statusIcon = '<span class="unit-dot unit-dot-red" title="Deinstalled"></span>'; statusTip = 'Deinstalled'; }
      else if (!installed) { statusIcon = '<span class="unit-dot unit-dot-blue" title="Not Installed"></span>'; statusTip = 'Not Installed'; }
      else { statusIcon = '<span class="unit-dot unit-dot-red"></span>'; statusTip = 'Inactive'; }

      // Reservation status badge
      const resStatusRaw = u.home_reservation_status;
      let resBadge = '<span style="color:var(--muted)">--</span>';
      if (resStatusRaw) {
        const rsLower = resStatusRaw.toLowerCase();
        if (rsLower.includes('extended') || rsLower.includes('occupied')) resBadge = `<span class="gd-badge-curr">${gEsc(resStatusRaw)}</span>`;
        else if (rsLower.includes('vacant')) resBadge = `<span class="gd-badge-vacant">${gEsc(resStatusRaw)}</span>`;
        else if (rsLower.includes('standby')) resBadge = `<span class="gd-badge-standby">${gEsc(resStatusRaw)}</span>`;
        else resBadge = `<span class="gd-badge-other">${gEsc(resStatusRaw)}</span>`;
      }

      // Rent
      const baseRent = u.rent_cost != null ? '$' + Number(u.rent_cost).toLocaleString() : '--';
      const hasLandingRent = u.landing_rent != null;
      const isEstimated = u.rent_source === 'estimated';
      const estTag = isEstimated ? '<span style="color:var(--muted);font-size:0.55rem;margin-left:2px" title="Estimated from daily AP cost">~</span>' : '';
      const landingRent = hasLandingRent ? '$' + Number(u.landing_rent).toLocaleString() + estTag : '<span style="color:var(--muted);font-size:0.62rem">--</span>';
      const markupVal = u.computed_markup != null ? u.computed_markup : u.markup;
      const markupStr = markupVal != null ? (markupVal * 100).toFixed(1) + '%' + estTag : '--';
      const markupColor = markupVal != null ? (markupVal > 0 ? 'var(--green)' : markupVal < 0 ? '#DC2626' : 'var(--muted)') : 'var(--muted)';
      const rev = u.home_daily_rent_revenue != null ? '$' + Number(u.home_daily_rent_revenue).toFixed(0) : '--';

      // Vacancy
      const daysVacant = u.days_vacant_standard;
      let vacantHtml = '<span style="color:var(--muted)">--</span>';
      if (daysVacant != null) {
        const vc = daysVacant > 30 ? '#DC2626' : daysVacant > 14 ? '#D97706' : 'var(--green)';
        vacantHtml = `<span style="color:${vc};font-weight:700">${daysVacant}d</span>`;
        if (u.vacant_since_date) vacantHtml += ` <span style="color:var(--muted);font-size:0.62rem">since ${gEsc(u.vacant_since_date)}</span>`;
      }

      // Current reservation dates
      let currRes = '<span style="color:var(--muted)">--</span>';
      if (u.current_reservation_start_date_raw_date) {
        currRes = `${gEsc(u.current_reservation_start_date_raw_date)} &rarr; ${gEsc(u.current_reservation_end_raw_date || '?')}`;
      }

      // Deinstall
      let deinstallHtml = '<span style="color:var(--muted)">--</span>';
      if (u.deinstall_date) {
        deinstallHtml = `<span style="color:#DC2626;font-weight:600">${gEsc(u.deinstall_date)}</span>`;
        if (u.home_deinstall_reason) deinstallHtml += `<br><span style="color:var(--muted);font-size:0.6rem">${gEsc(u.home_deinstall_reason)}</span>`;
      } else if (u.expected_deinstall_date) {
        deinstallHtml = `<span style="color:#D97706">${gEsc(u.expected_deinstall_date)}</span> <span style="color:var(--muted);font-size:0.6rem">(expected)</span>`;
      }

      h += `<tr>
        <td class="gd-unit">${gEsc(u.unit_number)}</td>
        <td>${statusIcon} <span style="font-size:0.68rem">${statusTip}</span></td>
        <td>${resBadge}</td>
        <td style="font-size:0.7rem">${currRes}</td>
        <td>${vacantHtml}</td>
        <td class="num" style="text-align:right">${baseRent}</td>
        <td class="num" style="text-align:right;font-weight:700">${landingRent}</td>
        <td class="num" style="text-align:right;color:${markupColor};font-weight:700">${markupStr}</td>
        <td class="num" style="text-align:right;color:var(--green)">${rev}</td>
        <td style="max-width:160px;white-space:normal;line-height:1.3">${deinstallHtml}</td>
      </tr>`;
    });
    h += '</tbody></table>';
    el.innerHTML = h;
}

async function gridLoadReservations(name) {
  const el = document.getElementById('grid-detail-content');
  if (!el) return;
  if (_resCache[name]) { renderResTable(el, _resCache[name]); return; }

  el.innerHTML = '<div class="gd-loading"><div class="spinner" style="display:inline-block;width:16px;height:16px;border-width:2px;vertical-align:middle;margin-right:6px"></div>Loading reservations...</div>';
  try {
    const resp = await fetch(GRID_API + '/property-reservations?name=' + encodeURIComponent(name));
    const res = await resp.json();
    _resCache[name] = res;
    renderResTable(el, res);
  } catch (e) { el.innerHTML = `<div class="gd-empty">Error: ${e.message}</div>`; }
}

function renderResTable(el, res) {
    if (!res.length) { el.innerHTML = '<div class="gd-empty">No reservations</div>'; return; }
    let h = `<table class="gd-subtable"><thead><tr>
      <th style="width:70px">Unit</th>
      <th style="width:100px">Check-in</th>
      <th style="width:100px">Check-out</th>
      <th class="num" style="width:80px">Total Nights</th>
      <th class="num" style="width:80px">Nights So Far</th>
      <th style="width:90px">Type</th>
      <th style="width:80px">Status</th>
    </tr></thead><tbody>`;
    const sorted = res.sort((a, b) => (b.reservation_start_date || '').localeCompare(a.reservation_start_date || ''));
    sorted.slice(0, 50).forEach(r => {
      const isCurr = r.current_reservation_count > 0;
      const isFut = r.future_reservation_count > 0;
      const badge = isCurr ? '<span class="gd-badge-curr">Active</span>' : isFut ? '<span class="gd-badge-future">Upcoming</span>' : '<span style="color:var(--muted);font-size:0.65rem">Past</span>';

      // Total nights from reservation_length_raw, or compute from start/end
      let totalNights = r.reservation_length_raw;
      if (totalNights == null && r.reservation_start_date && r.reservation_end_date) {
        const start = new Date(r.reservation_start_date);
        const end = new Date(r.reservation_end_date);
        if (!isNaN(start) && !isNaN(end)) totalNights = Math.round((end - start) / 86400000);
      }
      const totalStr = totalNights != null ? totalNights.toLocaleString() : '--';
      const monthsStr = totalNights != null && totalNights >= 28 ? '<span style="color:var(--muted);font-size:0.6rem;margin-left:3px">(' + (totalNights / 30.4).toFixed(1) + 'mo)</span>' : '';

      // Elapsed nights
      const elapsed = r.days_in_reservation != null ? Math.max(0, r.days_in_reservation) : '--';

      // Reservation type
      const resType = r.reservation_length || '--';

      h += `<tr>
        <td class="gd-unit">${gEsc(r.unit_number)}</td>
        <td>${gEsc(r.reservation_start_date || '--')}</td>
        <td>${gEsc(r.reservation_end_date || '--')}</td>
        <td class="num" style="font-weight:700">${totalStr}${monthsStr}</td>
        <td class="num">${elapsed}</td>
        <td><span class="gd-badge-other">${gEsc(resType)}</span></td>
        <td>${badge}</td>
      </tr>`;
    });
    if (res.length > 50) h += `<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:12px;font-size:0.72rem">Showing 50 of ${res.length} reservations</td></tr>`;
    h += '</tbody></table>';
    el.innerHTML = h;
}

function gridUpdateStats() {
  const d = gridFiltered;
  const units = d.reduce((s, r) => s + (r.home_count || 0), 0);
  const occRows = d.filter(r => r.occupancy != null);
  const avgOcc = occRows.length ? occRows.reduce((s, r) => s + r.occupancy, 0) / occRows.length : null;
  document.getElementById('grid-stats').innerHTML =
    `<span><span class="grid-stat-val">${d.length.toLocaleString()}</span>Properties</span>` +
    `<span><span class="grid-stat-val">${units.toLocaleString()}</span>Units</span>` +
    `<span><span class="grid-stat-val">${avgOcc != null ? gPct(avgOcc) : '--'}</span>Avg Occ.</span>`;
}

if (_isLocal) {
  // Local dev: default to grid, load map data in background
  switchMapGrid('grid');
  init().catch(() => {});
} else {
  init();
}
</script>
</body>
</html>
