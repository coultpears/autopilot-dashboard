  panel.classList.add('open');

  loadPropertyDetailContent(d.property_name, 'units');
}

async function loadPropertyDetailContent(name, tab) {
  const listEl = document.getElementById('dp-list');
  try {
    const data = await fetchPropertyDetail(name);
    if (tab === 'units') renderPropertyDetailUnits(listEl, data.units);
    else renderPropertyDetailReservations(listEl, data.reservations);
  } catch (e) {
    listEl.innerHTML = `<div style="padding:24px;text-align:center;color:var(--muted)">Error loading details: ${e.message}</div>`;
  }
}

function showPropertyDetailTab(tab) {
  document.querySelectorAll('.detail-tab').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (!_drillState || _drillState.type !== 'property') return;
  document.getElementById('dp-list').innerHTML = '<div style="padding:24px;text-align:center;color:var(--muted)"><div class="spinner" style="display:inline-block;width:18px;height:18px;border-width:2px;vertical-align:middle;margin-right:8px"></div>Loading...</div>';
  loadPropertyDetailContent(_drillState.title, tab);
}

function renderPropertyDetailUnits(el, units) {
  if (!units || !units.length) { el.innerHTML = '<div style="padding:24px;text-align:center;color:var(--muted)">No unit data</div>'; return; }
  let html = '';
  units.forEach(u => {
    const installed = u.home_is_installed === 'Yes';
    const resStatus = (u.home_reservation_status || '').toLowerCase();
    const hasRes = resStatus && !resStatus.includes('not reserved') && resStatus !== '';
    let statusDot, statusLabel;
    if (installed && hasRes) { statusDot = 'unit-dot-green'; statusLabel = 'Occupied'; }
    else if (installed && !hasRes) { statusDot = 'unit-dot-amber'; statusLabel = 'Available'; }
    else if (!installed && u.deinstall_date) { statusDot = 'unit-dot-red'; statusLabel = 'Deinstalled'; }
    else { statusDot = 'unit-dot-blue'; statusLabel = 'Unactivated'; }

    const rev = u.home_daily_rent_revenue != null ? '$' + Number(u.home_daily_rent_revenue).toFixed(0) : '--';
    const deinstallHtml = u.deinstall_date
      ? `<span style="color:#EE533D;font-size:0.62rem;font-weight:600">DI ${u.deinstall_date}</span>`
      : (u.expected_deinstall_date && !installed)
        ? `<span style="color:#B95B00;font-size:0.62rem">${u.expected_deinstall_date} (exp)</span>`
        : '';

    html += `<div class="detail-row" style="cursor:default">
      <div class="detail-row-info">
        <div class="detail-row-name"><span class="unit-dot ${statusDot}"></span>${gEsc(u.unit_number)}</div>
        <div class="detail-row-market">${statusLabel}${u.home_reservation_status ? ' · ' + gEsc(u.home_reservation_status) : ''}</div>
        <div class="detail-row-metrics">
          <span class="detail-metric units">${rev}/day</span>
          ${u.days_vacant_standard != null ? `<span class="detail-metric ${u.days_vacant_standard > 30 ? 'vacant' : 'units'}">${u.days_vacant_standard}d vacant</span>` : ''}
          ${deinstallHtml ? `<span class="detail-metric vacant">${deinstallHtml}</span>` : ''}
        </div>
      </div>
    </div>`;
  });
  el.innerHTML = html;
}

function renderPropertyDetailReservations(el, res) {
  if (!res || !res.length) { el.innerHTML = '<div style="padding:24px;text-align:center;color:var(--muted)">No reservations</div>'; return; }
  const sorted = [...res].sort((a, b) => (b.reservation_start_date || '').localeCompare(a.reservation_start_date || ''));
  let html = '';
  sorted.slice(0, 50).forEach(r => {
    const isCurr = r.current_reservation_count > 0;
    const isFut = r.future_reservation_count > 0;
    const badge = isCurr ? '<span class="gd-badge-curr">Active</span>' : isFut ? '<span class="gd-badge-future">Upcoming</span>' : '<span style="color:var(--muted);font-size:0.65rem">Past</span>';
    let totalNights = r.reservation_length_raw;
    if (totalNights == null && r.reservation_start_date && r.reservation_end_date) {
      const start = new Date(r.reservation_start_date);
      const end = new Date(r.reservation_end_date);
      if (!isNaN(start) && !isNaN(end)) totalNights = Math.round((end - start) / 86400000);
    }
    const nightsStr = totalNights != null ? totalNights + ' nights' : '';

    html += `<div class="detail-row" style="cursor:default">
      <div class="detail-row-info">
        <div class="detail-row-name">${gEsc(r.unit_number)} ${badge}</div>
        <div class="detail-row-market">${gEsc(r.reservation_start_date || '--')} &rarr; ${gEsc(r.reservation_end_date || '--')}</div>
        <div class="detail-row-metrics">
          ${nightsStr ? `<span class="detail-metric units">${nightsStr}</span>` : ''}
          <span class="detail-metric" style="background:rgba(0,0,0,0.04);color:var(--silver)">${gEsc(r.reservation_length || '--')}</span>
        </div>
      </div>
    </div>`;
  });
  if (res.length > 50) html += `<div style="padding:12px 16px;text-align:center;color:var(--muted);font-size:0.72rem">Showing 50 of ${res.length} reservations</div>`;
  el.innerHTML = html;
}

// ─── MARKET DETAIL PANEL ───
function drillIntoMarket(name) {
  const mktAgg = buildMarketAgg();
  const mk = mktAgg[name];
  if (!mk?.coords) return;

  const avgOcc = mk.units > 0 ? mk.occupied / mk.units : 0;

  _drillState = { title: name, type: 'market', props: mk.props, coords: mk.coords };

  const panel = document.getElementById('detail-panel');
  document.getElementById('dp-title').textContent = name;
  document.getElementById('dp-subtitle').textContent = `${mk.props.length} properties`;
  document.getElementById('dp-kpis').innerHTML = [
    { val: fmt(mk.units), label: 'Total Units' },
    { val: pct(avgOcc), label: 'Avg Occupancy' },
    { val: '$' + fmt(Math.round(mk.revenue)), label: 'Total Daily Rev' }
  ].map(k =>
    `<div class="detail-kpi"><div class="detail-kpi-val">${k.val}</div><div class="detail-kpi-label">${k.label}</div></div>`
  ).join('');

  const backBtn = document.getElementById('dp-back');
  backBtn.style.display = _openedFromSearch ? '' : 'none';

  document.getElementById('dp-tabs').innerHTML = `
    <button class="detail-tab active" onclick="showMarketDetailTab('properties')">Properties (${mk.props.length})</button>
  `;

  renderMarketPropertyList(mk.props);
  panel.classList.add('open');

  // Zoom
  clearMap();
  plotPortfolioPins(mk.props);
  map.setView([mk.coords.lat, mk.coords.lng], 10, { animate: true });
}

function showMarketDetailTab(tab) {
  document.querySelectorAll('.detail-tab').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (!_drillState || _drillState.type !== 'market') return;
  renderMarketPropertyList(_drillState.props);
}

function renderMarketPropertyList(props) {
  const sorted = [...props].sort((a, b) => (b.home_count || 0) - (a.home_count || 0));
  _detailListItems = sorted.map(d => ({ propertyData: d }));
  document.getElementById('dp-list').innerHTML = sorted.map((d, i) => {
    const occ = d.occupancy != null ? (d.occupancy * 100).toFixed(0) + '%' : '--';
    const statusColor = STATUS_COLORS[d.status_color] || STATUS_COLORS.neutral;
    return `<div class="detail-row" onclick="detailClick(${i})">
      <div class="detail-row-info">
        <div class="detail-row-name">${d.property_name}</div>
        <div class="detail-row-market">${d.partner_name}</div>
        <div class="detail-row-metrics">
          <span class="detail-metric units">${d.home_count || 0}u</span>
          <span class="detail-metric" style="background:${statusColor}20;color:${statusColor}">${occ} occ</span>
          ${d.deinstall_count > 0 ? `<span class="detail-metric vacant">${d.deinstall_count} DI</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('') || '<div style="padding:16px;color:var(--silver);font-size:0.8rem">No properties found</div>';
}

// Partner search drill-in (from search)
function drillIntoPartnerFromSearch(partnerName) {
  const props = activeGridData().filter(d => (d.partner_name || '').toLowerCase() === partnerName.toLowerCase());
  if (!props.length) return;

  _drillState = { title: partnerName, type: 'partner-search', props };

  const totalUnits = props.reduce((s, d) => s + (d.home_count || 0), 0);
  const totalOcc = props.reduce((s, d) => s + (d.home_occupied_count || 0), 0);
  const avgOcc = totalUnits > 0 ? totalOcc / totalUnits : 0;
  const markets = new Set(props.map(d => d.market_name));

  const panel = document.getElementById('detail-panel');
  document.getElementById('dp-title').textContent = partnerName;
  document.getElementById('dp-subtitle').textContent = `${markets.size} markets · ${props.length} properties`;
  document.getElementById('dp-kpis').innerHTML = [
    { val: fmt(totalUnits), label: 'Total Units' },
    { val: pct(avgOcc), label: 'Avg Occupancy' },
    { val: props.length.toString(), label: 'Properties' }
  ].map(k =>
    `<div class="detail-kpi"><div class="detail-kpi-val">${k.val}</div><div class="detail-kpi-label">${k.label}</div></div>`
  ).join('');

  document.getElementById('dp-back').style.display = '';
  document.getElementById('dp-tabs').innerHTML = `
    <button class="detail-tab active" onclick="showMarketDetailTab('properties')">Properties (${props.length})</button>
  `;

  renderMarketPropertyList(props);
  panel.classList.add('open');

  // Plot and zoom to all their properties
  clearMap();
  plotPortfolioPins(props);
  const allCoords = props.map(d => resolveMarketCoords(d.market_name)).filter(Boolean);
  if (allCoords.length > 1) {
    map.fitBounds(allCoords.map(c => [c.lat, c.lng]), { padding: [80, 80], animate: true });
  } else if (allCoords.length === 1) {
    map.setView([allCoords[0].lat, allCoords[0].lng], 10, { animate: true });
  }
}

// ─── RENDER: PORTFOLIO (individual property pins) ───
function plotPortfolioPins(data) {
  data.forEach((d, i) => {
    const coords = resolveMarketCoords(d.market_name);
    if (!coords) return;
    const pos = jitter(coords, i);
    const units = d.home_count || 1;
    const sz = Math.max(6, Math.min(20, 4 + Math.sqrt(units) * 2));
    const color = STATUS_COLORS[d.status_color] || STATUS_COLORS.neutral;

    const pin = L.circleMarker([pos.lat, pos.lng], {
      radius: sz, fillColor: color, color: 'rgba(255,255,255,0.5)', weight: 2, fillOpacity: 0.85
    });
    pin.bindTooltip(propertyTooltip(d), { direction: 'top', offset: [0, -sz] });
    pin.on('click', () => openPropertyDetail(d));
    pin.addTo(map);
    markers.push(pin);
    _pinRegistry['prop:' + d.property_name + ':' + d.market_name] = pin;
  });
}

function activeGridData() {
  return gridData.filter(d => (d.active_property_count || 0) >= 1);
}

function renderPortfolio() {
  clearMap();
  const data = activeGridData().filter(d => resolveMarketCoords(d.market_name));
  plotPortfolioPins(data);

  // Bottom bar stats (same as grid)
  const units = data.reduce((s, r) => s + (r.home_count || 0), 0);
  const occupied = data.reduce((s, r) => s + (r.home_occupied_count || 0), 0);
  const available = units - occupied;
  const occRows = data.filter(r => r.occupancy != null);
  const avgOcc = occRows.length ? occRows.reduce((s, r) => s + r.occupancy, 0) / occRows.length : null;

  document.getElementById('bottom-bar').innerHTML = `
    <div class="bb-stat"><div class="bb-val">${fmt(data.length)}</div><div class="bb-label">Properties</div></div>
    <div class="bb-stat"><div class="bb-val">${fmt(units)}</div><div class="bb-label">Units</div></div>
    <div class="bb-stat"><div class="bb-val" style="color:var(--green)">${fmt(occupied)}</div><div class="bb-label">Occupied</div></div>
    <div class="bb-stat"><div class="bb-val" style="color:#B95B00">${fmt(available)}</div><div class="bb-label">Available</div></div>
    <div class="bb-stat"><div class="bb-val">${avgOcc != null ? pct(avgOcc) : '--'}</div><div class="bb-label">Avg Occ</div></div>
  `;
}

// ─── RENDER: MARKETS (aggregated bubbles) ───
function renderMarkets() {
  clearMap();
  const mktAgg = buildMarketAgg();
  const entries = Object.entries(mktAgg).filter(([, v]) => v.coords);
  const maxUnits = Math.max(...entries.map(([, v]) => v.units), 1);

  entries.forEach(([name, data]) => {
    const sz = Math.max(14, Math.min(44, 10 + Math.sqrt(data.units) * 3));
    const avgOcc = data.units > 0 ? data.occupied / data.units : 0;
    // Color by average occupancy
    let fillColor, strokeColor, glowColor;
    if (avgOcc >= 0.85) {
      fillColor = '#08786C'; strokeColor = 'rgba(8,120,108,0.5)'; glowColor = 'rgba(8,120,108,0.12)';
    } else if (avgOcc >= 0.6) {
      fillColor = '#B95B00'; strokeColor = 'rgba(217,119,6,0.5)'; glowColor = 'rgba(217,119,6,0.12)';
    } else {
      fillColor = '#EE533D'; strokeColor = 'rgba(220,38,38,0.5)'; glowColor = 'rgba(220,38,38,0.12)';
    }

    // Glow ring
    const glow = L.circleMarker([data.coords.lat, data.coords.lng], {
      radius: sz + 6, fillColor: glowColor, color: 'transparent', weight: 0, fillOpacity: 1
    });
    glow.addTo(map); markers.push(glow);

    // Main bubble
    const bubble = L.circleMarker([data.coords.lat, data.coords.lng], {
      radius: sz, fillColor: fillColor, color: strokeColor, weight: 2, fillOpacity: 0.85
    });
    bubble.bindTooltip(marketTooltipContent(name, data), { direction: 'top', offset: [0, -sz] });
    bubble.on('click', () => drillIntoMarket(name));
    bubble.addTo(map); markers.push(bubble);

    // Unit count label
    if (sz >= 14) {
      const label = L.divIcon({
        className: 'bubble-label',
        html: `<div style="font-size:${Math.max(8, Math.min(13, sz * 0.38))}px">${data.units}</div>`,
        iconSize: [sz * 2, sz], iconAnchor: [sz, sz / 2]
      });
      const lm = L.marker([data.coords.lat, data.coords.lng], { icon: label, interactive: false });
      lm.addTo(map); markers.push(lm);
    }
  });

  // Bottom bar
  const totalMkts = entries.length;
  const totalUnits = entries.reduce((s, [, v]) => s + v.units, 0);
  const totalProps = entries.reduce((s, [, v]) => s + v.props.length, 0);
  const totalOcc = entries.reduce((s, [, v]) => s + v.occupied, 0);
  const avgOcc = totalUnits > 0 ? totalOcc / totalUnits : 0;

  document.getElementById('bottom-bar').innerHTML = `
    <div class="bb-stat"><div class="bb-val">${fmt(totalMkts)}</div><div class="bb-label">Markets</div></div>
    <div class="bb-stat"><div class="bb-val">${fmt(totalProps)}</div><div class="bb-label">Properties</div></div>
    <div class="bb-stat"><div class="bb-val">${fmt(totalUnits)}</div><div class="bb-label">Units</div></div>
    <div class="bb-stat"><div class="bb-val">${pct(avgOcc)}</div><div class="bb-label">Avg Occ</div></div>
  `;
}

// ─── RENDER: TARGETS (kept from HubSpot /api/map-data) ───
function renderTargets() {
  clearMap();
  const withCoords = targetData.filter(d => d.coords);

  if (!withCoords.length) {
    document.getElementById('bottom-bar').innerHTML = `
      <div class="bb-stat"><div class="bb-val">0</div><div class="bb-label">Targets</div></div>
      <div class="bb-stat" style="padding:0 16px"><div class="bb-label" style="font-size:0.75rem;color:var(--silver)">Expansion targets load from HubSpot after deploy</div></div>
    `;
    return;
  }

  withCoords.forEach((d, i) => {
    const pos = jitter(d.coords, i);
    const hasVacancy = d.vacant > 0 || d.vacancy > 0;
    const hasConcessions = !!d.concessions;
    let color = '#9CA3AF';
    if (hasVacancy && hasConcessions) color = '#EE533D';
    else if (hasVacancy || hasConcessions) color = '#F59E0B';
    else if (d.leaseUp) color = '#8B5CF6';

    const sz = Math.max(5, Math.min(16, 4 + Math.sqrt(d.totalUnits || d.available || 1) * 1.5));
    const pin = L.circleMarker([pos.lat, pos.lng], {
      radius: sz, fillColor: color, color: color.replace(')', ',0.5)').replace('rgb', 'rgba'),
      weight: 2, fillOpacity: 0.8
    });
    pin.bindTooltip(targetTooltipContent(d), { direction: 'top', offset: [0, -sz] });
    pin.addTo(map); markers.push(pin);
  });

  const totalTargets = withCoords.length;
  const withVacancy = withCoords.filter(d => d.vacant > 0).length;
  const withConcessions = withCoords.filter(d => d.concessions).length;
  const hotTargets = withCoords.filter(d => (d.vacant > 0 || d.vacancy > 0) && d.concessions).length;
  const targetMarkets = new Set(withCoords.map(d => d.market)).size;

  document.getElementById('bottom-bar').innerHTML = `
    <div class="bb-stat"><div class="bb-val">${fmt(totalTargets)}</div><div class="bb-label">Targets</div></div>
    <div class="bb-stat"><div class="bb-val">${fmt(targetMarkets)}</div><div class="bb-label">Markets</div></div>
    <div class="bb-stat"><div class="bb-val" style="color:#EE533D">${hotTargets}</div><div class="bb-label">Hot (Vac + Conc)</div></div>
    <div class="bb-stat"><div class="bb-val" style="color:#F59E0B">${withVacancy}</div><div class="bb-label">Vacancy Signal</div></div>
    <div class="bb-stat"><div class="bb-val" style="color:#B95B00">${withConcessions}</div><div class="bb-label">Concessions</div></div>
  `;
}

// ─── DEINSTALL OVERLAY (using gridData) ───
function toggleDeinstalls(on) {
  showDeinstalls = on;
  document.getElementById('deinstall-toggle').classList.toggle('active', on);
  if (on) renderDeinstallOverlay();
  else { deinstallMarkers.forEach(m => map.removeLayer(m)); deinstallMarkers = []; }
}

function renderDeinstallOverlay() {
  deinstallMarkers.forEach(m => map.removeLayer(m));
  deinstallMarkers = [];
  if (!showDeinstalls || !gridData.length) return;

  // Aggregate deinstalls by market from active gridData
  const diByMarket = {};
  activeGridData().forEach(d => {
    if (!d.deinstall_count || d.deinstall_count <= 0) return;
    const mktKey = resolveMarketKey(d.market_name);
    const coords = resolveMarketCoords(d.market_name);
    if (!coords) return;
    if (!diByMarket[mktKey]) diByMarket[mktKey] = { count: 0, coords, properties: [] };
    diByMarket[mktKey].count += d.deinstall_count;
    diByMarket[mktKey].properties.push({ name: d.property_name, count: d.deinstall_count });
  });

  Object.entries(diByMarket).forEach(([mkt, data]) => {
    const sz = Math.max(6, Math.min(22, 4 + Math.sqrt(data.count) * 2.5));

    const ring = L.circleMarker([data.coords.lat, data.coords.lng], {
      radius: sz + 4, fillColor: 'rgba(220,38,38,0.12)', color: '#EE533D',
      weight: 2, fillOpacity: 0.4, dashArray: '4 3'
    });

    const topProps = data.properties.sort((a, b) => b.count - a.count).slice(0, 5)
      .map(p => `<div class="tt-row"><span class="tt-dim" style="font-size:0.72rem">${p.name}</span><span class="tt-val" style="font-size:0.72rem;color:#EE533D">${p.count}</span></div>`).join('');

    ring.bindTooltip(`
      <div class="tt-name" style="color:#EE533D">Deinstalls: ${mkt}</div>
      <div class="tt-row"><span class="tt-dim">Units Deinstalling</span><span class="tt-val" style="color:#EE533D">${data.count}</span></div>
      ${topProps ? '<div style="border-top:1px solid rgba(0,0,0,0.06);margin-top:4px;padding-top:4px"><div style="font-size:0.65rem;color:var(--silver);font-weight:600;margin-bottom:2px">BY PROPERTY</div>' + topProps + '</div>' : ''}
    `, { direction: 'top', offset: [0, -sz - 4] });

    ring.addTo(map);
    deinstallMarkers.push(ring);
  });
}

// ─── VIEW SWITCH ───
function renderView() {
  if (currentView === 'portfolio') renderPortfolio();
  else if (currentView === 'markets') renderMarkets();
  else if (currentView === 'targets') renderTargets();
}

function setView(view, preserveSearch) {
  currentView = view;
  document.querySelectorAll('.pill').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  closeDetail(preserveSearch ? false : true);
  map.setView([39.0, -96.0], 5, { animate: true });
  updateLegend(view);
  renderView();
  if (showDeinstalls) renderDeinstallOverlay();
}

// ─── MAP INIT ───
async function initMap() {
  const lt = document.getElementById('loading-text');
  const lb = document.getElementById('loading-bar');

  try {
    lt.textContent = 'Loading portfolio data...';
    lb.style.width = '20%';

    // Wait for gridData to be populated by loadGrid() AND fetch targets in parallel
    const [, targetResp] = await Promise.all([
      gridDataPromise,
      fetch(MAP_DATA_API).catch(() => null)
    ]);

    lb.style.width = '60%';
    lt.textContent = 'Processing map data...';

    // Parse targets from HubSpot
    if (targetResp && targetResp.ok) {
      const enrichData = await targetResp.json();
      const rawTargets = enrichData.targets || [];
      targetData = rawTargets.map(t => ({
        ...t,
        coords: MARKET_COORDS[t.market] || (() => {
          const mapped = LOOKER_MARKET_MAP[t.market];
          return mapped ? MARKET_COORDS[mapped] : null;
        })()
      }));
      const unmappedTargets = [...new Set(targetData.filter(d => !d.coords && d.market).map(d => d.market))];
      if (unmappedTargets.length) console.warn('Unmapped target markets:', unmappedTargets);
      console.log(`Targets loaded: ${targetData.length} (${targetData.filter(d => d.coords).length} mapped)`);
    }

    lb.style.width = '90%';

    // Log mapping stats
    const mapped = gridData.filter(d => resolveMarketCoords(d.market_name)).length;
    const unmapped = [...new Set(gridData.filter(d => !resolveMarketCoords(d.market_name)).map(d => d.market_name))].filter(Boolean);
    if (unmapped.length) console.warn('Unmapped markets:', unmapped);
    console.log(`Map ready: ${gridData.length} properties, ${mapped} mapped to coordinates`);

    lb.style.width = '100%';
    document.getElementById('loading').classList.add('hidden');
    updateLegend('portfolio');
    renderView();
  } catch (err) {
    console.error(err);
    lt.textContent = 'Map data unavailable — switch to Grid view';
    document.getElementById('loading').classList.add('hidden');
  }
}

// ─── GRID VIEW ─────────────────────────────────────────────────────
// Use Netlify functions in production, localhost for local dev
const _isLocalDev = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
const GRID_API = _isLocalDev ? 'http://localhost:5001/api' : '/api';
let gridData = [], gridFiltered = [], gridSortCol = 'property_name', gridSortDir = 'asc';
let gridExpandedProp = null, gridSearchTerm = '', gridActiveOnly = true;
const _detailCache = {};  // property_name -> { units, reservations }

function switchMapGrid(mode) {
  activeViewMode = mode;
  document.querySelectorAll('.vs-btn').forEach(b => b.classList.toggle('active', b.dataset.vs === mode));

  const mapEl = document.getElementById('map');
  const gridEl = document.getElementById('grid-view');
  const controls = document.querySelector('.map-controls');
  const legend = document.getElementById('map-legend');
  const searchBox = document.querySelector('.search-box');
  const bottomBar = document.getElementById('bottom-bar');
  const detailPanel = document.getElementById('detail-panel');

  if (mode === 'grid') {
    mapEl.style.display = 'none';
    gridEl.style.display = 'flex';
    if (controls) controls.style.display = 'none';
    if (legend) legend.style.display = 'none';
    if (searchBox) searchBox.style.display = 'none';
    if (bottomBar) bottomBar.style.display = 'none';
    if (detailPanel) detailPanel.classList.remove('open');
    if (!gridData.length) loadGrid();
  } else {
    mapEl.style.display = '';
    gridEl.style.display = 'none';
    if (controls) controls.style.display = '';
    if (legend) legend.style.display = '';
    if (searchBox) searchBox.style.display = '';
    if (bottomBar) bottomBar.style.display = '';
    map.invalidateSize();
    renderView();
  }
}

async function loadGrid() {
  const tbody = document.getElementById('grid-body');
  tbody.innerHTML = '<tr><td colspan="14" class="gd-loading"><div class="spinner" style="display:inline-block;width:18px;height:18px;border-width:2px;vertical-align:middle;margin-right:8px"></div>Loading portfolio data...</td></tr>';
  try {
    const resp = await fetch(GRID_API + '/grid-data');
    if (!resp.ok) throw new Error('API returned ' + resp.status);
    gridData = await resp.json();
    // Signal that gridData is ready (map is waiting for this)
    if (gridDataReady) { gridDataReady(); gridDataReady = null; }
    // Update date reference
    const now = new Date();
    document.getElementById('grid-date-ref').textContent = 'Data as of ' + now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) + ' \u2022 ' + now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    gridApplyFilters();
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="14" class="gd-empty">Failed to load grid data.<br><span style="font-size:0.68rem">Make sure the API server is running: <code>python server.py</code> in landing-internal-data</span></td></tr>`;
    // Still resolve gridDataReady so map doesn't hang forever
    if (gridDataReady) { gridDataReady(); gridDataReady = null; }
  }
}

function gridFuzzy(text, q) {
  if (!q) return true;
  text = (text || '').toLowerCase().trim();
  q = q.toLowerCase().trim();
  if (!q) return true;
  if (text.includes(q)) return true;
  return q.split(/\s+/).filter(Boolean).every(t => text.includes(t));
}

function gridSearch(val) {
  gridSearchTerm = val;
  gridApplyFilters();
}

function gridToggleActive() {
  gridActiveOnly = !gridActiveOnly;
  const btn = document.getElementById('grid-active-btn');
  btn.classList.toggle('active', gridActiveOnly);
  gridApplyFilters();
}

function gridApplyFilters() {
  gridFiltered = gridData.filter(r => {
    if (gridActiveOnly && (!r.active_property_count || r.active_property_count < 1)) return false;
    const hay = [r.property_name, r.partner_name, r.pmc_name, r.dp_name, r.market_name].filter(Boolean).join(' ');
    return gridFuzzy(hay, gridSearchTerm);
  });
  gridRender();
  gridUpdateStats();
}

function gridSort(col) {
  if (gridSortCol === col) gridSortDir = gridSortDir === 'asc' ? 'desc' : 'asc';
  else { gridSortCol = col; gridSortDir = 'asc'; }
  gridApplyFilters();
  document.querySelectorAll('.grid-table th.sortable').forEach(th => {
    const match = th.dataset.col === gridSortCol;
    th.classList.toggle('sorted', match);
    th.classList.toggle('asc', match && gridSortDir === 'asc');
    th.classList.toggle('desc', match && gridSortDir === 'desc');
  });
}
// Attach sort handlers
document.querySelectorAll('.grid-table th.sortable').forEach(th => {
  th.addEventListener('click', () => gridSort(th.dataset.col));
});

function gridSorted(data) {
  return [...data].sort((a, b) => {
    let va = a[gridSortCol], vb = b[gridSortCol];
    if (va == null) va = '';
    if (vb == null) vb = '';
    if (typeof va === 'number' && typeof vb === 'number') return gridSortDir === 'asc' ? va - vb : vb - va;
    va = String(va).toLowerCase(); vb = String(vb).toLowerCase();
    return gridSortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
  });
}

function gFmt(n) { return n == null ? '--' : Number(n).toLocaleString(); }
function gPct(v) { return v == null ? '--' : (v * 100).toFixed(1) + '%'; }
function gOccColor(v) {
  if (v == null) return 'var(--muted)';
  if (v >= 0.85) return 'var(--green)';
  if (v >= 0.6) return '#B95B00';
  return '#EE533D';
}
function gEsc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function statusHtml(r) {
  const lbl = r.status_label || 'Unknown';
  const colorMap = {
    green: 'status-active',
    red: 'status-red',
    amber: 'status-amber',
    blue: 'status-blue',
    neutral: 'status-inactive',
  };
  const cls = colorMap[r.status_color] || 'status-inactive';
  return `<span class="status-badge ${cls}"><span class="grid-active-dot"></span>${gEsc(lbl)}</span>`;
}

function gridRender() {
  const tbody = document.getElementById('grid-body');
  const sorted = gridSorted(gridFiltered);
  if (!sorted.length) {
    tbody.innerHTML = '<tr><td colspan="14" class="gd-empty">No properties match your search</td></tr>';
    return;
  }
  let html = '';
  sorted.forEach(r => {
    const occ = r.occupancy;
    const occW = occ != null ? Math.round(occ * 100) : 0;
    const isExp = gridExpandedProp === r.property_name;
    const adminUrl = 'https://admin.hellolanding.com/properties/' + encodeURIComponent((r.property_name || '').toLowerCase().replace(/\s+/g, '-'));
    const units = r.home_count || 0;
    const occupied = r.home_occupied_count || 0;
    const vacant = units - occupied;
    const currRes = r.current_reservation_count || 0;
    const futRes = r.future_reservation_count || 0;

    html += `<tr class="${isExp ? 'expanded' : ''}" data-prop="${gEsc(r.property_name)}" onclick="gridToggleExpand('${gEsc(r.property_name)}')" onmouseenter="gridPrefetch('${gEsc(r.property_name)}')">
      <td><span class="expand-chevron">&#9654;</span></td>
      <td class="grid-prop">${gEsc(r.property_name)}${r.deinstall_count ? '<span class="deinstall-flag" title="' + r.deinstall_count + ' unit' + (r.deinstall_count > 1 ? 's' : '') + ' deinstalling">' + r.deinstall_count + ' DI</span>' : ''}</td>
      <td class="grid-partner">${gEsc(r.pmc_name || r.partner_name || '')}${r.dp_name && r.dp_name !== r.pmc_name ? '<div class="grid-partner-sub">' + gEsc(r.dp_name) + '</div>' : ''}</td>
      <td class="grid-loc">${gEsc(r.market_name)}</td>
      <td class="num">${gFmt(units)}</td>
      <td class="num"><div class="occ-wrap"><span class="occ-bar"><span class="occ-fill" style="width:${occW}%;background:${gOccColor(occ)}"></span></span><span class="occ-val" style="color:${gOccColor(occ)}">${gPct(occ)}</span></div></td>
      <td class="num"><span style="color:var(--green);font-weight:700">${occupied}</span><span style="color:var(--muted);margin:0 3px">/</span><span style="color:${vacant > 0 ? '#EE533D' : 'var(--muted)'};font-weight:${vacant > 0 ? '700' : '400'}">${vacant}</span></td>
      <td class="num"><span class="res-chip res-curr">${currRes} <span class="res-label">now</span></span><span class="res-chip res-fut">${futRes} <span class="res-label">upcoming</span></span></td>
      <td class="num">${r.home_average_rent_cost != null ? '$' + Math.round(r.home_average_rent_cost).toLocaleString() : '--'}</td>
      <td class="num" style="color:var(--green);font-weight:700">${r.home_daily_rent_revenue != null ? '$' + Math.round(r.home_daily_rent_revenue).toLocaleString() : '--'}</td>
      <td class="num">${r.home_daily_rent_cost_autopilot != null ? '$' + Math.round(r.home_daily_rent_cost_autopilot).toLocaleString() : '--'}</td>
      <td class="num" style="font-weight:700">${r.all_in_revpah_net != null ? '$' + r.all_in_revpah_net.toFixed(2) : '--'}</td>
      <td>${statusHtml(r)}</td>
      <td><a href="${gEsc(adminUrl)}" target="_blank" class="admin-link" onclick="event.stopPropagation()">&#8599;</a></td>
    </tr>`;

  });
  tbody.innerHTML = html;
  // If a property was expanded, re-inject the detail row via targeted DOM
  if (gridExpandedProp) gridToggleExpand(gridExpandedProp);
}

function gridToggleExpand(name) {
  const tbody = document.getElementById('grid-body');
  const prev = gridExpandedProp;
  gridExpandedProp = prev === name ? null : name;

  // Targeted DOM: remove old detail row + un-expand old row
  if (prev) {
    const oldDetail = document.getElementById('grid-detail-row');
    if (oldDetail) oldDetail.remove();
    // Remove 'expanded' class from old row
    for (const tr of tbody.querySelectorAll('tr.expanded')) tr.classList.remove('expanded');
  }

  if (gridExpandedProp) {
    // Find the clicked row and insert detail after it
    const rows = tbody.querySelectorAll('tr');
    for (const tr of rows) {
      if (tr.getAttribute('data-prop') === gridExpandedProp) {
        tr.classList.add('expanded');
        const r = gridFiltered.find(d => d.property_name === gridExpandedProp);
        if (!r) break;
        const detailTr = document.createElement('tr');
        detailTr.id = 'grid-detail-row';
        detailTr.innerHTML = `<td colspan="14" class="grid-detail-cell"><div class="grid-detail">
          <div class="grid-detail-tabs">
            <button class="gd-tab active" onclick="event.stopPropagation();gridDetailTab('${gEsc(r.property_name)}','units',this)">Units &amp; Status</button>
            <button class="gd-tab" onclick="event.stopPropagation();gridDetailTab('${gEsc(r.property_name)}','reservations',this)">Reservations</button>
          </div>
          <div id="grid-detail-content" class="gd-loading"><div class="spinner" style="display:inline-block;width:16px;height:16px;border-width:2px;vertical-align:middle;margin-right:6px"></div>Loading...</div>
        </div></td>`;
        tr.after(detailTr);
        gridLoadUnits(gridExpandedProp);
        break;
      }
    }
  }
}

// Fetch both units + reservations in one call, cache with 10-min TTL
const DETAIL_TTL = 600000; // 10 minutes
async function fetchPropertyDetail(name) {
  const cached = _detailCache[name];
  if (cached && (Date.now() - cached._ts) < DETAIL_TTL) return cached;
  const resp = await fetch(GRID_API + '/property-detail?name=' + encodeURIComponent(name));
  if (!resp.ok) throw new Error('API returned ' + resp.status);
  const data = await resp.json();
  data._ts = Date.now();
  _detailCache[name] = data;
  return data;
}

// Prefetch on hover — cache-warms so click is instant
let _prefetchTimer = null;
function gridPrefetch(name) {
  clearTimeout(_prefetchTimer);
  _prefetchTimer = setTimeout(() => {
    const cached = _detailCache[name];
    if (!cached || (Date.now() - cached._ts) >= DETAIL_TTL) {
      fetchPropertyDetail(name).catch(() => {}); // fire-and-forget
    }
  }, 150);
}

async function gridDetailTab(name, tab, btn) {
  btn.parentElement.querySelectorAll('.gd-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const el = document.getElementById('grid-detail-content');
  if (!el) return;

  // If cached and fresh, render instantly
  const cached = _detailCache[name];
  if (cached && (Date.now() - cached._ts) < DETAIL_TTL) {
    if (tab === 'units') renderUnitTable(el, cached.units);
    else renderResTable(el, cached.reservations, cached.units);
    return;
  }

  // Otherwise show loader and fetch
  el.innerHTML = '<div class="gd-loading"><div class="spinner" style="display:inline-block;width:16px;height:16px;border-width:2px;vertical-align:middle;margin-right:6px"></div>Loading...</div>';
  try {
    const data = await fetchPropertyDetail(name);
    if (tab === 'units') renderUnitTable(el, data.units);
    else renderResTable(el, data.reservations, data.units);
  } catch (e) { el.innerHTML = `<div class="gd-empty">Error: ${e.message}</div>`; }
}

async function gridLoadUnits(name) {
  const el = document.getElementById('grid-detail-content');
  if (!el) return;

  const c = _detailCache[name];
  if (c && (Date.now() - c._ts) < DETAIL_TTL) { renderUnitTable(el, c.units); return; }

  el.innerHTML = '<div class="gd-loading"><div class="spinner" style="display:inline-block;width:16px;height:16px;border-width:2px;vertical-align:middle;margin-right:6px"></div>Loading...</div>';
  try {
    const data = await fetchPropertyDetail(name);
    renderUnitTable(el, data.units);
  } catch (e) { el.innerHTML = `<div class="gd-empty">Error: ${e.message}</div>`; }
}

function renderUnitTable(el, units) {
    if (!units.length) { el.innerHTML = '<div class="gd-empty">No unit data</div>'; return; }

    // Quick counts for summary bar
    let cntOccupied = 0, cntAvailable = 0, cntDeinstalled = 0, cntNotInstalled = 0;
    for (const u of units) {
      const inst = u.home_is_installed === 'Yes';
      const rs = (u.home_reservation_status || '').toLowerCase();
      const hasRes = rs && !rs.includes('not reserved') && rs !== '';
      if (inst && hasRes) cntOccupied++;
      else if (inst && !hasRes) cntAvailable++;
      else if (u.deinstall_date) cntDeinstalled++;
      else cntNotInstalled++;
    }
    const activeUnits = cntOccupied + cntAvailable;

    // Sort: occupied first, then available (by days vacant desc), then deinstalled, then not-installed
    const sorted = [...units].sort((a, b) => {
      function rank(u) {
        const inst = u.home_is_installed === 'Yes';
        const rs = (u.home_reservation_status || '').toLowerCase();
        const hasRes = rs && !rs.includes('not reserved') && rs !== '';
        if (inst && hasRes) return 0;   // occupied
        if (inst && !hasRes) return 1;  // available
        if (u.deinstall_date) return 3; // deinstalled
        return 2;                       // unactivated
      }
      const ra = rank(a), rb = rank(b);
      if (ra !== rb) return ra - rb;
      // Within available: sort by days vacant desc (worst first)
      if (ra === 1) return (b.days_vacant_standard || 0) - (a.days_vacant_standard || 0);
      // Otherwise sort by unit number
      return String(a.unit_number || '').localeCompare(String(b.unit_number || ''), undefined, { numeric: true });
    });

    let h = `<div style="display:flex;gap:14px;margin-bottom:10px;font-family:Outfit,sans-serif;font-size:0.7rem;color:var(--silver)">
      <span><b style="color:var(--white);font-weight:800">${activeUnits}</b> active</span>
      <span><span class="unit-dot unit-dot-green"></span><b style="color:var(--green)">${cntOccupied}</b> occupied</span>
      <span><span class="unit-dot unit-dot-amber"></span><b style="color:#B95B00">${cntAvailable}</b> available</span>
      ${cntDeinstalled ? '<span><span class="unit-dot unit-dot-red"></span><b style="color:#EE533D">' + cntDeinstalled + '</b> deinstalled</span>' : ''}
      ${cntNotInstalled ? '<span><span class="unit-dot unit-dot-blue"></span><b style="color:var(--blue)">' + cntNotInstalled + '</b> unactivated</span>' : ''}
    </div>
    <table class="gd-subtable"><thead><tr>
      <th>Unit</th><th>Status</th><th>Res. Status</th><th>Current Reservation</th><th>Days Vacant</th><th class="num">Base Rent</th><th class="num">Landing Rent</th><th class="num">Markup</th><th class="num">Daily Rev</th><th>Deinstall</th>
    </tr></thead><tbody>`;
    sorted.forEach(u => {
      // Status indicator — use installed + reservation status as the real signals
      const installed = u.home_is_installed === 'Yes';
      const resStatus = (u.home_reservation_status || '').toLowerCase();
      const hasRes = resStatus && !resStatus.includes('not reserved') && resStatus !== '';
      let statusIcon, statusTip;
      if (installed && hasRes) { statusIcon = '<span class="unit-dot unit-dot-green" title="Installed & Occupied"></span>'; statusTip = 'Occupied'; }
      else if (installed && !hasRes) { statusIcon = '<span class="unit-dot unit-dot-amber" title="Installed, No Reservation"></span>'; statusTip = 'Available'; }
      else if (!installed && u.deinstall_date) { statusIcon = '<span class="unit-dot unit-dot-red" title="Deinstalled"></span>'; statusTip = 'Deinstalled'; }
      else if (!installed) { statusIcon = '<span class="unit-dot unit-dot-blue" title="Never activated with Landing"></span>'; statusTip = 'Unactivated'; }
      else { statusIcon = '<span class="unit-dot unit-dot-red"></span>'; statusTip = 'Inactive'; }

      // Reservation status badge
      const resStatusRaw = u.home_reservation_status;
      let resBadge = '<span style="color:var(--muted)">--</span>';
      if (resStatusRaw) {
        const rsLower = resStatusRaw.toLowerCase();
        if (rsLower.includes('extended') || rsLower.includes('occupied')) resBadge = `<span class="gd-badge-curr">${gEsc(resStatusRaw)}</span>`;
        else if (rsLower.includes('vacant')) resBadge = `<span class="gd-badge-vacant">${gEsc(resStatusRaw)}</span>`;
        else if (rsLower.includes('standby')) resBadge = `<span class="gd-badge-standby">${gEsc(resStatusRaw)}</span>`;
        else resBadge = `<span class="gd-badge-other">${gEsc(resStatusRaw)}</span>`;
      }

      // Rent
      const baseRent = u.rent_cost != null ? '$' + Number(u.rent_cost).toLocaleString() : '--';
      const hasLandingRent = u.landing_rent != null;
      const isEstimated = u.rent_source === 'estimated';
      const estTag = isEstimated ? '<span style="color:var(--muted);font-size:0.55rem;margin-left:2px" title="Estimated from daily AP cost">~</span>' : '';
      const landingRent = hasLandingRent ? '$' + Number(u.landing_rent).toLocaleString() + estTag : '<span style="color:var(--muted);font-size:0.62rem">--</span>';
      const markupVal = u.computed_markup != null ? u.computed_markup : u.markup;
      const markupStr = markupVal != null ? (markupVal * 100).toFixed(1) + '%' + estTag : '--';
      const markupColor = markupVal != null ? (markupVal > 0 ? 'var(--green)' : markupVal < 0 ? '#EE533D' : 'var(--muted)') : 'var(--muted)';
      const rev = u.home_daily_rent_revenue != null ? '$' + Number(u.home_daily_rent_revenue).toFixed(0) : '--';

      // Vacancy
      const daysVacant = u.days_vacant_standard;
      let vacantHtml = '<span style="color:var(--muted)">--</span>';
      if (daysVacant != null) {
        const vc = daysVacant > 30 ? '#EE533D' : daysVacant > 14 ? '#B95B00' : 'var(--green)';
        vacantHtml = `<span style="color:${vc};font-weight:700">${daysVacant}d</span>`;
        if (u.vacant_since_date) vacantHtml += ` <span style="color:var(--muted);font-size:0.62rem">since ${gEsc(u.vacant_since_date)}</span>`;
      }

      // Current reservation dates
      let currRes = '<span style="color:var(--muted)">--</span>';
      if (u.current_reservation_start_date_raw_date) {
        currRes = `${gEsc(u.current_reservation_start_date_raw_date)} &rarr; ${gEsc(u.current_reservation_end_raw_date || '?')}`;
      }

      // Deinstall — only show expected dates on non-installed units (stale expected dates on active units are noise)
      let deinstallHtml = '<span style="color:var(--muted)">--</span>';
      if (u.deinstall_date) {
        deinstallHtml = `<span style="color:#EE533D;font-weight:600">${gEsc(u.deinstall_date)}</span>`;
        if (u.home_deinstall_reason) deinstallHtml += `<br><span style="color:var(--muted);font-size:0.6rem">${gEsc(u.home_deinstall_reason)}</span>`;
      } else if (u.expected_deinstall_date && !installed) {
        deinstallHtml = `<span style="color:#B95B00">${gEsc(u.expected_deinstall_date)}</span> <span style="color:var(--muted);font-size:0.6rem">(expected)</span>`;
      }

      h += `<tr>
        <td class="gd-unit">${gEsc(u.unit_number)}</td>
        <td>${statusIcon} <span style="font-size:0.68rem">${statusTip}</span></td>
        <td>${resBadge}</td>
        <td style="font-size:0.7rem">${currRes}</td>
        <td>${vacantHtml}</td>
        <td class="num" style="text-align:right">${baseRent}</td>
        <td class="num" style="text-align:right;font-weight:700">${landingRent}</td>
        <td class="num" style="text-align:right;color:${markupColor};font-weight:700">${markupStr}</td>
        <td class="num" style="text-align:right;color:var(--green)">${rev}</td>
        <td style="max-width:160px;white-space:normal;line-height:1.3">${deinstallHtml}</td>
      </tr>`;
    });
    h += '</tbody></table>';
    el.innerHTML = h;
}

function renderResTable(el, res, units) {
    if (!res.length) { el.innerHTML = '<div class="gd-empty">No reservations</div>'; return; }

    // Build deinstall lookup from units data
    const diMap = {};
    if (units) {
      for (const u of units) {
        if (u.deinstall_date && u.unit_number != null) diMap[String(u.unit_number)] = u.deinstall_date;
      }
    }

    // Sort: Active first, then Upcoming, then Past. Within each group, newest start date first.
    const sorted = [...res].sort((a, b) => {
      function rank(r) {
        if (r.current_reservation_count > 0) return 0; // active
        if (r.future_reservation_count > 0) return 1;  // upcoming
        return 2; // past
      }
      const ra = rank(a), rb = rank(b);
      if (ra !== rb) return ra - rb;
      return (b.reservation_start_date || '').localeCompare(a.reservation_start_date || '');
    });

    let h = `<table class="gd-subtable"><thead><tr>
      <th style="width:70px">Unit</th>
      <th style="width:100px">Check-in</th>
      <th style="width:100px">Check-out</th>
      <th class="num" style="width:80px">Total Nights</th>
      <th class="num" style="width:80px">Nights So Far</th>
      <th style="width:90px">Type</th>
      <th style="width:80px">Status</th>
    </tr></thead><tbody>`;
    sorted.slice(0, 50).forEach(r => {
      const isCurr = r.current_reservation_count > 0;
      const isFut = r.future_reservation_count > 0;
      const badge = isCurr ? '<span class="gd-badge-curr">Active</span>' : isFut ? '<span class="gd-badge-future">Upcoming</span>' : '<span style="color:var(--muted);font-size:0.65rem">Past</span>';

      // Deinstall indicator for this unit
      const unitKey = String(r.unit_number || '');
      const isDI = diMap[unitKey];
      const diTag = isDI ? ' <span style="color:#EE533D;font-size:0.6rem;font-weight:700" title="Deinstalled ' + gEsc(isDI) + '">DI</span>' : '';

      // Total nights from reservation_length_raw, or compute from start/end
      let totalNights = r.reservation_length_raw;
      if (totalNights == null && r.reservation_start_date && r.reservation_end_date) {
        const start = new Date(r.reservation_start_date);
        const end = new Date(r.reservation_end_date);
        if (!isNaN(start) && !isNaN(end)) totalNights = Math.round((end - start) / 86400000);
      }
      const totalStr = totalNights != null ? totalNights.toLocaleString() : '--';
      const monthsStr = totalNights != null && totalNights >= 28 ? '<span style="color:var(--muted);font-size:0.6rem;margin-left:3px">(' + (totalNights / 30.4).toFixed(1) + 'mo)</span>' : '';

      // Elapsed nights
      const elapsed = r.days_in_reservation != null ? Math.max(0, r.days_in_reservation) : '--';

      // Reservation type
      const resType = r.reservation_length || '--';

      h += `<tr${isDI ? ' style="opacity:0.6"' : ''}>
        <td class="gd-unit">${gEsc(r.unit_number)}${diTag}</td>
        <td>${gEsc(r.reservation_start_date || '--')}</td>
        <td>${gEsc(r.reservation_end_date || '--')}</td>
        <td class="num" style="font-weight:700">${totalStr}${monthsStr}</td>
        <td class="num">${elapsed}</td>
        <td><span class="gd-badge-other">${gEsc(resType)}</span></td>
        <td>${badge}</td>
      </tr>`;
    });
    if (res.length > 50) h += `<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:12px;font-size:0.72rem">Showing 50 of ${res.length} reservations</td></tr>`;
    h += '</tbody></table>';
    el.innerHTML = h;
}

function gridUpdateStats() {
  const d = gridFiltered;
  const units = d.reduce((s, r) => s + (r.home_count || 0), 0);
  // Weighted avg occupancy — each unit counts equally, not each property
  const avgOcc = units > 0 ? occupied / units : null;
  const occupied = d.reduce((s, r) => s + (r.home_occupied_count || 0), 0);
  const available = units - occupied;
  document.getElementById('grid-stats').innerHTML =
    `<span><span class="grid-stat-val">${d.length.toLocaleString()}</span>Properties</span>` +
    `<span><span class="grid-stat-val">${units.toLocaleString()}</span>Units</span>` +
    `<span><span class="grid-stat-val" style="color:var(--green)">${occupied.toLocaleString()}</span>Occupied</span>` +
    `<span><span class="grid-stat-val" style="color:#B95B00">${available.toLocaleString()}</span>Available</span>` +
    `<span><span class="grid-stat-val">${avgOcc != null ? gPct(avgOcc) : '--'}</span>Avg Occ.</span>`;
}

// Prefetch grid data immediately — will be ready by the time user clicks Grid
loadGrid();

if (_isLocal) {
  switchMapGrid('grid');
  initMap().catch(() => {});
} else {
  initMap();
}

</script>
</body>
</html>
